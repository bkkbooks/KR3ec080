body:
  text: 甘草本經上品釋名根因味甘甜遂名蜜甘蜜草蜜有沉香之一名謂其氣味如蜜此草最為眾藥之王猶如香中有沉香蕗草靈通偷蜜珊瑚太嗷美草以上名義未詳國老國老即帝師之稱雖非君而為君所宗各方記述甘草枝葉悉如槐高五六尺但葉端微尖而糙澀似有白毛結角子扁如小豆極堅齒齧不破略文今出山西省汾州府及南京省盧州府福州府可共用一種有稱阿蘭陀及朝鮮者皆不堪用延喜式載常陸陸奧出羽三國獻之近世自甲斐出與唐來者不少異吾聞之出甲斐者葉如藤而尖有毛辨別道地今藥肆所稱豎鞭者長大也稱中鞭者中細也稱切込者短也稱良薑樣者揀余之粗者也稱藁甘草者細小曲弦者也時珍曰大徑寸而結緊斷文者為佳謂之粉草選其壯大皮薄色黃者堅實緊文者為上是藥肆所謂豎鞭也修治刮去粗皮銼用製法頗多宜從本方生寒炙溫補中宜炙用瀉火宜生用指節頭三者皆生用氣味甘平無毒功用氣薄味厚升而浮陽也入足太陰厥陰經通入手足十二經白朮苦參乾漆為使惡遠志反大戟芫花甘遂海藻忌豬肉中滿嘔家酒家諸濕脹滿咸不宜服梢止莖中澀疼節主癰疽消腫導毒主治五藏六府寒熱邪氣堅筋骨長肌肉倍氣力金瘡亢重腫也解毒溫中下氣煩滿短氣傷臟咳嗽止渴通經脈利血氣解百藥毒安和七十二種石一千二百種草主腹中冷痛除腹脹滿補益五藏腎氣內傷婦人血瀝腰痛凡虛而多熱者用之解小兒胎毒驚癇降火止痛黃耆本經上品釋名耆長也色黃為補藥之長故名黃耆今俗通作耆載糝載椹獨椹芰草蜀脂以上名義未詳百草耆誤作蓍乃蓍龜之蓍音屍今按稱百本耆與蓍字相似故誤名之乎蓍一根百莖謂百本亦疑此之謬乎王孫百藥錦義未詳各方記述黃耆葉似槐葉而微尖小又似蒺藜葉而微闊大青白色開黃紫花大如槐花結小尖角長寸許根長二三尺以緊實如箭簳為良松岡先生曰和產有二種生北國者莖葉堅似木葉有毛此本草所謂本黃耆而不堪用又有羊齒葉者出關東共木黃耆也此二種今人家藥圃多栽此二種未知有真種也京都北山中間有之東國呼之綿黃耆以合漢名陳承曰黃耆本出綿上者為良故名綿黃耆非謂其柔韌如綿也松岡先生曰綿黃耆形軟如綿絮以名之謂產綿州故名誤矣辨別道地選單股不歧者色潤柔軟肉心黃甘甜者用之世多以苜蓿根充賣謂土黃耆不知苜蓿根堅而脆肉黃黃耆軟而如棉肉白此為異耳修治去頭刮皮以蜜水塗炙亦有以酒或鹽酒炒之酒欲其達表又行其泥滯鹽欲補腎及崩帶淋濁達其下氣味甘微溫無毒功用味甘氣溫平氣薄味厚可升可降陰中陽也入手足太陰氣分又入手少陽足少陰命門茯苓為之使惡龜甲白蘚皮黃耆功能實表有表邪者勿用能助氣氣實者勿用能內塞補不足胸膈氣閉悶腸胃有積滯者勿用能補陽陽盛陰虛者忌之上焦熱甚下焦虛寒者忌之病人多怒肝氣不和者勿服疽瘡血分熱盛者禁用主治癰疽久敗瘡排膿止痛大風癩疾五痔鼠瘻補虛小兒百病婦人子臟風邪逐五藏間惡血補丈夫虛損五勞羸瘦止渴腹痛泄痢益氣利陰氣主虛喘腎衰耳聾療寒熱治發背內補助氣壯筋骨長肉補血破症癖瘰癧癭贅腸風血崩帶下赤白利產前後一切病月候不勻痰嗽頭風熱毒赤目治虛勞自汗補肺氣瀉肺火心火實皮毛益胃氣去肌熱及諸經之痛主太陰瘧疾人參本經上品釋名人參人參年深參漸長者根如人形有神故謂之人參浸亦浸漸之義黃參血參其在五參色黃屬土而補脾胃生陰血故名之人御御乃參字之訛也鬼蓋此草背陽向陰故云神草下有人參上有紫氣又曰搖光星散為人參土積地精得地之精靈故有此名海腴皺面還丹二名未祥或曰本邦產人參之地深山陰谷雖夏亦陰冷氣甚而蚊蚋可以遁去故名未知是否各方記述人參生上黨山谷及遼東上黨在冀州西南今來者形長而黃狀如防風多潤實而甘俗乃重百濟者形細而堅白氣味薄於上黨者次用高麗即是遼東形大而虛軟不及百濟並不及上黨者其草一莖直上四五相對花紫色高麗人作人參贊云三椏五葉背陽向陰欲求求我椵樹相尋或云椵我邦謂登知者未詳松岡先生曰今人參以朝鮮產為上中夏次之其中好惡真偽互有之形小而堅色帶黃褐嘗試之有餘味者最為上近來有判事手此又有真偽真判事今無之唐參中以肥大而蠟色者充之是女直參近來稱唐參者非韓參而多是女直參也此種今多渡日本雜韓參以貨之當審擇和產小人參始出自薩摩州今處處有之三椏五葉四五月有花細小紫白色結子生青熟紅根橫生狀如竹節其味太苦者多甘者少以甘者用之其須嚼之甘苦氣味微與人參相近又名三枝五葉草苗葉花狀雖與圖經之說相合根形不同浸煎甘草湯以代人參用之稱蔓人參者羊乳根而蔓生花如鈴鐸乃沙參類也近來種防葵以為人參攝州乎野人參是也稱節人參者三七草根也藝州有稱山人參者真防風也豫州稱日振人參亦防風類而粗大也近來有稱鬘人參者出於東國是亦小人參之類而形狀長大於小人參也稱參葉者近年從朝鮮來乃人參莖葉也予屢用試之其氣烈其味苦有肺熱者用之猶有效甚勝於砂參而亦實非補大虛者用者審之服人參本草所謂湯參近來有切人參者亦此類也辨別道地選要肥大塊如雞胝並似人形黃色者乃藥鋪稱蝦樣者也連皮者黃潤色如防風去皮者堅白如粉其似人形者謂之孩兒參尤多贗偽市之貨者隨品立名曰土佐向單股好人參也延喜式載人參古既有之今所用之和人參歟將用沙參歟不以可知焉修治去蘆頭用之凡生用宜㕮咀熟用宜隔紙焙之浸水少焙則柔韌而易銼或醇酒潤透焙熟用宜從本方雖忌鐵器不必在忌列參頻見風日則易蛀惟納瓦罐雜細辛密封可留經年不壞氣味甘微苦溫無毒功用氣味俱薄浮而升陽中之陽又曰陽中微陰入手太陰經與藜蘆相反茯苓馬藺為之使惡溲疏滷咸畏五靈脂惡皂莢黑豆動紫石英得升麻補上焦之元氣得麥門冬則生脈得乾薑則補氣得黃耆甘草除大熱若血證驟起肺脈獨實脹證暴成九候堅強痧疹初發斑點未彰傷寒始作邪熱昌熾血熱妄行諸痛不可驟用邪氣方銳宜散不宜補故也主治補五藏安精神定魂魄止驚悸除邪氣明目開心益智療腸胃中冷心腹鼓痛胸脅逆滿霍亂吐逆調中止消渴通血脈症堅積令人不忘主五勞七傷虛損瘦弱止嘔噦補五藏六府保中守神消胸中痰治肺痿及癇疾冷氣逆上傷寒不下食凡虛而多夢紛紛者加之止煩躁酸水消食開胃治氣殺金石藥毒治肺胃陽氣不足肺氣虛促短氣少氣補中緩中瀉心肺脾胃中火邪止渴生津液治男婦一切虛證發熱自汗眩運頭痛反胃吐食痎瘧滑瀉久痢小便頻數淋瀝勞倦內傷中風中暑痿痹吐血嗽血下血血淋血崩胎前產後諸病參蘆苦溫主治吐虛勞痰飲人弱者以參蘆代瓜蒂沙參本經上品釋名沙參白色宜砂地久服益氣有參贊之功用故名白參白色名之知母莖有白汁如乳故名歟未詳羊乳根多白汁俚人呼為羊婆奶鈴兒草象花形也虎鬚說同上苦心此物無心而味不苦不知其謂也文希識美志取三名未詳因地名亦異逐一不載之各方記述所所山原有之二月生苗葉如初生小葵葉而團扁不光八九月抽莖高一二尺莖上之葉則尖長如枸杞葉而小有細齒秋月葉間開小紫花長二三分狀如鈴鐸五出白蕊亦有白花者並結實大如冬青實中有細子霜後苗枯其根生砂地者長尺余大一虎口黃土地者短而小根莖皆有白汁辨別道地今謂釣鍾草者是也其草亦有杏葉與竹葉之別花有紫白二種而花狀根形氣味不異所所砂地有之而今藥鋪不別沙參與薺苨而混售之今唐來者束細長根而為團其色黃謂之松沙參然與時珍取說不合今清亦用之和產符合時珍說則不為不佳用者審擇之羊乳根狀如薺苨而圓大小如拳上有角節折之有白汁人取根當薺苨味甘潤實大勝於砂參不得止則代用人參亦可今藥鋪稱弦砂參者也薺苨釋名杏葉砂參根如砂參而葉如杏葉故呼之甜桔梗梗甜葉如桔梗故名之今按沙參薺苨形狀相似其說亦相混同救荒野譜既謂本草所載之杏葉沙參則分明一種也欲知其臧否則繙諸本草可以審擇之而今不云云修治去頭銼用或少焙用氣味淡甘微寒無毒功用入手太陰足厥陰經惡防己反藜蘆藏府無實熱肺虛寒客之作嗽者勿服主治血結驚氣除寒熱補中益肺氣療胸痹心腹結熱邪氣頭痛皮間邪熱安五藏久服利人羊乳主治頭腫痛益氣長肌肉去皮肌浮風疝氣下墜治常欲眠養肝氣宜五藏風氣補虛止驚煩益心肺並一切惡瘡疥癬及身癢排膿消腫毒清肺火治久咳肺痿薺苨主治解百藥毒利肺氣和中明目止痛主咳嗽消渴強中瘡毒丁腫沙參羊乳薺苨一物別種故功用亦有大同少異也桔梗本經上品釋名桔結也梗綆也其文縷結如綆也因名白藥梗草薺苨桔梗薺苨乃一類有甜苦二種故俗呼薺苨為甘桔梗也各方記述春生苗高尺余葉似杏葉而長橢四葉相對而生嫩時亦可煮食夏開小花紫碧色頗似牽牛花秋後結實根如指大黃白色花有柴白單千瓣者宜用紫色單瓣者辨別道地凡使勿用木梗真如桔梗咬之只是腥澀不堪用根有細大藥家謂小稱楊枝樣以貴之然不可拘泥之應用大小俱選堅實肥白者修治刮去浮皮及尖浸米泔水一夜切片微炒用或以百合搗爛同浸一日銼碎微焙用今按在藥肆者欲其色白以米泔浸暴乾數日則其色潔白浮皮亦隨去醫家再浸米泔一夜則恐氣味倍薄用者審之宜只去頭銼用或微炒亦可氣味苦辛微溫有小毒氣味有諸說繆仲淳曰觀其主諸病應是辛苦甘平微溫無毒功用味厚氣輕陽中之陰升也入手太陰肺經氣分及足少陰經節皮為之使畏白及龍膽忌豬肉得牡蠣遠志療恚怒得硝石石膏療傷寒白粥解其薟味風症鬱症肺症皆不可缺若病氣逆上與以補下焦藥中勿用病不屬肺者亦不益時珍曰伏砒節皮不知謂何物也主治胸脅痛如刀刺腹滿腸鳴幽幽驚恐悸氣利五藏腸胃補血氣除寒熱風痹溫中消穀療喉咽痛下蠱毒治下痢破血積氣消聚痰涎去肺熱氣促嗽逆除腹中冷痛主中惡及小兒驚癇下一切氣止霍亂轉筋心腹脹痛除邪辟瘟破癥瘕肺癰養血排膿補內漏及喉痹利竅除肺部風熱清利頭目咽嗌胸膈滯氣及痛除鼻塞治寒嘔主口舌生瘡赤目腫病萎蕤本經上品釋名女萎苗葉類冬青但冬青凌冬不萎故得獲女貞之譽葳蕤崴蕤草本葉垂之貌此草多須如冠纓下垂之緌而有威儀故以名之萎䔟䔟萎音相近萎香未詳熒其葉光瑩而象竹玉竹地節其根多節故有此名烏女蟲蟬未詳各方記述處處山中有之其根橫生似黃精差小黃白色性柔多須最難燥其葉如竹兩兩相植亦可採根種之極易繁也嫩葉及根並可煮淘食茹黃精萎蕤相似最難辨黃精根如佛掌薯葉青黃色而長萎蕤根長莖亦如桃枝葉短青白色黃精葉尖萎蕤葉如匕二種共劈根長二三寸栽種也子複種之易繁生辨別道地肆中名地黃樣黃精者是也以肥潤而大為佳今按黃精萎蕤性味功用大抵相近而萎蕤功為勝然世人只知黃精之有功而不知萎蕤之可用況亦黃精不可用煎服而今萎蕤代人參故特舉之而後黃精者也修治忌鐵竹刀刮去節皮蜜水浸蒸焙用或微炒或水浸飯上蒸透或酒浸蒸透用今按此物暴乾經日難乾甑上一蒸當風日克干不失潤而後洗銼從本方制之今售藥肆亦酒浸蒸用而良氣味甘平無毒功用能升能降陽中陰也入手太陰足太陰厥陰少陰經甘入脾柔潤入腎畏滷咸士材曰滋益陰精與地黃同功增長陽氣與人參同力潤而不滑和而不偏譬諸盛德人無往不利繆仲淳曰純而不駁和而不偏有益無損故無簡謬可謂知萎蕤者也主治主中風暴熱不能動搖趺筋結肉諸不足久服去面黑䵟好顏色主潤澤心腹結氣虛熱濕毒腰痛莖中寒及目痛眥爛淚出時疾寒熱內補不足去虛勞客熱頭痛不安補中益氣除煩悶止消渴潤心肺補五勞七傷虛損腰腳疼痛天行熱狂服食無忌主風溫自汗灼熱及勞瘧寒熱脾胃虛乏男子小便頻數失精一切虛損黃精本經上品釋名以其得坤土之精粹故謂之黃精各方記述苗葉與萎蕤相似根如白芨多生北方山中大者苗高五六尺根如拳夏月開小白花結子如艹黍粒辨別道地肆中稱生薑樣黃精者真也修治洗淨後蒸從巳至子薄切暴乾用氣味甘平無毒功用忌梅實主治補中益氣除風濕安五藏補五勞七傷助筋骨耐寒暑益脾胃潤心肺補諸虛填精髓下三尸蟲知母本經上品釋名補陰藥用之以其能知血之母故名蚳母宿根之旁初生子根狀如蚳虻之狀故名連母蝭母蝭音擔蚳訛為提水母地參水參蕁音覃莐藩音沉煩苦心兒草諸名未詳各方記述葉如韭花如韭故一名韭逢四月開青花八月結實辨別道地和漢俱皆真擇其黃色有毛似菖陽而肥潤用之腐者不可用修治須以竹刀去毛銼勿令犯鐵器損腎引經上行用酒浸焙下行鹽水潤焙久炒如褐色氣味辛苦寒無毒功用氣味俱厚沉而降陰也陰中微陽入足陽明手太陰經氣分得黃柏及酒良能伏鹽及蓬砂陽痿及易舉易痿泄瀉脾弱飲食不消化胃虛不思食腎虛溏泄等證法並禁用主治消渴熱中除邪氣肢體浮腫下水補不足益氣療傷寒久瘧煩熱脅下邪氣膈中惡及風汗內疽心煩躁悶骨熱勞往來產後蓐勞腎氣勞憎寒虛煩熱勞傳屍疰病通小腸消痰止嗽潤心肺安心止驚悸涼心去熱治陽明火熱瀉膀胱腎經火熱厥頭痛下痢腰痛喉中腥臭瀉肺火滋腎水治命門相火有餘安胎止子煩天麻宋開寶釋名以形名形如黃瓜味辛而辣故呼為瓜天麻赤箭芝芝類莖如箭簳赤色葉生莖端遠見箭有羽故名之獨搖芝有風不動無風自搖定風草二名以性異而名離母合離草二名以根異而名神草鬼督郵以功而名各方記述葉如芍藥而小當中抽一莖直上如箭簳莖端結實狀若續隨子其根連一二十枚猶如天門冬百部之類四月開花今考中華產有葉見和產一莖一花如蔥花而無枝葉余皆相同和產出奧州他處未聞有之辨別道地和漢可俱用破開明亮堅實者佳修治濕紙包於糠火中煨熱取出切片酒浸焙用氣味甘辛平無毒功用苦平陰中之陽也入足厥陰太陽經風藥多燥風能勝濕故也凡病人覺津液衰少口乾舌燥咽乾為痛大便閉澀病火炎上頭暈血虛頭痛及南方似中風皆禁用之主治消癰腫下支漏寒疝下血諸風濕痹四肢拘攣小兒風癇驚氣利腰膝強筋力治冷氣𤸷痹攤緩不隨語多恍惚善驚失心助陽氣通血脈治風虛眩暈頭痛白朮本經上品釋名有白朮赤朮故以名分之術字篆文象其根乾枝葉之形山薊其葉似薊而味似姜芥一名山芥一名天薊揚枹揚州多種白朮其狀如鼓枹故有揚枹抱薊之名馬薊馬者以大名乎山姜以形味而名山連未詳吃力伽西域名之各方記述術有兩種白朮梢大有毛而無椏根甜而少膏可作丸散用赤朮葉細無椏根小苦多膏可作煎用春生苗青色無椏莖作蒿干狀青赤色長二三尺以來夏開花紫碧色亦似刺薊花或有黃白色者入伏後結子至秋而苗枯根似姜而旁有細根皮黑心黃白色中有膏液和邦稱白朮者高一二尺葉三葉一朵似杏而鋸齒莖強直四五月開青白花形如夏枯草花狀而中有子是乃蒼朮也辨別道地和漢俱有之而漢為真今所渡者合雲頭術雞腿術之說最為上品一種稱片白朮川白朮者性味功用稍劣之和邦蒼白二術同一物藥肆以老根為蒼朮以嫩根為白朮以售之今醫家亦以老為白以嫩為蒼而用之俱皆不是白朮可必用漢產和產稱三好丸白朮者乃蒼朮嫩根也修治浸米泔去頭銼炒用又土製取陳壁土或土器碎粉拌之炒過篩去土而用之其餘有蜜水薑汁乳汁之制或曰白朮不必泔浸暖胃炒用其餘皆生用可也氣味苦甘辛溫無毒功用味苦而甘性溫味厚氣薄可升可降陽中之陰也入手太陽少陰足太陰陽明少陰厥陰經防風地榆為使忌桃李菜青魚雀肉癰疽毒禁用為多生膿白朮得中宮中和之氣為除風痹之上品然脾虛無濕者用之卻致燥渴津液大抵陰虛燥渴少血骨蒸痰嗽哮喘唇燥咽塞便閉滯下肝腎攻藥腹滿動氣者切須忌之主治風寒濕痹死肌痙疽止汗除熱消食主大風在身面風眩頭痛目淚出消痰水逐皮膚間風水結腫除心下急滿霍亂吐下不止利腰臍間血益津液暖胃消穀嗜食治心腹脹滿腹中冷痛胃虛下利多年氣痢除寒熱止嘔逆反胃利小便主五勞七傷補腰膝長肌肉治冷氣痃癖氣塊婦人冷癥瘕除濕益氣和中補陽消痰逐水生津止渴止瀉痢消足脛濕腫除胃熱肌熱得枳實消痞滿氣分佐黃芩安胎清熱補肝風虛主舌本強食則嘔胃脘痛身體重心下急痛心下水痞衝脈為病逆氣裡急臍腹痛蒼朮釋名其色蒼黑故名之術濁也赤朮山精仙精術者山之精也服之令人長生辟穀致神仙故有名山薊說見白朮條下茅君寶篋茅茅山也術以茅山為好君主也寶篋美稱也各方記述和產所所有之和以有蒼朮而無白朮而已形狀於白朮條下謂之者乃是也若強分二術則其根色白黃而形如槌味微苦甘而氣不烈者可為白朮也其根如姜色黑蒼而味苦辛氣烈者可為蒼朮也予在東北西南諸州而親探之屢致觀誤謂有二術而今熟思則不然其色蒼白其狀小大其味厚薄是皆土地而雖有少異俱下物也強勿分二術以用之修治製法同白朮蓋二術留皮者當以米泔水浸半日去粗皮肆售者多削淨不可水浸更泄性味凡用不拘州土惟白為勝或謂漢產多白懲浸泔則雖脫亦生拙按蒼朮生白者非必懲乃糖也仲淳曰真茅朮蒼朮細而帶糖者也不必脫去而佳也辨別道地松岡先生曰漢蒼朮氣烈多膏不經制法而卒爾用之則發腹痛宜克炒用予亦屢試知之製法粗則發腹痛用者勿忽予每療雀眼用漢蒼朮多得效用和產則少見效不知漢產多膏故潤之而奏驗者歟書以俟後日之案而已氣味辛烈苦溫無毒功用甘而辛烈性溫而燥可升可降陰中陽也入足太陽陽明手太陰陽明太陽之經使忌同白朮功用亦相似但止發之間少有異蒼朮氣重體沉有雄壯上行之氣故除上濕發汗之功最大上能除濕下安太陰邪氣不傳入脾若補中焦除濕力大不及白朮與白朮止汗時異若無濕者豈敢用哉主治風寒濕痹死肌痙疽作蒸餌主頭痛消痰水逐皮間風水結腫除心下結滿及霍亂吐下不止暖胃消穀嗜食除惡氣弭災沴主大風𤸷痹心腹脹痛水腫脹滿除寒熱上嘔逆下泄冷痢治筋骨軟弱痃癖氣塊婦人冷氣癥瘕山嵐瘴氣溫疾明目暖水藏除濕發汗健胃安脾治痿散風益氣總解諸郁濕痰留飲或挾瘀血成窠囊脾濕下流濁瀝帶下滑瀉腸風遠志本經上品釋名服之能益智強志故有之稱小草莖葉青色而極細小故名之細草細小同意棘菀葽繞醒心枚三名未詳各方記述和漢俱有之俱皆真和有大葉小葉兩種以小葉者為是和產所所有之其苗細莖其葉細小似黃楊秋開細紫花花鋪喚姬荻者乃是也辨別道地皮有皺肉者良修治洗去土氣以甘草湯浸一宿去骨焙乾用或浸薑汁或浸酒當隨本方忌鐵器氣味苦溫無毒功用陰中之陽可升可降腎經氣分藥也入足少陰畏珍珠藜蘆蜚蠊蠐螬得茯苓葵子龍骨良心經有實火為心家實熱應用黃連生地黃者禁與參朮等補陽氣藥同用主治咳逆傷中補不足除邪氣利九竅益智慧耳目聰明不忘強志倍力利丈夫定心氣止驚悸益精去心下膈氣皮膚中熱面目黃殺天雄附子烏頭毒治健忘安魂魄令人不迷堅壯陽道長肌肉助筋骨婦人血噤失音小兒客忤腎積奔豚治一切癰疽玄參本經中品釋名玄黑也其莖微似人參故名黑參玄臺義同於上說鹿腸正馬逐馬鬼藏以上四味未詳馥草合香家用之故呼之野脂麻以形名各方記述二月生苗葉似脂麻對生又如槐柳而尖長有鋸齒細莖青紫色七月開花青碧色八月結子黑色恭曰玄參根苗並臭莖亦不似人參未見合香今按此說是也辨別道地和漢皆可用選黑潤者用之和產關東者根最佳諸州多有之修治用蒲草重重相隔蒸哂勿犯銅器犯之損人喉喪人目氣味鹹苦無毒功用足少陰腎經君藥也惡黃耆乾薑大棗山茱萸反藜蘆血少目昏停飲寒熱支滿血虛腹痛脾虛泄瀉並不宜服主治腹中寒熱積聚女子產乳余疾補腎氣令人明目暴中風傷寒身熱支滿狂邪忽忽不知人溫瘧洒洒血瘕下寒血除胸中氣下水止煩渴散頸下核癰腫心腹痛堅症定五藏熱風頭痛傷寒勞復治暴結熱散瘤瘻瘰癧治遊風補虛損心驚煩躁骨蒸傳屍邪氣止健忘消腫毒滋陰降火解斑毒利咽喉通小便血滯地榆本經中品釋名其葉似榆而長初生布地故名玉豉其花子紫黑色如豉故名酸赭其味酸其色赭故名各方記述宿根三月內生苗初生布地獨莖直上高三四尺對分出葉葉似榆葉而稍狹細長似鋸齒狀青色七月開花如椹子紫黑色根外黑裡紅似柳根辨別道地用和產近年花肆以苅萱稱和連茂加宇不可以名同誤用修治宜生用見火無功氣味甘酸苦寒無毒功用氣味俱薄其體沉而降陰中陽也入足厥陰少陰手足陽明經得發良惡麥冬伏丹砂雄黃硫黃性寒而下行凡脾胃虛寒作泄白痢久而胃弱胎產虛寒泄瀉血崩並禁服主治婦人乳產痓痛七傷帶下五漏止痛止汗除惡肉療金瘡止膿血諸瘻惡瘡熱瘡補絕傷產後內塞可作金瘡膏消酒除渴明目止冷熱痢疳痢止吐血鼻衄腸風月經不止血崩產前後諸血疾並水瀉治膽氣不足汁釀酒治風痹補腦搗汁塗虎犬蛇蟲傷主內漏止血不足紫草本經上品釋名此草花紫根紫可以染紫故名紫丹紫芙茈䓞地血鴉御草諸名未詳各方記述種紫草三月逐壟下子九月子熟時刈草春社前後採根陰乾其根頭有白毛如茸未花時採則根色鮮明花過時採則根色黯黑惡採時以石壓扁曝乾收時忌人溺及驢馬糞並煙氣皆令草黃色辨別道地嫩而紫色染手者佳修治去根取茸細銼用氣味甘苦鹹寒無毒功用入手足厥陰經血分苦寒能通利九竅痙瘡家虛脾胃弱泄瀉不思食小便清利者俱禁用主治心腹邪氣五疽利九竅通水道療腫脹滿痛以合膏小兒瘡及面皶治惡瘡癬斑疹痘毒活血涼血利大腸黃連本經上品釋名其根連珠而色黃故名玉連支連其根支連珠故名滴膽芝未詳各方記述苗高一尺以來似菊四月開花黃色六月結實似芹子色亦黃大抵有二種一種根粗無毛有珠如鷹爪形而堅實色深一種無珠多毛而中虛黃色稍淡各有所宜用和產和產亦有二種其葉似菊又似芹者其根亦有細大以菊葉者為勝和產於賀州佐州常州奧州越州藝州者皆俱佳辨別道地揀色黃而肥大連珠者佳根細者不佳修治去蘆及須洗淨銼炒用治本藏之火生用治肝膽之實火以豬膽汁浸炒治肝膽虛火以酸浸炒治上焦之火以酒炒治中焦火以薑汁炒治下焦之火以鹽水或朴硝炒治氣分濕熱之火以吳茱萸湯浸炒治血分塊中伏火以乾漆水炒治食積之火以黃土炒氣味苦寒無毒功用氣味俱厚可升可降陰中陽也入手少陰經黃芩龍骨理石為使惡菊花玄參白蘚皮芫花白殭蠶畏款冬牛膝解巴豆輕粉附子毒大忌豬肉冷水凡病人血少氣虛脾胃薄弱血不足驚悸不眠兼煩躁熱渴及產後不眠血虛發熱泄瀉腹痛小兒痘瘡陽虛作泄老人脾胃虛寒作瀉陰虛腎泄真陰不足內熱煩躁諸證咸忌之主治熱氣目痛眥傷泣出明目腸澼腹痛下利婦人陰中腫痛主五藏冷熱久下泄澼膿血止消渴大驚除水利骨調胃厚腸益膽療口瘡治止心腹痛驚悸煩躁潤心肺長肉止血天行熱疾止盜汗並瘡疥治小兒疳氣殺蟲羸瘦氣急鬱熱煩躁噁心心下痞滿主心病逆而盛心積伏梁去心竅惡血胡黃連宋開寶釋名其性味功用類黃連故名割孤露澤胡語也各方記述出波斯國海畔陸地苗如夏枯草根頭似烏嘶折之內似鸜鵒眼者良和產一種之草稱當藥一名千振秋開紫白花細小而味甚苦和俗採充胡黃連謂其能殺蟲消積小兒初生加甘草代用甘連湯以為習俗已久謂之胡黃連和方稱胡黃連者皆當藥也今按胡黃連當藥可俱通用和產比漢則氣味烈而形狀雖異是唯因其土地之有異形氣有和烈不同勿必疑焉辨別道地根似黃連大而不黃味苦蘆亦似黃連揀外黃心黑干如楊柳枯枝折之塵出如煙者乃為真修治削去粗皮銼少焙用氣味苦大寒無毒功用入足厥陰少陽經惡菊花玄參白鮮皮解巴豆毒忌豬肉使人漏精按陰血大虛真精耗竭而胃氣俱弱者雖見諸證亦勿可輕投不得已須與健脾安胃等藥同施為妥主治補肝膽明目治骨蒸勞熱三消五心煩熱婦人胎蒸虛驚冷熱泄痢五痔厚腸胃益顏色浸人乳汁點目治久痢成疳小兒驚癇寒熱不下食霍亂下痢傷寒咳嗽溫瘧理腰腎去陰汗去果子積黃芩本經中品釋名芩金也黃色應秋金也或曰芩黔乃黑黃之色腐腸腹中皆爛故名內虛有孔者名之妒婦心黯故比之經芩經宿同意謂舊根乎黃文印頭苦督郵三名未詳子芩新根圓者多內實條芩乃子芩也㹠尾芩鼠尾芩皆以形名之宿芩乃片芩破者名之各方記述苗長尺余莖幹粗如筋葉從地四面作叢生類紫草高一尺許亦有獨莖者葉細長青色兩兩相對六月開紫花根如知母粗細長四五寸辨別道地有漢來無和產一種有朝鮮黃芩色味不如漢產宜擇深色堅實者用修治刮去外表內枵切片炒之如得酒上行得豬膽除肝膽火得柴胡退寒熱得芍藥治下痢得桑皮瀉肺火得白朮安胎得厚朴黃連止腹痛氣味苦寒無毒功用氣厚味厚陰中微陽可升可降陰也入手太陰少陽經山茱萸龍骨為之使惡蔥實畏丹砂丹皮藜蘆凡中寒作泄中寒腹痛肝腎虛而少腹痛血虛腹痛脾虛泄瀉腎虛溏瀉脾虛水腫血枯經閉氣虛小水不利肺受心邪喘咳及血虛胎不安陰虛淋露法並禁用主治諸熱黃疽腸澼泄痢逐水下血閉惡瘡疽蝕火瘍療痰熱胃中熱小腹絞痛消穀利小腸女子血閉淋露下血小兒腹痛熱毒骨蒸寒熱往來腸胃不利破壅氣治五淋去關節煩悶解渴下氣主天行熱疾丁瘡排膿治乳癰發背涼心治肺中濕熱瀉肺火上逆療上熱目中腫赤瘀血壅盛上部積血補膀胱寒水安胎養陰退陽治風熱濕熱頭痛奔豚熱痛火咳肺痿喉腥諸失血柴胡本經上品釋名柴古作茈茈柴也胡系也以木代系相承也地薰芸蒿柴胡葉名芸蒿辛香可食地薰名亦同義山菜茹草嫩則可茹老則為柴故名之山菜亦同義各方記述其苗葉有如竹葉者乃和謂鎌倉柴胡者而漢稱銀柴胡者也藥肆名河原柴胡者翻白草根也名犁牛柴胡者白頭翁根也俱別物而誤謂之柴胡翻白草白頭翁俱有主用豈不辨別之哉辨別道地和漢可俱用稱鎌倉者真也可用之漢銀柴胡形色黃白多皺內有黃紋修治去蘆及須以水洗淨銼用勿令犯火欲上升用根酒浸欲下降用梢氣味苦平微寒無毒功用氣味俱輕陽也升也陰中陽手足少陽厥陰經引經藥也半夏為使惡皂莢蜀葵畏藜蘆女菀其性升而發散病人虛而氣升者忌之嘔吐及陰虛火熾炎者法所同忌瘧非少陽經者勿入亦無益精明目之理用者審之主治心腹腸胃中結氣飲食積聚寒熱邪氣推陳致新除傷寒心下煩熱諸痰熱結實胸中邪氣五藏間遊氣大腸停積水脹及濕痹拘攣作浴湯治熱勞骨節煩疼熱氣肩背疼痛勞乏羸瘦下氣消食宣暢氣血主時候內外熱不解除煩止驚消痰止嗽早晨潮熱寒熱往來膽癉婦人產前後諸熱心下痞胸脅痛諸瘧及肥氣寒熱婦人熱入血室小兒痘疹餘熱五疳羸熱前胡別錄釋名唐韻作湔胡名義未詳或云根似柴胡故名各方記述前胡有數種唯苗高二三尺色似斜蒿葉如野菊而細瘦嫩時可食秋月開紫白花類蛇床花其根皮黑肉白有香氣今觀和產無數種予栽圃觀之初生如野蜀葵而葉稍厚色深青其根生則不香甘干則氣香味甘自初生稍到長大及老成則葉形如不同故誤謂有數種者也乎辨別道地和產可用但香氣少者性不佳修治水洗土氣刮去蘆及髭銼用忌火氣味甘辛平微寒功用味薄氣清陽中之陰降也入手足之太陰陽明經半夏為之使惡皂莢畏藜蘆凡前胡之功皆有搜風下氣之效然可施之有餘而不可施氣虛血少之病故陰火煎熬真陰凝痰發嗽氣不歸元以致胸脅逆滿頭痛不因於痰而因於陰血虛內熱心煩外現寒熱而非外感者法並禁用明目益精其理亦謬主治痰滿胸脅中痞心腹結氣風頭痛去痰下氣治傷寒寒熱推陳致新去熱實及時氣內外俱熱治一切氣破癥結開胃下氣通五藏主霍亂轉筋骨節煩悶反胃嘔逆氣喘咳嗽安胎小兒一切疳氣清肺熱化痰熱散風邪防風本經上品釋名防者御也其功療風最要故名銅芸回芸未詳回草其花如茴香屏風防風隱語也䕡根其氣如芸蒿䕡蘭也百枝百蜚名義未詳各方記述根土黃色與蜀葵相類稍短莖葉俱青綠色莖深而葉淡葉似青蒿而闊大又似青蒿葉而稀疏似茴香開細白花結實似胡荽子而大和謂防風者有數種削防風者葉似牡丹色淺綠俗謂牡丹人參其根大削之而售木防風者嫩時為菜莖青有香氣乃防葵而非防風又有濱防風者葉如防葵而莖紫而根長一二尺黃白生海濱砂地栽之園圃亦繁茂味辛甘而無毒是亦防葵類也削濱俱與防風大異也今謂山人參者莖葉大似胡蘿蔔乃真防風也辨別道地和漢俱有之市中稱筆防風者入藥宜用之唐來者陳舊而多蠹蛀以黃色而潤者可揀用叉頭者發狂叉尾者發痼疾宜禁之修治水洗去蘆及二歧黑皮銼用或微焙氣味甘辛溫無毒功用氣味俱薄浮而升陽也入手足太陽經之本藥又行足陽明太陰二經為肝經氣分藥畏萆薢殺附子毒惡藜蘆白蘞乾薑芫花按脾虛氣逆陰虛盜汗陽虛自汗溏泄不因寒濕等症俱同忌主治大風頭眩痛惡風風邪目盲無所見風行周身骨節疼痛煩滿脅風痛頭面遊風去來四肢攣急下乳金瘡內癧治三十六般風男子一切勞勞補中益神風赤眼止冷淚及癱瘓通利五藏關脈治上焦風邪瀉肺實散頭目中滯氣經絡中留濕主上部見血搜肝氣獨活本經上品釋名獨一也活生也一莖直生不為風搖故名羌活羌地名羌青獨搖草此草得風不搖無風自動故名護羌使者胡王使者獨活似羌中來者為良故有二名長生草未詳各方記述時珍曰獨活羌活乃一類二種以中國者為獨活以西羌者為羌活李中梓曰羌活獨活本一物二種正如川芎蕪芎白朮蒼朮之義入用微有不同耳後人以為二物者非也大明曰獨活是羌活母也和邦自古執此說以不察羌獨元來有二種以宿新分二活者也辨別道地獨活羌活和漢俱有焉和稱獨活者宇土舊根也和與漢微似而大別漢亦有二種有節而如鞭者無節而黑皮者今以鞭節者為真和比漢則形狀雖不同和劑用來之久而知其功之可用則不可為非也以漢來者為真近年藥肆出真羌活者殆逼真予得一草栽之採根曝乾其形狀氣味俱不異知是真羌活也和稱羌活者宇土新根也故可用之況亦和羌活既用獨活獨羌一物主治亦相似則不拘古方而必並用而惟用獨活亦可矣修治獨活洗土氣去皮銼干或焙用羌活去黑皮腐爛用氣味獨活甘苦辛微溫無毒羌活苦辛溫無毒功用獨活氣厚味薄沉而升陰中陽也足少陰行經之藥羌活氣味俱薄而升陽手足太陽引經風藥入手足厥陰少陰經氣分凡血虛頭痛及偏身疼痛骨痛因而無寒熱者此屬內證誤用反致作劇主治風寒所擊金瘡止痛奔豚癇痓女子疝瘕諸風賊百節痛風無問新久諸中風濕冷奔喘逆氣皮膚苦癢手足攣痛勞損風毒齒痛羌活治賊風失音不語多癢手足不遂口面喎斜遍身𤸷痹血癩羌活獨活治一切風並氣筋骨攣拳骨節痠疼頭旋目赤疼痛利五藏及伏水氣風寒濕痹不仁諸風掉眩頸難伸去腎間風邪搜肝風瀉肝氣治項強腰脊痛散癰疽敗血升麻本經上品釋名其葉似麻其性升故名周麻周或指周地如今人呼川升麻之義落新婦名義未詳各方記述春生苗高三尺許葉似麻葉並青色四五月花開似粟穗白色六月以後結實根如蒿根紫黑色多須和產所在有之花如粟穗白色根赤小而不似唐來之根大而紫黑者不可為真又有一種花紫色如粟穗葉如麻葉莖有小毛高三尺以來根大而黑者希有之可以為真又有形狀短小花葉可愛者花鋪稱淡雪本草所謂落新婦乃小升麻也或以海根苧麻為升麻者皆不是辨別道地和漢俱有之漢來者其形細而黑極堅實削去皮青綠色者謂之雞骨升麻外黑裡白堅實者謂之鬼臉升麻今肆中稱俱俱利者形者形如烏藥可用之近年藥肆出真升麻者形狀殆逼真但味微苦澀恐少升提之功修治洗土氣去頭節黑皮及須腐爛而銼用忌火氣味甘辛苦平微寒無毒功用氣味俱薄浮而升陽也為足陽明太陰引經之藥得蔥白白芷入手陽明太陰引石膏止陽明齒痛參耆非此引不能上行同柴胡引生髮之氣上行同葛根能發陽明之汁凡吐血鼻衄咳嗽多痰陰虛火動氣逆嘔吐怔忡顛狂上盛上虛症切勿誤投主治解百毒殺百精闢瘟疫瘴氣邪氣蟲毒中惡腹痛時氣毒癘頭痛寒熱風腫諸毒喉痛口瘡疳䘌遊風腫毒小兒驚癇熱壅不通療癰腫豌豆瘡水煎綿沾拭瘡上治陽明頭痛補脾胃去皮膚風邪解肌肉間風熱療肺痿咳唾膿血能發浮汗牙根浮爛惡臭太陽鼽衄為瘡家聖藥消斑疹行瘀血治陽陷眩暈胸脅虛痛久泄下痢後重遺濁帶下崩中血淋下血陰痿足寒苦參本經上品釋名苦以味名參以功名苦識苦骨以形與味名地槐水槐菟槐驕槐野槐以葉如槐而名白莖芩莖綠白陵郎虎麻皆以似色而名乎各方記述生苗高三四尺以來葉碎青色極似槐葉春生冬凋其花黃色七八月結角如蘿蔔子角內有子二三粒如小豆而堅辨別道地揀黃色指大肉白嚼之極苦者佳修治用糯米泔浸一宿其腥穢氣浮在水面上須重重淘過蒸乾少入湯藥多作丸服治瘡浸酒治腸風炒至煙起為末氣味苦寒無毒功用氣沉純陰足少陰腎經君藥也又入手陽明足厥陰經玄參為之使惡貝母菟絲漏蘆及藜蘆伏汞制雌黃焰硝此物雖能泄血中之熱除濕熱生蟲為癘然以其味大苦氣大寒久服損腎氣肝腎虛而無大熱者勿服主治心腹結氣癥瘕積聚黃疸逐水除癰腫明目止淚除伏熱腸澼止渴醒酒小便黃赤療惡瘡下部䘌積酒飲治疥殺蟲治惡蟲脛酸熱毒風皮煩躁生瘡赤癩眉脫除大熱嗜睡治腹中冷痛中惡腹痛殺疳蟲炒存性米飲服治腸風瀉血並熱痢白蘚皮本經上品釋名此草根白色作羊膻氣故名白膻白羊鮮地羊鮮鮮者羊之氣以上諸名據之金雀兒椒其子累累如椒故有此名各方記述其葉似茱萸高尺余根皮白而心實花紫白色辨別道地漢來者真也和無產知者市人乃剝木槿根皮以假充真者甚非是矣修治洗土氣去粗皮銼用氣味苦寒無毒功用氣寒善行味苦性燥足太陰陽明經去濕熱藥也兼入手太陰陽明惡螵蛸桔梗茯苓萆薢凡得牛膝石斛薏苡仁黃柏蒼朮療足弱頑痹去下部濕熱多加金銀花佐以漢防己治下部一切濕瘡主治頭風黃疸咳逆淋瀝女子陰中腫痛濕痹死肌不可屈伸起止行步療四肢不安時行腹中大熱飲水小兒驚癇婦人產後余痛治一切熱毒風惡風瘡疥癬赤爛眉發脫脆皮肌壯熱惡寒解熱黃酒黃急黃谷黃勞黃通關節利九竅及血脈通小便水氣天行時疾頭痛眼疼治肺嗽延胡索宋開寶釋名玄言其色胡言生胡國索言其苗交紐也延胡索本名玄胡索避宋真宗諱改玄為延也各方記述三茅山西上龍洞種之每年寒露後栽立春後生苗葉如竹葉樣三月長三寸高根叢生如羊卵樣立夏掘起辨別道地有漢來而無和產亦無偽雜茅山玄胡索如半夏皮青黃肉黃形小而堅此品最為佳西玄胡索大而皮黑肉黃此樣力微修治銼微炒用上部酒炒中部醋炒下部鹽水炒氣味苦甘辛溫無毒功用可升可降陰中陽也純陽浮也入手足太陰厥陰經活血氣之神藥也然能走而不能守故經事先期及一切無血熱為病凡崩中淋露皆應補氣血涼血清熱則愈一切辛走之藥法所應禁主治破血婦人月經不調腹中結塊崩中淋露產後諸血病血運暴血衝上因損下血煮酒或酒磨服除風治氣暖腰膝止暴腰痛破症癖撲損瘀血落胎治心氣小腹痛散氣治腎氣通經絡活血利氣止痛通小便貝母本經中品釋名形如聚貝子故名𦯶音萌一作虻謂根狀如虻也勒母苦菜苦花空草藥實諸名義未詳各方記述二月生苗莖細青色葉亦青似蕎麥葉隨苗出七月開花碧綠色形如鼓子花八月採根有瓣子黃白色此有數種和有一種一干開白花狀似百合有芬芳可愛葉如牛蒡葉或有似南星葉者根亦如百合一顆大如龍眼干則片片真如貝母亦是貝母之類也辨別道地漢可用黃白輕鬆者為良油黑重硬者勿用獨顆非兩片者名丹龍眼不可入藥誤服令人筋脈永不收用黃精小藍汁合服立愈今藥肆以粒小者為上品以粒大者為下品按本草無大小之辨頤生微論既謂選大者則小為上之說甚不可用也修治去心糯米拌炒米熟為度或去心銼浸生薑汁日乾焙用氣味苦辛平寒無毒功用陰中微陽可升可降陰也入手太陰少陰經厚朴白薇為之使畏秦艽反烏頭俗以半夏燥有毒代以貝母不知貝母寒潤乃太陰肺經之藥肺為燥金性喜潤故專主肺家燥痰半夏燥濕乃太陰脾經陽明胃經之藥脾為濕也性喜燥故專主脾胃濕痰兩者天淵何可代乎若痰在脾經誤用貝母之潤投以所惡可翹首待斃灸如南星半夏天麻蒼白朮茯苓類治之者均非貝母之所司也主治傷寒煩熱淋瀝邪氣疝瘕喉脾乳蛾金瘡風痙療腹中結實心下滿洗洗惡風寒目眩項直咳嗽上氣止煩熱渴出汗安五藏利骨髓消痰潤心肺末和沙糖丸含止嗽燒灰油調傅人畜惡瘡斂瘡口主胸脅逆氣時疾黃疸研末點目去翳以七枚作末酒服治產難及胞衣不出與連翹同服主項下瘤癭疾茅根本經中品釋名茅葉如矛故名茹根其根牽連謂之茹易曰拔茅連茹是也蘭根未詳地筋根狀如筋故名各方記述春生芽布地如針俗謂之茅針亦可啖其益小兒夏生白花茸茸然至秋而枯其至潔白六月採之辨別道地茅有數種所謂白茅菅茅黃茅色茅惟有茅針之根為藥茅花亦入藥修治洗土氣去皮節銼用或焙忌鐵器氣味甘寒無毒功用因寒發噦中寒嘔吐濕痰停飲發熱並不得服主治勞傷虛羸補中益氣除瘀血閉寒熱利小便下五淋除客熱在腸胃止渴堅筋婦人崩中久服利人主婦人月經不勻通血脈淋瀝止吐衄諸血傷寒噦逆肺熱喘急水腫黃疸解酒毒茅針氣味甘平無毒主治下水治消渴能破血通小腸治鼻衄及暴下血惡瘡癰腫傅金瘡止血茅花氣味甘溫無毒主治煎飲止吐血衄血並塞鼻傅灸瘡不合罨刀箭金瘡止血並痛龍膽釋名葉如龍葵味苦如膽因為名陵遊名義未詳各方記述宿根黃白色下抽根十餘條類牛膝而短直上生苗高尺余四月生葉如嫩蒜細莖如小竹枝七月開花如牽牛花作鈴鐸狀青碧色冬後結實苗便枯俗呼草龍膽又山龍膽味苦澀葉經霜雪不凋與此同類而別種也辨別道地和產可用修治銅刀切去須及頭銼細甘草湯浸一宿漉出暴乾用氣味苦澀大寒功用氣味俱厚沉而降陰也足厥陰少陽經氣分藥也其用有四除下部風濕一也及濕熱二也臍下至足腫痛三也寒濕腳氣四也下行之功與防己同貫眾小豆為之使惡地黃防葵凡病脾胃兩虛因而作泄者忌之凡病虛而有熱者勿用空腹服餌之令人溺不禁以其太苦則下紲太甚故也主治骨間寒熱驚癇邪氣續絕傷定五藏殺蟲毒除胃中伏熱時氣溫熱泄下痢去腸中小蟲益肝膽氣止驚惕治小兒壯熱骨熱驚癇入心時疾熱黃癰腫口乾客忤疳氣熱狂明目止煩治瘡疥去目中黃及睛赤腫脹瘀肉高起痛不可忍退肝經邪熱除下焦濕熱之腫膀胱火療咽喉痛風熱盜汗細辛本經上品釋名根細而味極辛故名之小辛少辛義同上各地記述葉似小葵柔莖細根直而色紫味辛者細辛也葉似馬蹄莖微粗根曲而黃白色味亦辛者杜衡也一莖直上莖端生葉如傘根似細辛微粗直而黃白色味辛微苦者鬼督郵也似鬼督郵而色黑者及己也葉似小桑根根似細辛微粗長而黃色味辛而有臊氣者徐長卿也葉似柳而根似細辛粗長黃白色而味苦者白薇也似白薇而白直味甘者白前也或曰細辛根味極辛有紫白二色南部地方有之藥肆中往往以馬蹄香充之非是又有杜衡與馬蹄香相類俱根粗而少辛味本草注混二物為一蓋繇不識杜衡也杜衡其氣如蘼蕪北地有之或曰以加茂葵為細辛其根甚辛和俗稱細辛者杜衡也漢人亦混亂之又山野二種有根味似細辛者俗稱細葉細辛者應是白薇拙按加茂葵味雖薄亦細辛一類也松岡先生曰杜衡細辛一物也按爾雅蘅杜衡杜若之通名而繫於芳草本草有杜衡亂細辛之說諸家因襲而不正終杜衡細辛分為二物不知杜衡莖葉細辛是根也猶莎草香附天麻赤箭荷藕大戟澤漆之例分苗根之名而非二物略下先生此說可謂解千歲之疑惑者也辨別道地和漢俱在焉長直如發習習辛辣似蜀椒者為真和產以佐渡秋田為上南部次之今有薩摩逼真可用之修治切去蘆頭銼用忌火擇去雙葉者服之害人氣味大辛溫無毒功用氣厚於味陽也升也入足厥陰少陰血分為手少陰引經之藥惡黃耆狼毒山茱萸忌生菜貍肉畏硝石滑石反藜蘆細辛燥烈凡血虛內熱因成頭痛咳嗽者痛戒之主治咳逆上氣頭痛腦動百節拘攣風濕痹痛死肌久服明目利九竅溫中下氣破痰利水道開胸中滯結除喉痹齆鼻不聞香臭風癇癲疾下乳結汗不出血不行安五藏益肝膽通精氣添膽氣治嗽去皮風濕癢風眼淚下除齒痛血閉婦人血瀝腰痛含之去口臭潤肝燥治督脈為病脊強而厥治口舌生瘡大便燥結起目中倒睫當歸本經中品釋名當歸調血為女人要藥有思夫之意故有此名妊婦產後氣血昏亂者服之即定能使氣血各有所歸故名當歸山蘄白蘄蘄古芹字特以花葉似芹故得名文無古人相贈以芍藥相招以文無文無一名當歸芍藥一名將離各方記述春生苗綠葉有三瓣七八月開花似蒔蘿淺紫色根黑黃色以肉厚而不枯者為勝今觀和產者紫花少而白花多矣辨別道地和漢俱可用和產大和越後者為良出於大和者本草所謂馬尾當歸也出於越後者本草所謂鑽頭當歸也大和比較越後則有滋潤以可為勝修治凡用去頭尖硬處並塵土以水洗淨切片微焙行表酒洗行上酒浸頭止血而上行身養血而中守梢破血而下流全活血而不走氣味甘辛溫無毒功用氣味厚可升可降陽中微陰入手少陰足太陰厥陰經血分惡䕡茹濕面畏菖蒲海藻牡蠣生薑制雄黃與白朮芍藥生熟地則滋陰而補腎與川芎則上行頭角治血虛頭痛入薏苡牛膝則下行足膝治血不榮筋同四物加炒黑姜炒黑豆澤蘭益母治婦人產後百病同地榆金銀花滑石紅曲治帶下純血里結後重同牛膝鱉甲橘皮生薑治瘧在陰分久不止然其性泥滯風邪初旺及氣鬱者宜少用之凡腸胃薄弱泄瀉及一切脾胃病惡食不思食者並用禁之即在產後胎前亦不可用主治咳逆上氣溫瘧寒熱洗洗在皮膚中婦人漏下絕子諸惡瘡煮汁飲之溫中止痛除客血內塞中風痓汗不出濕痹中惡客氣虛冷補五藏生肌肉止嘔逆虛勞寒熱下痢腹痛齒痛女人瀝血腰痛崩中補諸不足治一切風一切氣補一切勞破惡血養新血及症癖腸胃冷治頭痛心腹諸痛潤腸胃筋骨皮膚治癰疽排膿止痛和血補血主痿癖嗜臥足下熱而痛衝脈為病氣逆裡急帶脈為病腹痛腰溶溶如坐水中川芎釋名出蜀中四川故名之元名芎藭或云頭芎窿藭高之象也此藥上行治頭腦諸疾故有名胡芎以胡戎者為佳故名香果香草故名山鞠窮左傳曰有山鞠窮蘼蕪葉為蘼蕪根為川芎撫芎小者也各方記述生葉似水芹胡荽蛇床輩作叢而莖細其葉倍香七八月開碎白花如蛇床子花根堅瘦黃黑色關中出者形塊重實作雀腦狀者為雀腦芎最有力辨別道地和漢俱可皆用有大葉小葉二種大葉者無香氣乃撫芎也和產丹後為上山城大和次之豐後為下近歲有出於奧州者形塊重實里色白不油嚼之微辛甘者佳也宜擇用修治洗土氣去蘆頭銼用忌火氣味辛苦溫無毒功用氣厚味薄浮而升陽也少陽本經引經藥入手足厥陰氣分白芷為之使畏黃連伏雌黃得細辛療金瘡止痛得牡蠣療頭風吐逆凡病人上盛下虛虛火炎上嘔吐咳嗽不止自汗易汗盜汗咽乾口燥發熱作渴煩躁法並忌之主治中風入腦頭痛寒痹筋攣緩急金瘡婦人血閉無子除腦中冷動面上遊風去來目淚出多涕唾忽忽如醉諸寒冷氣心腹堅痛中惡卒急腫痛脅風痛溫中內寒腰腳軟弱半身不遂胞衣不下一切風一切氣一切勞損一切血補五勞壯筋骨調眾脈破癥結宿血養新血吐血鼻血溺血腦癰發背瘰癧癭贅痔瘻瘡疥長肉排膿消瘀血搜肝氣補肝血潤肝燥補風虛燥濕止瀉痢行氣開鬱蜜和大丸夜服治風痰齒根出血含之藁本本經中品釋名本根也根上苗下似禾藁故名藁茇山海經名之鬼柳鬼新微莖三名未詳各方記述葉似白芷又似水芹而大五月有白花七八月結子根紫色辨別道地漢來者有二種稱𭕲牛樣者真也稱川芎樣者非真多用大葉芎藭根假偽者也修治洗土氣去蘆銼少焙用氣味苦辛微溫無毒功用氣厚味薄升也陽也足太陽本經藥惡䕡茹畏青葙子與木香同用治霧露之清邪中於上焦既治風又治濕各從其類也若溫病頭疼發熱口渴或骨疼及傷寒發於春夏陽證頭疼產後血虛火炎頭痛皆不宜服主治婦人疝症陰中塞腫痛腹中急除風頭痛長肌膚悅顏色闢霧露療風邪軃曳金療治一百六十種惡風鬼疰流入腰痛冷小便通血去頭風䵟皰太陽頭痛巔頂痛大寒犯腦痛連齒頰頭面身體皮膚風濕督脈為病脊強而厥治癰疽排膿內塞白芷本經上品釋名白茝音芷齊謂之茝芳香澤芬生於下澤有芳香故名苻蘺楚謂之蘺䖀晉謂之䖀莞音管葉名蒿麻藥楚謂之藥各方記述春生葉相對婆娑紫色闊三指許花微黃入伏後結實立秋後苗枯二八月採曝根長尺余粗細不等白色和產苗高三四尺莖葉類川芎而甚大花實亦似川芎而葉比川芎則薄而有香氣採者詳之辨別道地和漢可俱用和產以石見為上山城長池多種之皆為真有黃澤而不蛀蠹者宜擇用修治市人截片削以石灰拌勻曬收欲其不蛀而色白用時水洗淨銼用氣味辛溫無毒功用氣味俱輕陽也手陽明引經之藥當歸為之使惡旋覆花制雄黃硫黃毒其性升而溫嘔吐因於火者禁用漏下赤白陰虛火熾血熱所致者勿用癰疽已潰宜漸減去主治女人漏下赤白血閉陰腫寒熱頭風侵目淚出長肌膚潤澤顏色可作面脂療風邪久渴吐嘔兩脅滿頭眩目癢可作膏藥治目赤弩肉去面皯疵瘢補胎漏滑落破宿血補新血乳癰發背瘰癧腸風痔瘻瘡痍疥癬止痛排膿能蝕膿止心腹血刺痛女人瀝血腰痛血崩解利手陽明頭痛中風寒熱及肺經風熱頭面皮膚風痹燥癢治鼻淵鼻衄齒痛眉稜骨痛大腸風秘小便出血婦人血風眩運翻胃吐食解砒毒蛇傷刀箭金瘡芍藥本經中品釋名綽約美好貌此草花容綽約故名其花根能制食毒故有藥名將離芍藥離草也犁食白朮未詳余容花色嬌嫩可愛故名金芍藥花白者也木芍藥花赤者也小牡丹花千葉者也花相以牡丹為花王以芍藥為宰相各方記述春生紅芽作叢莖上三枝五葉似牡丹而狹長夏初開花有紅白紫數種秋時採根辨別道地有和漢而漢可用聞信州產山錫杖又謂之土鴉結皮掘採貨四方花葉如單瓣芍藥而微異即草芍藥也吾豫州山間有稱芍藥者其花多淡紅或白單瓣而與家園者不少異唯葉厚類牡丹根色白銼之則變灰色此信州謂土鴉結皮者乎子向以山芍藥移栽家園入初夏已開花花謝結實到深秋而實熱四折則其子深硃色大類通草實而與芍藥為異予始知信州所以稱土鴉結皮者是也鴉者朱也皮者實也皮實通訓則朱實也所以山芍藥亦與通草為同訓矣所謂土者賤稱也以是考之則山產與家園者似則雖似而不同也用者宜明辨審詳之又藥肆出字田芍藥其色白出於信州之類而非真近年藥肆出真芍藥為蒸熟堅扎者而其形狀色味逼真如乏唐無則用亦可也今觀唐來者其色皆赤而未見白者方書以赤白分稱之者所謂從花色歟未詳焉修治水浸去蘆頭銼焙忌鐵多生用避其寒酒炒入血藥醋炒血虛者煨用氣味苦酸寒無毒功用氣薄味厚陰也降也為手足太陰行經藥入肝脾血分須丸別本作雷丸為之使惡石斛芒硝畏硝石鱉甲小薊反藜蘆同白朮補脾同芎藭瀉肝同人參補氣同當歸補血同甘草止腹痛同黃連止瀉痢同防風發痘疹同姜溫經散濕凡中寒腹痛作泄腹中冷痛腸胃中覺冷等證忌之及泄瀉產後惡露已行少腹痛已止癰疽已潰並不宜服主治邪氣腹痛除血痹破堅積寒熱疝瘕止痛利小便益氣通順血脈緩中散惡血逐賊血去水氣利膀胱大小腸消癰腫時行寒熱中惡腹痛治藏府擁氣強五藏補腎氣治時疾骨熱婦人血閉不通能蝕膿女人一切病胎前產後諸疾治風補勞熱退熱除煩益氣驚狂頭痛目赤明目腸風瀉血痔痿發背瘡疥瀉肝安脾肺收胃氣止瀉利固腠理和血脈收陰氣斂逆氣理中氣治脾虛中滿心下痞脅下痛善噫肺急脹逆喘咳太陽鼽衄目澀肝血不足陽維病苦寒熱帶脈病苦腹痛滿腰溶溶如坐水中止下痢腹痛後重牡丹皮本經中品釋名牡丹乃天地之精為群花首花為陰成實葉為陽發生丹系赤色能瀉相離陰中之火故名藥根皮鼠姑鹿韭百兩全以上名義未詳木芍藥花似芍藥宿干似木故名花王群花中以牡丹為第一故名各方記述花有黃紫紅白數色其莖黑白色二月於梗上生苗葉花瓣止五六葉爾五月結子黑色類母丁香根黃白色可長五六寸大如筆管二八月採根陰乾用辨別道地和產可用不必拘山產家園而可以花美者為佳古人謂牡丹惟取紅白單瓣者入藥非必是和產山城大和多種出之而今以山城大和為上以攝津為中但州信州亦出之赤者利血白者補人揀肉厚者可用之修治洗土氣以銅刀劈破去骨酒洗微焙氣味苦辛微寒無毒功用陰中微陽入手厥陰足少陰經畏具母大黃菟絲子忌蒜胡荽伏砒四物湯加之治婦人骨蒸血分伏火非此不除凡婦人血崩及經行過期不淨並忌與行血藥同用主治寒熱中風瘛瘲驚癇邪氣除症堅瘀血留舍腸胃安五藏療癰瘡除時氣頭痛客熱五勞勞氣頭腰痛風噤癲疾治冷氣散諸痛女子經脈不通血瀝腰痛通關節血脈排膿消撲損瘀血續筋骨除風痹治胞下胎產後一切冷熱血氣治神志不足無汗之骨蒸衄血吐血和血生血涼血治血中伏火除煩熱木香本經上品釋名木香草類也本名蜜香因其香氣如蜜也緣沉香中有蜜香遂訛此為木香蜜香如上說青木香後人因呼馬兜鈴根為青木香乃呼此為南木香廣木香以別之五木香乃青木香也一株五根一莖五枝五葉葉間五節故名之南木香說見青木香下各方記述有數種葉似羊蹄而長大亦有如山藥而根大開紫花者不拘時月採根芽為藥宗奭曰常自岷州出塞得青木香持歸葉如牛蒡但狹長莖高二三尺花黃一如金錢其根即青木香也此種和亦有之其根不香也不可謂真辨別道地漢來者狀如枯骨味苦黏牙者為良修治以竹刃剝去土氣洗銼用忌火凡入理氣藥只生用若欲止瀉須以面里煨熟用氣味苦辛溫無毒功用氣味俱厚沉而降陰也味厚於氣陰中陽也三焦氣分藥能降諸氣膹郁肺虛有熱者心痛屬火者禁用主治邪氣闢毒強志主淋露久服不夢寤魔寐消毒殺鬼精物溫瘧蠱毒氣不足肌中偏寒治心腹一切氣膀胱冷痛嘔逆反胃霍亂泄瀉痢疾健脾消食安胎九種心痛積年冷氣痃癖症塊脹痛壅氣止沖煩悶羸劣女人血氣刺心痛不可忍末酒服之散滯氣調諸氣和胃氣泄肺氣行肝經氣煨熟實大腸治衝脈為病逆氣裡急主脬滲小便秘良薑別錄中品釋名始出高良郡花色如山姜因名高良薑蠻姜出嶺南蠻中故名之歟紅豆蔻即高良薑子也和藥肆誤名伊豆縮砂而售者也功用與良薑同矣各方記述春生莖葉如姜苗而大高一二尺許花紅紫色如山姜花辨別道地和漢俱為真和產根雖小亦可能用本草誤以杜若高良薑別出一條杜若即高良薑其子紅豆蔻也修治良薑紅豆蔻並宜炒過入藥亦有同吳茱萸東壁土炒過入藥用者氣味辛大溫無毒功用辛熱純陽浮也入足太陰陽明經噫逆胃寒者為要藥人參茯苓佐之為其溫胃解散胃中風邪也同酸制香附子為末治心口痛妙也身熱脈數者脾肺素有伏火者忌之主治暴冷胃中冷逆霍亂腹痛下氣益聲好顏色煮飲服之止痢治風破氣腹內久冷氣痛主風冷痹弱轉筋瀉痢反胃解酒毒消宿食含塊咽津治忽然噁心嘔清水逡巡即癢若口臭者同草豆蔻為末煎飲健脾胃寬噎膈破冷癖除瘴瘧草豆蔻宋開寶釋名此對肉豆蔻而名凡物盛多曰蔻豆象形也漏蔻南方異物志草果花性熱淹至京師能消酒毒故為果各方記述交趾嶺南有之秋結實於草上應時收採殼有稜無鱗甲似龍眼微銳黃色中子連綴甚辛香其形如豆一顆內子有百粒辨別道地南方所產和邦所無者也本草載草豆蔻與草果同條不分主治別名同物也修治以麵裹煨熟去皮用之氣味澀辛熱無毒功用陽也浮也入足太陰陽明經脾胃多寒濕鬱滯者與之相宜然多用能助脾熱傷肺損目主治溫中心腹痛嘔吐去口臭氣下氣止霍亂一切冷氣消酒毒調中補胃健脾消食去客寒心與胃痛治瘴癘寒瘧傷暑吐下泄痢噎膈反胃痞滿吐酸痰飲積聚婦人惡阻帶下除寒燥濕開鬱破氣殺魚肉毒制丹砂白豆蔻宋開寶釋名殼白內子如豆一團三四十粒似草豆蔻故名多骨伽古羅國呼之各方記述其草形如芭蕉葉似杜若長八九尺而光澤冬夏不凋花淺黃色子作朵如葡萄初出微青熟則變白七月採之今廣州宣州亦有之不及番舶來者辨別道地有漢來無和產圓大如白牽牛子其殼厚白其仁如縮砂仁入藥修治去皮研細不見火其功全在芳香之氣即入湯液但當研細待諸藥煎好乘沸點服妙氣味辛大溫無毒功用味薄氣厚輕清而升陽也浮也入手太陰經患噁心者嚼之最佳氣虛及肺脾胃中有熱人忌之主治積冷氣止吐逆反胃消穀下氣散肺中滯氣寬膈進食去白睛翳膜補肺氣益脾胃理元氣收脫氣治噎膈除瘧疾寒熱解酒毒縮砂宋開寶釋名一名砂仁皮緊厚縮皺微小形色如砂故名縮砂蜜實在根下仁藏殼內取其密藏之意各方記述生嶺南地苗似高良薑高三四尺葉長八九寸闊半寸許三四月開花在根下五六月成實五七十枚作一穗狀似益智而圓皮素厚而皺有粟紋外有細刺黃赤色皮間細子一團八隔可四十餘粒如大黍米微黑色內白而香似白豆蔻七八月採之辨別道地有漢來無和產和藥肆以粉碎者稱砂仁不去殼者稱縮砂不知縮砂一名砂仁也縮砂貴則雜益智以售之可擇用今藥肆稱東京者為佳稱交趾者粒扁小而不佳稱伊豆縮砂者紅豆蔻也勿用修治去殼包布揉取仁銼用或先和皮慢火炒熟去殼研用氣味辛澀溫無毒功用辛溫陽也浮也入手足太陰陽明太陽足少陰七經得白檀香豆蔻為使入脾得人參益智為使入肺得黃蘗茯苓為使入腎得赤白石脂為使入大小腸也若腎氣不歸元非此嚮導不濟然性燥火炎者忌之胎婦雖所宜氣虛者多服反致難產主治虛勞冷瀉宿食不消赤白泄痢腹中虛痛下氣主冷氣痛止休息氣痢勞損消化水穀溫暖肝腎上氣咳嗽奔豚鬼疰驚癇邪氣一切氣霍亂轉筋能起酒香味和中行氣止痛安胎治脾胃氣結滯不散補肺醒脾養胃益腎理元氣通滯氣散寒飲脹痞噎膈嘔吐止女子崩中除咽喉口齒浮熱化銅鐵骨哽益智宋開寶釋名脾主智此物能益脾胃故也各方記述益智子如筆頭長七八分二月花連著實五六月熟味辛雜五味中飲酒芬芳亦可鹽曝為粽食辨別道地漢來一種而無雜偽修治去殼鹽水炒研用制樣與縮砂同氣味辛溫無毒功用可升可降陽也入手足少陰足太陰經大辛行陽退陰之藥也三焦命門氣弱者宜之心者脾之母進食不止於和脾蓋火能生土故古人進食必先益智土中益火也如脾家有濕熱痰火心經與三焦火動者俱禁服治虛寒之症當於補藥內兼用之勿多服主治遺精虛漏小便餘瀝益氣安神補不足利三焦調諸氣夜多小便者取二十四枚碎入鹽同煎服有奇驗治客寒犯胃和中益氣及人多唾益脾胃理元氣冷氣腹痛心氣不足夢泄赤濁熱傷心系吐血血崩諸證肉豆蔻宋開寶釋名去殼只用肉花實似豆蔻而無核故名肉果對草果而言乎迦拘勒胡名各方記述中國無之今嶺南人家亦種之春生苗夏抽莖開花結實似豆蔻六七月採狀雖似豆蔻而皮肉之顆則不同外有皺紋而內有斑纈紋如檳榔紋辨別道地漢來一種而無雜偽形類彈丸油色肥實者佳修治以糯米粉裹於糠火中煨熟去粉用勿犯鐵器氣味辛熱無毒功用入手足陽明經足太陰經若病人有火瀉痢初起及中暑熱瀉傷風下血濕熱積滯方盛皆不可服主治溫中消食止泄治積冷心腹脹痛霍亂中惡鬼氣冷疰嘔沫冷氣小兒乳霍調中下氣開胃解酒毒下氣治宿食痰飲冷熱虛泄赤白痢暖脾胃固大腸補骨脂宋開寶釋名其功能補添人之骨脂故名破故紙蕃人呼為補骨鴟語訛為破故紙也婆固脂語訛也故韭子因其子之狀相似也各方記述生嶺南諸州及波斯國莖高三四尺葉小似薄荷花微紫色實似麻子圓扁而黑九月採辨別道地有漢來而無和產亦無雜偽南番者色赤廣南者色綠修治微炒用或用鹽酒浸一宿蒸過曬微炒用氣味苦辛大溫無毒功用陰中之陽可升可降入足少陰經惡甘草忌蕓薹及諸血得胡桃胡麻良性過於燥陰虛火動大便秘結者戒之主治五勞七傷風虛冷骨髓傷敗腎冷精流及婦人血氣墮胎男子腰疼膝冷囊濕逐諸冷痹頑止小便腹中冷助陽事明耳目治腎泄通命門暖丹田斂精神薑黃唐本草釋名根盤屈黃色類生薑而圓有節故名蒁生海南者即莪蒁生江南者即為薑黃寶鼎香名義未詳各方記述葉青綠長一二尺許闊三四寸有斜紋如紅蕉葉而小花紅白色至中秋漸凋春末方生其花先生次方生葉不結實八月採根片切暴乾辨別道地鬱金薑黃蒁藥三物形狀功用相近折之色黃者為鬱金色赤者為薑黃黃青者為莪蒁一類而三種也色比鬱金甚黃形較鬱金稍大兩藥實不同種扁如乾薑形者為片子薑黃圓如蟬腹形者為蟬肚鬱金片子薑黃今不來以姜形者為薑黃以蟬腹者為鬱金以別之耳修治磨去上皮銼用忌火氣味苦辛溫無毒功用陽中之陰可升可降入足厥陰太陰經凡病屬血虛者勿誤用則愈傷血分慎之主治心腹結積疰忤下氣破血除風熱消癰腫治癥瘕血塊通月經撲損瘀血止暴風痛冷氣下食祛邪辟惡治氣脹產後敗血攻心治風痹臂痛鬱金唐本草釋名產於鬱林郡中色黃類金故名一曰治郁遏不能升者因名馬蒁形似莪蒁而醫馬病故名各方記述苗似薑黃花白質紅秋末出莖心而無實其根黃赤取四畔子根去皮火干辨別道地琉球國多出之和邦亦有之今藥鋪有稱頭鬱金稱軸鬱金非元有二種耳以形之大小別之稱軸者形似姜故為薑黃形似蟬肚者為鬱金而售之其形外黃內赤體圓有橫紋如蟬腹狀圓尖而光明脆徹苦中帶甘味者乃真宜擇用修治水洗銼用氣味辛苦寒無毒功用氣味俱厚純陰入手少陰太陰足厥陰陽明經凡病屬陰虛火炎鮮血妄行溢出上竅而非氣分拂逆肺肝逆氣不可輕投也主治血積下氣生肌止血破惡血血淋尿血金瘡單用治女人宿血氣心痛冷氣結聚溫醋磨傅之亦治馬脹涼心治陽毒入胃下血頻痛銖血氣心腹痛產後敗血衝心欲死失心顛狂蠱毒莪朮宋開寶釋名莪俄也俄然茂盛術濁也根體重濁故名蒁藥各方記述三月生苗高二三尺葉類蘘荷五月有花作穗黃色頭微紫根如生薑而茂在根下似雞鴨卵大小不常九月採削去粗皮蒸熟暴乾用辨別道地和漢俱有之而和產少矣形狀似鬱金葉粗澀無光澤為異根色帶青黃與薑黃鬱金一物而別種也修治此物極堅硬難搗須熱灰中煨令透乘熱搗之即碎如粉得酒醋良今人多醋浸煨用欲入血則醋少欲入氣則火炮用之氣味苦辛溫無毒功用陽中之陰降也入足厥陰氣分又入手太陰足陽明經鬱金入心專司血病薑黃入脾兼治血中之氣蓬朮入肝治氣中之血稍為不同若氣血兩虛脾胃素弱而無積滯者不可用主治心腹痛中惡疰忤鬼氣霍亂冷氣吐酸水解毒食飲不消酒研服之又療婦人血氣結積丈夫奔豚破痃癖冷氣以酒醋磨服治一切氣開胃消食通月經消瘀血止撲損痛下血及內損惡血通肝經聚血三稜宋開寶釋名葉有三稜故名京三稜生荊楚地故名荊三稜作京者誤矣草三稜形如雞爪屈曲根上生根雞爪三稜乃草三稜也黑三稜色若烏梅輕鬆去皮白石三稜色黃體重堅硬如石各方記述三稜多生荒廢陂地濕地春時叢生夏秋抽莖莖端復生數葉開花六七枚花皆細碎成穗黃紫色中有細子其葉莖花實俱有三稜如棕之葉莖莖中有白穰剖之織物柔韌如藤辨別道地和漢俱有之形狀圓而有須者為真形扁而成片者茭蒲根也或以䓮艹溲根磚子苗偽雜者多矣宜擇用修治麵包火炮加醋浸復炒用或煮熟焙乾亦良氣味苦溫無毒功用陰中陽可升可降入足厥陰經為血中氣藥雖入肝經血分然脾統血肺主氣宜併入焉蓋血隨氣行氣聚則血不流故生症癖之患非此不治其斬關之勢能泄真氣真氣虛者勿用故凡用以消導必資人參芍藥地黃之力而後可以無弊主治老癖症積聚結塊產後惡血血結通月水墮胎止痛利氣治氣脹破積氣消撲損瘀血婦人血脈不調心腹痛血暈心膈痛飲食不消通肝經積血治瘡腫堅硬下乳汁香附子別錄中品釋名即莎草根也根若附子周匝多毛氣香因名雀頭香象雀頭一名雀腦香草附子水香稜葉似三稜故名水巴戟義同上水莎侯莎其實緹是也莎結根名夫須薹笠名賤夫所須此草可為笠及雨衣故名續根草蜀郡名之地藾根隴西名之地毛多毛故名歟各方記述莎葉如老韭葉而硬光澤有劍脊稜五六月中抽一莖三稜中空莖端復出數葉開青花成穗如黍中有細子其根有須須下結子一二枚轉相延生子上有細黑毛大者如羊棗而兩頭尖得燎去毛暴乾松岡先生曰有二種根珠有結一顆者真也連綴二三四五顆者乃是䓮艹溲根而堤邊沙地最多矣辨別道地和產為真攝津州住吉邊多出之狀有細大擇大粒者用之修治水洗銼用勿犯鐵器或炒或生或酒醋鹽水薑汁童便浸炒諸法皆從本方氣味微苦辛澀無毒功用氣厚於味陽中之陰足厥陰手少陽主藥亦入手太陰經得童便醋芎藭蒼朮而良凡病則氣滯故香附子於氣分為君臣以參耆佐以甘草治虛怯甚速也獨用血為耗耳女人月事先期者血熱也法當涼血禁用此藥大燥少血之人並新產耗氣之婦亦所禁服主治除胸中熱充皮毛久服益氣長鬚眉治心腹中客熱膀胱間連脅下氣妨常日憂愁不樂心忪少氣一切氣霍亂吐瀉腹痛腎氣膀胱冷氣散時氣寒疫利三焦解六郁消飲食積聚痰飲痞滿胕腫腹脹腳氣止心腹肢體頭目齒耳諸痛癰疽瘡瘍吐血下血尿血婦人崩漏帶下月候不調胎前產後百病煎飲散氣鬱利胸膈降痰熱藿香宋嘉祐釋名豆葉曰藿其葉似之或主療霍亂殊功故名各方記述二月生苗莖梗甚密作叢葉似桑而小薄七月採收氣甚芬香又曰藿香方莖有節中虛葉微似茄葉辨別道地漢來有稱青葉者芬香為真而可用有名埋藿香土藿香者非真混入茄葉泥土甚多偽雜不可用和產稱藿香者有葉不似茄而似桑而開紫花而不太芳香亦非真不可用修治揀去枝梗水洗銼用氣味甘辛微溫無毒功用味薄氣厚可升可降陽也入手足太陰經得人參橘皮木瓜茯苓縮砂轉吐瀉治筋霍亂得木香丁香蘇葉人參生薑治中寒吐逆不止若病因陰虛火旺胃弱欲嘔及胃熱作嘔中焦火盛邪實作脹法並禁用主治風水毒腫去惡氣止霍亂心腹痛脾胃吐逆為要藥助胃氣開胃口進飲食溫中快氣肺虛有寒上焦壅熱飲酒口臭煎湯漱之澤蘭本經中品釋名葉似蘭生澤傍故名水香都梁香虎蘭虎蒲龍棗以上諸名未詳孩兒菊俗呼之風藥齊人呼之地筍其根可食故云各方記述生下地水旁葉似蘭草而不甚香高二三尺莖幹青紫色作四稜葉生相對如薄荷七月開花帶紫白色萼通紫色亦似薄荷花今見澤蘭莖方節短而葉鋸齒有毛者也今按蘭有三種所謂蘭草澤蘭建蘭也蘭草與澤蘭同類而有殊俱生水旁下濕之地惟以莖圓節長而葉光有歧為蘭草雷斆所謂大澤蘭楚辭文選騷人墨客所賦之蘭而非今之蘭花也後人誤以建蘭充之建蘭一名幽蘭葉似菅茅秋花有芬芳栽盆上坐右為玩好者而非握蘭浴蘭之物採者詳審之辨別道地和產為真四五月盛時摘青葉陰乾可用此物在八新之一藥肆所貯者多陳久不可不自擇用修治水洗銼用氣味甘苦辛微溫無毒功用陰中之陽可升可降足太陰厥陰經藥也防己為之使凡產後陰戶燥熱遂成翻花用澤蘭四兩薰洗二三次再入枯礬煎洗即安主治金瘡癰腫瘡膿產後金瘡內塞產後腹痛頻產血氣衰冷成勞瘦羸婦人血瀝腰痛產前後百病通九竅利關節養血氣破宿血消癥瘕通小腸長肌肉消撲損瘀血治鼻血吐血頭風目痛婦人勞瘦丈夫面黃香薷別錄中品釋名薷本作葇其氣香其葉柔香葇香茸草初生曰茸香菜作蔬菜故名蜜蜂草象其花房也各方記述生山野間方莖尖葉有刻缺頗似黃荊葉而小九月開紫花為穗有細子細葉者僅高數寸葉如落帚葉即石香薷也辨別道地和產可用藥鋪稱長刀香薷者為真其穗長而斜形似眉尖刀故藥肆名之陳年者良修治水洗銼用忌火去莖用葉及穗氣味辛微溫無毒功用可升可降陽也入手太陰少陰足陽明太陰經入肺胃二經夏月解表之劑也若勞役受熱用香薷是重虛其表反助其熱害人不淺氣虛者尤不可多服主治霍亂腹痛吐下散水腫去熱卒轉筋者煮汁頓服半升即止為末水服止鼻衄下氣除煩熱療嘔逆冷氣春月煮飲代茶可無熱病調中溫胃含汁漱口去臭氣主腳氣寒熱荊芥本經上品釋名本經所謂假蘇也氣味辛香如蘇如姜如芥故名姜芥荊姜聲訛謂為荊芥非也各方記述荊芥原是野生二月生苗方莖細葉似獨帚葉而狹小淡黃綠色八月開小花作穗成房如紫蘇房內有細子如葶藶子狀黃赤色連穗收採用之辨別道地和產真也布子甚繁茂家園栽蒔採收穗以可供藥用修治去枝葉生用治下焦血炒黑用氣味辛苦溫無毒功用氣味俱薄浮而升陽也入手太陰足厥陰經與河豚黃顙魚驢肉相反若同日食之致喪命病人氣虛寒熱表虛有汗陰虛火炎面赤因而頭痛者俱禁用主治寒熱鼠瘻瘰癧生瘡破結聚氣下瘀血除濕疽去邪除勞渴冷風出汗煮汁服之搗爛醋和傅丁腫腫毒單用治惡風賊風口面喎斜遍身𤸷痹心虛忘事益力添精辟邪毒氣通利血脈傳送五藏不足氣助脾胃主血勞風氣壅滿背脊疼痛虛汗理丈夫腳氣筋骨煩疼及陰陽毒傷寒頭痛頭旋目眩手足筋急利五藏消食下氣醒酒作菜生熟皆可食並煎茶飲之以豉汁煎服治暴傷寒能發汗治婦人血風及瘡疥為要藥產後中風身強直研末酒服散風熱清頭目利咽喉消瘡腫治項強目中黑花及生瘡陰㿗吐血衄血下血血痢崩中痔漏薄荷唐本草釋名薄荷俗稱也菝𦽅食性本草作之蕃荷菜千金方作之吳菝𦽅蘇州者為勝以雖胡菝𦽅也南薄荷一種有龍腦薄荷所以別之金錢薄荷其葉頗如錢也蔢荷原始曰葉青蔢荷乃花葉總名蔢薄聲近故俗呼薄荷各方記述二月宿根生苗方莖赤色其葉對生似荏而尖長經冬根不死夏秋採莖葉曝乾辨別道地和產真可用藥肆今稱龍腦薄荷者良按薄荷水蘇俱名之龍腦薄荷二物同名也水蘇方莖中虛形狀似紫蘇葉而微長密齒面皺色蒼白氣甚芬香好生山崖水傍藥肆不售之宜自採取修治去梗用藥忌火氣味辛溫無毒功用氣味俱薄浮而升陽也入手太陰少陰厥陰足厥陰經凡病人新好勿服恐致虛汗亡陽咳嗽若因肺虛寒客之無熱症陰虛人發熱者勿服以出汗竭其津液也瘦弱人久用動消渴病主治賊風傷寒發汗惡氣心腹脹滿霍亂宿食不消下氣煮汁服之發汗大解作菜久食卻腎氣辟邪毒除勞熱令人口氣香潔煎湯洗惡瘡通利關節發毒汗去憤氣破血止痢療陰陽毒傷寒頭痛四季宜食治中風失音吐痰主傷風頭腦風通關格及小兒風涎為要藥杵汁服夫心藏風熱清頭目除風熱利咽喉口齒諸病治瘰癧瘡疥風瘙癮𤺋搗汁含漱去舌胎語澀挼葉塞鼻止衄血塗蜂螫蛇傷紫蘇別錄中品釋名蘇從穌音酥舒暢也蘇性舒暢行氣和血故謂之或曰蘇苴也形氣土苴也故名赤蘇桂荏蘇乃荏類而味更辛如桂故名各方記述處處有之以背面皆紫者長夏採莖葉秋採子有數種水蘇魚蘇山魚蘇皆是荏類白蘇乃荏也辨別道地和稱縮緬者其葉有皺紋而背面皆紫色芳香清烈以為良亦有其面青背紫者面紫背青者皆不堪用藥肆所售者不揀背面青紫而混同之宜自採收修治擇新水洗銼用忌火氣味辛溫無毒功用可升可降陽也入手太陰足陽明經味辛而入氣分色紫而入血分久服泄人真氣病屬氣虛表虛因發寒熱或惡寒及頭痛者慎毋投之不可同鯉魚食生毒瘡若脾胃寒人多致滑泄往往不覺蘇梗下諸氣體稍虛者宜用主治下氣除寒中除寒熱治一切冷氣心腹脹滿止霍亂轉筋開胃下食止腳氣通大小腸通心經益脾胃煮飲尤勝與橘皮相宜解肌發表散風寒行氣寬中消痰利肺和血溫中止痛定喘安胎解魚蟹毒治蛇犬傷以葉生食作羹殺一切魚肉毒蘇子治下氣肺氣喘急菊花本經上品釋名菊鞠也必鞠養而後得佳菊或曰鞠窮也九月有黃花華事至此而窮故名節華取應其節使也女節女菙女莖日精更生傳延年治蘠金蕊陰成周盈女節女華菊花之名也治蘠日精根之名也日精更生周盈皆一菊而根莖花實之名異也各方記述菊之品凡百種宿根自生莖葉花色品品不同蕊如蜂窠中有細子亦可捺種嫩葉及花皆可食生田野味苦莖青名苦薏拯疴反傷胃惟培家園味甜莖紫名甘菊入劑大補陰血辨別道地和產白紅黃三種宜入藥用以其黃者為良揀用其千瓣而味甘者而不可用其單瓣而味苦者修治忌火去蒂氣味甘微苦平無毒功用苦甘微寒可升可降陰中微陽白朮枸杞桑白皮為之使入肺心肝脾胃大小腸味甘者陰血兼補味苦者大腸胃氣黃者入金水陰分白者入金水陽分治頭風紅者行婦人血分花葉俱可作枕明目主治諸風頭眩腫痛目欲脫淚出皮膚死肌惡風濕痹久服利血氣輕身耐老延年療腰痛去來陶陶除胸中煩熱安腸胃利五藏調四肢治頭目風熱風旋倒地腦骨疼痛身上一切遊風令消散利血脈並無所忌養目血去翳膜主肝氣不足茵陳本經上品釋名蒿類經冬不凋更因舊苗而生新葉故名茵陳蒿各方記述二月生苗其莖如艾其葉如淡色青蒿而背白葉歧緊細而扁整九月開細花黃色結實大如艾辨別道地和可用夏月盛時採葉陰乾而收之茵陳青蒿黃花蒿形狀頗相似宜自採擇修治去莖用葉忌火氣味苦微寒無毒功用陰中微陽入足太陽經通腠理主黃疸利小便然蓄血發黃者禁用主治風濕寒熱邪氣熱結黃疸治通身發黃小便不利除頭熱去伏瘕通關節去滯熱傷寒用之益母草本經上品釋名其功宜婦人故名茺蔚此草及子皆充盛故名益明明目故名貞蔚貞者婦德故稱之歟蓷臭穢也乃充蔚也野天麻莖方類麻豬麻豬喜食之火梗義未詳郁臭草此草有臭氣人呼臭草苦抵草義未詳夏枯草夏至後枯故名土質汗質汗出西番乃熱血合諸藥煎成治金瘡折傷益母亦可作煎治折傷故有質汗各方記述近水濕處處甚繁春初生苗如嫩蒿入夏長三四尺莖方如黃麻莖其葉如艾葉而背青一梗三葉葉有尖歧寸許節節生穗叢簇抱莖四五月間穗內開小花紅紫花亦有微白花者每萼內有細子四粒粒大如茼蒿子又有三稜褐色辨別道地和產可用五月採葉陰乾用此實名茺蔚子又名巨勝子本草謂藥肆往往以作巨勝子貨之巨勝子者黑胡麻子也不可以名同而混用修治水洗銼用忌銅鐵或不忌氣味辛微苦無毒功用可升可降陰中陽也入手足厥陰經制硫黃砒石白花者入氣分紫花者入血分為調胎產諸疾之要藥性善行走能行血通經血崩禁用活血補陰故能明目然瞳子散大禁用為其辛溫主散能助火也惟熱血欲貫瞳人者與涼血藥同用則不忌主治癮𤺋可作浴湯搗汁服主浮腫下水消惡毒丁腫乳癰丹遊等毒並稱之又服汁主子死腹中產後血脈悶滴汁入耳中主聤耳搗傳蛇虺毒入面藥令人光澤治粉刺活血破血調經解毒治胎漏產難胎衣不下血運血風血痛崩中漏下尿血瀉血疳痢痔疾打撲內損瘀血大便小便不通夏枯草本經上品釋名夏至後即枯故名夕句乃東燕面錢色草以上名義未詳各方記述苗高尺許其莖微方葉對節生似旋覆葉而長大有細齒背白上多氣脈紋路莖端開花作穗長一二寸穗中開淡紫小花一穗有細子四粒辨別道地和產為真有一干者或叢生者亦偶有白花者花色可愛松岡先生曰此草謂入夏而枯今觀革匍草入夏而不枯人疑非真此不詳審考窮之誤也此物新苗已生則舊根乃枯是新陳相代者也能與入夏枯之說合乃真也和邦自古用革匍草每每有經驗宜用之修治莖葉花穗俱銼用治目疼以砂糖水浸一宿氣味苦辛寒無毒功用獨入足厥陰經土瓜為之使伏汞砂此草治目珠疼至夜則甚者神效此草無毒除治瘰癧鼠瘻及散癭結氣消癰腫乳岩之外無別用然久用亦防傷胃與參朮用方可久服無弊主治寒熱瘰癧鼠瘻頭瘡破症散癭結氣腳腫濕痹輕身旋覆花本經下品釋名花綠繁茂圓而覆下故名金沸草夏開黃花盜竊金氣故名金錢草滴滴金盜庚夏菊戴椹以上諸名因花狀而命也各方記述花狀如金錢水澤邊生者花小瓣單人家栽者花大蕊簇蓋壤瘠使然其根細白辨別道地和產可用有單瓣千葉二種宜採單瓣者入藥用修治去皮及蒂洗淨微焙氣味鹹甘微溫有小毒功用陰中之陽可升可降入手太陰陽明足太陰厥陰經葉消疔腫根治風濕但是走散之品非虛衰者所宜冷利及大腸虛寒人禁用惟傷寒汗下後心下痞堅噫氣不除者宜此主治結氣脅下滿驚悸除水去五藏間寒熱補中下氣消胸上痰結唾如膠漆心胸痰水膀胱留飲風氣濕痹皮間死肉目中眵䁾利大腸通血脈益色澤主水腫開胃止嘔逆不下食行痰水夫頭目風消堅軟痞治噫氣紅花宋開寶釋名紅藍花其花紅色葉頗似藍故名黃藍花帶黃故名各方記述冬月布子於熟地至春生初生嫩葉苗亦可食其葉如小薊葉至五月開花如大薊花而紅色侵晨採花搗熟以水淘布袋絞去黃汁又搗以酸粟米泔清又淘又絞汁以青蒿覆一宿曬乾或捏成薄餅陰乾收之入藥搓碎用辨別道地和產可用宜擇新花鮮明而用之又有稱錢花者藥氣最劣惟可入染用而不可供藥用修治酒噴微焙用或生用氣味辛甘苦澀功用陰中之陽入手少陰足厥陰經從桃仁大黃而能破血佐當歸地黃而能補血少用養血多用破血主治產後血運口噤腹內惡血不盡絞痛胎死腹中並酒煮服亦主蠱毒活血潤燥止痛散腫通經大薊小薊別錄中品釋名薊猶髻其花如髻故名虎薊大薊貓薊小薊因其苗狀猙獰而名馬薊形狀以大者稱馬刺薊多刺故名山牛蒡其根似牛蒡雞項草其頸如雞之項千針草野紅花二名皆言花狀各方記述小薊處處有之二月生苗二三寸時並根作葉茹食甚美四月高尺余多刺心中出花如紅藍花而青紫色九月採根陰乾用大薊苗根與此相似但肥大爾辨別道地和可用山原野地處處有之形狀亦有大小數種花色多紫白紅淡白之品宜擇紫花者可入藥用修治酒洗或童便拌微炒大小同制氣味苦甘溫無毒大小同功用入手太陰厥陰經大薊胃弱泄泄及血虛不思飲食者皆不利二薊性味主療皆同破血之外亦無他長亦不益人但大薊兼療癰疽而小薊只可退熱不能消腫也主治大薊根女子赤白沃安胎止吐血鼻衄搗根絞汁服半升主崩中血下立瘥葉治腸癰瘀血作運撲損生研酒服又惡瘡疥癬同鹽研罨之小薊根破宿血生新血暴下血血崩金瘡出血嘔血等絞取汁溫服作煎和糖合金瘡及蜘蛛蛇蠍毒服之治熱毒風並胸膈煩悶開胃下食退熱作菜食除風熱夏月熱煩不止牛蒡子別錄中品釋名牛好食其根因名蒡字書草名惡實其實狀惡而多刺鉤故名大力子稱實彭翁菜稱根便牽牛俚人呼之蝙蝠刺有刺故名鼠黏實殼多刺鼠過之則綴惹不可脫故名各方記述三月生苗莖高者三四尺四月開花成叢淡紫色結實如楓球而小萼上細刺百十攢簇之一梂有子數十顆其根大者如臂長者近尺其色灰黲七月採子十月採根辨別道地和產採子用之根和邦為食品而賞美之本朝食鑑詳載之故今不贅修治子揀淨以酒拌蒸待有白霜重出以布拭去焙乾搗粉用氣味苦辛溫無毒功用陽中之陰升也或曰降也入手太陰足陽明經為散風除熱解毒之要藥痘瘡家惟宜於血熱便閉之症若氣虛色白大便自利或泄瀉者勿用癰疽已潰非便閉勿服主治明目除風傷風毒腫諸痿去丹石毒利腰腳食前熟挼三枚吞之散諸結節筋骨煩熱毒吞一枚出癰疽頭炒研煎飲通利小便潤肺散氣利咽膈去皮膚風通十二經消斑疹毒麻黃本經中品釋名春叢生如麻至夏長及一尺上有黃花嗅之微有麻氣故名龍沙卑相卑監諸名殊不可解各方記述春生苗至夏五月則長及一尺以來梢上有黃花結實如百合而小又似皂莢子味甜辨別道地和漢俱用之沫使人煩輕虛者為良堅實者名云花子治馬疥修治宜用陳久者去根節煮數沸掠去上沫焙乾用根節水洗銼用氣味甘辛苦溫無毒功用氣味俱薄陽也升也氣清而浮手太陰之藥入足太陽經兼手足少陰陽明黃芩為之佐厚朴白薇為之使惡辛夷石葦專司冬令寒邪去苦中寒氣泄衛中風熱解肌發表出汗若表虛自汗陰虛盜汗肺虛者有熱多痰咳嗽以致鼻塞及平日陽虛腠理不密之人脈浮弦澀大沉微細弱及伏匿者法所同戒凡服麻黃須謹避風不爾病復發難療主治中風傷寒頭痛溫瘧發表出汗去邪熱氣止咳逆上氣除寒熱破症堅積聚五藏邪氣緩急風脅痛孕乳余疾止好唾通腠理解肌泄邪惡氣消赤黑斑毒不可多服令人虛治身上毒風𤺋痹皮肉不仁主壯熱溫疫山嵐瘴氣通九竅調血脈開毛孔去苦中寒熱泄衛中風熱散赤目腫痛水腫風腫產後血滯根節止自汗盜汗虛汗夏月雜粉撲之牡蠣粉粟粉俱等分為末生絹囊盛貯撲手摩之汗止效如影響木賊宋嘉祐釋名此草寸寸有節面糙澀治木骨者用之磋擦則光澤猶云木之賊也各方記述叢叢直上長者二三尺狀似鳧茈苗及粽心草而中空有節又似麻黃莖而稍粗無枝葉辨別道地和產可用夏月採之陰乾修治水洗去節銼焙用氣味甘苦微溫無毒功用陽中之陰升也浮也入足厥陰少陽經血分與麻黃同形同性故亦能發汗解肌得牛角腮麝香治休息久痢得禹餘糧當歸芎藭治崩中赤白得槐蛾桑耳治腸風下血得槐子枳實治痔疾出血若目疾由怒氣及熱傷血暴赤腫者非其所任主治目疾退翳膜消積塊益肝膽療腸風止痢及婦人月水不斷崩中赤白解肌止淚止血去風濕疝痛大腸脫肛燈心草宋開寶釋名直穰可燃燈故名虎鬚草碧玉草二名因形以名各方記述生澤地叢生莖圓細而長蒸熟待乾折取中心白穰燃燈者是謂熟草又有不蒸者生干剝取為生草入藥宜用生草辨別道地和產可用今人用燃燈草料者入煎湯而不拘生熟或銼敗席以用之皆不可宜自採擇修治燈心難研以梗米粉漿染過曬乾研末入水淘之浮者是燈心也曬乾用氣味甘辛淡寒無毒功用陽也入手少陰太陽經清心必用夜不合眼煎湯代茶飲即睡衄血不止一兩為末丹砂一錢米飲服效虛脫人及中寒小便不禁者勿服主治五淋生煮服之敗席煮服更良瀉肺治陰竅澀不利行水除水腫癃閉治急喉痹燒灰塗乳上飼小兒止夜啼降心火止血通氣散腫止渴燒灰入輕粉麝香治陰疳生熟地黃本經上品釋名生者以水浸驗之浮者名天黃半浮半沉者名人黃沉者名地黃芐以沉下珍為貴故字從下芑音起草名地髓稱讚之名各方記述其苗初生塌地如山白菜而毛澀葉面深青色又如小芥葉而頗厚不叉了葉中攛莖上有細毛莖梢開小筒子花紅黃色結實如小麥粒根長四五寸細如手指皮赤黃色如羊蹄根及胡蘿蔔根曝乾乃黑辨別道地和產為良近世山城大和多種出之修治生地黃採得即用者為生哂干收者為干以法制過者為熟今稱生地黃者乾地黃也其制酒浸則上行外行薑汁浸則不膩膈忌銅鐵器令人腎消發白男損營女損衛熟地黃用砂鍋柳甑襯以荷葉將生地黃酒潤用縮砂仁粗末拌蒸蓋覆極密文武火蒸半日取起曬極干如前又蒸九次為度令中心透熟純黑乃佳一法地黃堅實者曬乾以手擘之有聲為度好酒拌勻置瓷甕內包固重湯煮一晝夜名熟地黃然終不及前法松岡先生曰諸家本草有九蒸九曝之說是因襲道家貴九之胡說如法蒸之則氣味俱脫不堪用明蕭萬輿之所說尤為詳救正論云制煉之要其地黃大者須蒸曬至十餘次劈開中有黑油如堅玉氣味甘香者方可用勿拘九數也亦不必用酒潤過方蒸蓋酒經蒸曬則成酸酢之味不為佳候臨用時先一夜切碎如豆大以酒潤之次早略蒸片時使兩物勻和酒氣尚存藥氣益香動與胃合易於運行此雷斆炮製之微義不可不留心也地黃為末地黃九蒸搗爛以山藥末和為餅再曝之一碾即末矣氣味生地黃甘寒熟地黃甘苦微溫功用生地黃氣薄味厚沉而降陰也入手足少陰厥陰及手太陰足太陰經得清酒門冬良惡貝母畏蕪荑蔥蒜蘿蔔俱忌凡產後惡食作瀉雖見發熱惡露作痛不可用誤用泄不止胃氣者後天元氣之本也胃困則飲食不運精血不生虛熱何自而退凡見此宜多加炮薑桂心人參若陰虛咳嗽內熱骨蒸或吐血等候一見脾胃薄弱大便不實或天明腎泄痰凝氣鬱升降窒塞者宜通而不宜滯禁用之熟地黃味厚氣薄陰中之陽沉也入手足少陰厥陰之經忌蘿蔔蔥蒜諸血得丹皮當歸良按熟較生則經制煉而其效雖勝其性本寒其質本潤胃虛氣弱人而施之反致胸膈痞悶飲食減少以至變症百出用之者宜詳審焉主治生地黃傷中逐血痹填骨髓長肌肉作湯除熱積聚除痹療折跌絕筋主男子五勞七傷女子傷中胞漏下血破惡血溺血利大小腸去胃中宿食飽力斷絕補五藏內傷不足通血脈益氣力利耳目助心膽氣強筋骨長志安魂定魄消驚悸勞劣心肺損吐血鼻衄婦人崩中血運產後腹痛涼血生血補腎水真陰除皮膚燥去諸濕熱主心病掌中熱痛脾氣痿蹷嗜臥足下熱而痛治齒痛唾血熟地黃填骨髓長肌肉生精血補五藏內傷不足通血脈利耳目黑鬚發男子五勞七傷女子傷中胞漏經候不調胎產百病補血氣滋腎水益真陰去臍腹急痛病後脛股痠痛坐而欲起目𥉂𥉂無所見牛膝本經中品釋名其莖有節似牛膝故名牛莖同上百倍其滋補之功如牛之多力山莧菜其葉如莧對節菜其節對生各方記述其苗方莖暴節葉皆對生頗似莧菜而長且尖𧣪秋月開花作穗結子狀如小鼠有蟲負澀毛皆貼莖倒生辨別道地和漢俱皆真揀用長大柔潤者近年和州種出之形狀似野生者則長大可入藥用野生者本草所謂土牛膝不堪服食者也修治去蘆頭欲下行生用滋補焙用或酒拌蒸過用之氣味甘酸平無毒功用氣薄味厚陰也降也入足厥陰經惡螢火龜甲陸英畏白前忌牛肉其性能降而不能升故主用多在下部上焦藥中勿入血崩不止者氣虛下陷者夢失遺精者若膝不能立與能屈而不可伸者亦忌之主治寒溫痿痹四肢拘攣膝痛不可屈伸逐血氣傷熱火爛墮胎療傷中少氣男子陰消老人失溺除腰脊痛婦人月經不通血結治陰痿補腎助十二經脈逐惡血治腰膝軟怯冷弱破癥結排膿止痛產後心腹並血運落死胎強筋補肝藏風虛同蓯蓉浸酒服益腎竹木刺入肉嚼爛罨之即出治久瘧寒熱五淋尿血莖中痛下痢喉痹口瘡齒痛癰腫惡瘡傷折紫苑本經中品釋名苑軟也其色紫而柔宛故名青苑紫蔳返魂草夜牽牛諸名未詳各方記述其生布地花紫色本有白毛形如重臺根作節紫色潤軟有白者名曰苑即女苑也無紫苑時用之辨別道地和漢俱真可用修治去頭須洗淨焙用或治痰嗽須酒洗氣味苦辛微溫無毒功用陽中之陰可升可降入手太陰兼入足陽明款冬為之使惡天雄瞿麥藁本雷丸遠志畏茵陳治纏喉風喉閉神效觀其能開喉痹取惡涎則辛散之功烈矣而其性溫肺病咳逆喘嗽皆陰虛肺熱證也不宜專用及多用即用亦與天門冬百部麥門冬桑白皮苦寒之藥參用則無害主治咳逆上氣胸中寒熱結氣去蠱毒痿躄安五藏療咳唾膿血止喘悸五勞體虛補不足小兒驚癇治屍疰補虛下氣勞氣虛熱百邪鬼魅調中消痰止渴潤肌膚添骨髓益肺氣主息賁麥門冬本經上品釋名根似穬麥故名虋冬俗作門冬便於字麥須曰虋此草根似麥而有須羊韭禹韭其葉如韭禹餘糧可以服食斷谷故名忍冬忍凌不死草以上諸名凌冬不凋故名階前草各方記述麥門冬有大葉小葉其小者如韭大者如建蘭長及尺余四季不凋根黃白色有鬚根如連珠四月開淡紫花其實圓碧如珠辨別道地和有大小二種大小功用相同而葉大者根最肥大味甘可入藥修治以滾水潤濕少頃抽心或以砂鍋焙軟乘熱去心不爾令人煩若以水浸多時去心則柔矣然氣味都盡用之不效天門冬亦然畏其寒者以酒浸用氣味甘平無毒功用陽中微陰降也入手太陰少陰經地黃車前為之使惡款冬苦瓠畏苦參木耳伏鍾乳門冬之甘潤肺除熱其性寒雖主脾胃而虛寒泄瀉及痘瘡虛寒作泄產後虛寒泄瀉者咸忌之主治心腹結氣腸中傷飽脈絕羸瘦短氣療身重目黃心下支滿虛勞客熱口乾燥渴止嘔吐愈痿蹷強陰益精消穀調中保神定肺痿安五藏令人肥健美顏色有子去心熱止煩熱寒熱下痰飲止嗽吐膿時疾熱狂頭痛治熱毒大水面目肢節浮腫下水主泄精治肺中伏火補心氣不足主血妄行及經水枯乳汁不下和車前地黃丸服去濕痹款冬花本經中品釋名款者至也至冬而花故名款凍顆冬氏冬鑽凍百草中唯此不顧冰雪最先春故有此諸名菟奚未詳橐吾松岡先生曰按款冬橐吾自是二物混為一物者綱目之誤矣虎鬚以形名各方記述莖青微帶紫色葉似葵葉甚大而叢生又似石胡蘆葉頗團開黃花根紫色辨別道地和產可用以生山中者為良圃產不堪用入藥以半開者為佳如花已開則無氣力臘末春初可採收之修治擇未舒嫩蕊去向外裹殼甘草水浸曬乾氣味辛溫無毒功用純陽入手太陰經杏仁為之使得紫苑良惡皂莢硝石玄參畏貝母辛夷麻黃黃耆黃芩連翹青葙然雖畏貝母得此反良物有相制故也款冬古今方用之為治嗽要藥以其辛溫散而能降無分寒熱虛實皆可施用主治咳逆上氣善喘喉痹諸驚癇寒熱邪氣消渴喘息呼吸療肺氣促急熱勞咳連連不絕涕唾稠黏肺痿肺癰吐膿血潤心肺益五藏除煩消痰洗肝明目及中風等疾瞿麥本經中品釋名麥之穗旁生謂之瞿子頗似麥故也又曰苗瞿然而高尺余作穗似麥故名巨句麥大菊大蘭石竹南天竺草以上諸名未詳各方記述一莖生細葉花紅紫赤色可愛合子葉刈取之石竹葉似地膚葉而尖小又似初生小竹葉而細窄其莖纖細有節高尺余梢間開花畏野生者花大如錢紅紫色人家栽者花稍小而嫵媚有細白粉紅紫赤斑斕數色俗呼為洛陽花結實如燕麥內有小黑子辨別道地和產原野者真可用瞿麥石竹功用相同和有一種稱波摩那天志古者生山野一莖數枝葉圓而厚不似瞿麥枝頭攢開紫花似蘿蔔花結實真如瞿麥藥肆雜此物而售之頗難分辨而今雜瞿麥以用之有其效則亦瞿麥之類也修治去莖葉採實炒用氣味苦寒無毒功用陽中微陰入足太陽經牡丹為之使惡螵蛸伏丹砂氣味苦寒兼辛性猛利善下逐凡腎氣虛小腸無大熱者忌之胎前產後一切虛人患小水不利法並禁用水腫蠱脹脾虛者不得施主治關格諸癃結小便不通出刺決癰腫明目去翳破胎墜子下閉血養腎氣逐膀胱邪逆止霍亂長毛髮主五淋月經不通破血塊排膿葉主治痔痿並瀉血作湯粥食又治小兒蛔蟲及丹石藥發並眼目腫痛及腫毒搗傅治浸淫瘡並婦人陰瘡葶藶本經下品釋名葶定也藶瀝也行也能定肺喘而行水故名丁歷蕇蒿蕇音曲大室大通大適狗薺以上名義不解各方記述初春生苗葉高六七寸似薺根白色枝莖俱青三月開花微黃結角子扁小如黍粒微長黃色松岡先生曰正二月著花春老根枯須早收遲則實脫形狀似薺而細小花黃結角如米粒葉有寸茸但苦味少漢來一種有極苦者此真苦葶藶本草謂其苦微者是也辨別道地葶藶有甜苦二種其形則一也經既言味辛苦即甜者不復更入藥也和產苦味少者所謂甜葶藶也宜擇用修治酒潤炒或糯米拌微火略焙米熟去米用氣味苦辛大寒小毒功用氣味俱厚沉也陰中陽入手太陰少陰亦入手陽明足太陰太陽經榆皮為之使得酒良惡白殭蠶宜大棗其性急逐水殊動真氣稍涉虛者宜痛戒之有甜苦二種甘者下泄之性緩雖泄肺而不傷胃故形瘦證輕者宜之苦者下泄之性急泄肺而易傷胃當以大棗輔之壯人證重者宜之凡腫滿由於脾虛及真陰不足之人咸不可服主治癥瘕積聚結氣飲食寒熱破堅逐邪通利水道下膀胱水伏留熱氣皮間邪水上出面目浮腫身暴中風熱疿癢利小腹療肺壅上氣咳嗽止喘促除胸中痰飲通月經車前子本經中品釋名此草好生道邊及牛跡中故名車前當道馬舃牛遺義同上牛舌幽州人呼之蝦蟆衣蝦蟆喜藏伏於下故名車輪榮以形狀名地衣神仙服食經曰車前一名服之形化芣苡韓氏外傳直曰車前瞿曰芣苢苡毛詩作苢各方記述春初生苗葉布地如匙面累年者長及尺余中抽數莖作長穗如鼠尾花甚細密青色微赤結實如葶藶赤黑色五月取苗七八月採實辨別道地和產有大小二種葉大穗長者為良名之朝鮮車前小葉者亦功用相同修治淘淨曬乾入湯液炒過用入丸散酒浸一夜蒸熟研爛作餅曬乾焙用氣味甘寒無毒功用陽中之陰降也入手太陰足少陰厥陰經常山為之使若內傷勞倦傷氣下陷之病皆不可用主治氣癃止痛利水道小便除濕痹男子傷中女子淋瀝不欲食養肺強陰益精明目療目赤痛去風毒肝中風熱毒風沖眼未痛障翳腦痛淚出壓丹石毒去心胸煩熱養肝治婦人難產導小腸熱止暑濕瀉痢連翹本經下品釋名似蓮作房翹出眾草故名蓮本名連又名異翹合稱為連翹異翹同上卑蓮子乃小翹蘭華三廉義未詳連軺翹根也竹根義未詳各方記述此物有大小兩種大翹枝梗楊起高丈餘春初開四瓣黃花結實小翹則子稍少矣小翹枝條柔軟而下垂如楊柳花葉並實俱一樣八月採實辨別道地和產大小俱真可用修治去蒂瓤任用噙口者佳開瓣者不堪用氣味苦寒無毒功用氣味俱薄輕而浮升也陽也入手足少陽手陽明又入手少陰經其用有三瀉心經客熱去上焦諸熱及瘡家聖藥然癰疽已潰及火熱由於虛者脾胃薄弱易作泄者多用即減食有寒中之患主治寒熱鼠瘻瘰癧癰腫惡瘡癭瘤結熱蠱毒去白蟲通利五淋小便不通除心家客熱通小腸排膿治瘡癤止痛通月經散諸經血結氣聚消腫瀉心火除脾胃濕熱治中部血證以為使治耳聾渾渾焞焞蒺藜本經上品釋名蒺疾也藜利也其刺傷人甚疾利故名茨詩云牆有茨不可掃乃是也旁通屈乂止行以下名義皆因傷人也休羽升推二名未詳各方記述葉如初生皂莢整齊可愛刺蒺藜狀如赤根菜子如細菱三角四刺實有仁白蒺藜結莢長寸許內子大如脂麻狀如羊腎而帶綠色今人謂之沙蒺藜辨別道地和產真可用沙地海濱布地蔓生子有刺形如菱實而小白蒺藜葉似合歡而無刺結莢子如豆修治揀淨炒去刺用氣味苦辛甘溫無毒白蒺藜甘溫無毒功用入手太陰足厥陰少陰經其性行故積聚乳難之症皆治之白蒺藜性能固精命門火熾陽道數舉交媾精不得出者勿服主治惡血破症積聚喉痹乳難久服長肌肉明目身體風癢頭痛咳逆傷肺止痿止煩下氣小兒頭瘡癰腫陰㿉可作摩粉治諸風癧瘍療吐膿去燥熱治奔豚腎氣肺氣胸膈滿催生墮胎益精療水藏冷小便多止遺瀝泄精溺血腫痛痔漏陰汗婦人髮乳帶下治風秘及蛔蟲心腹痛白蒺藜主治補腎治腰痛泄精虛損勞乏海金砂宋嘉祐釋名其色黃如細砂謂之海者神異也或云形類海底黃沙故名竹園荽其蔓引竹上其葉如荽故名各方記述其蔓引於竹木上線莖細葉可愛也至六七月葉彌細背多皺紋生沙子狀如蒲黃收其有皺文葉曬乾以紙襯承其砂子落紙上用其沙及草皆可入藥辨別道地和漢俱有之挼之而不黏者為真和產者形狀如本草所說七月採撒紙上乾用修治勿令見火氣味甘寒無毒功用入手太陽足太陽經小腸膀胱血分之劑得梔子馬牙硝蓬沙療傷寒熱狂或丸或散按海金砂淡滲而無補益小便不利及諸淋由於腎水真陰不足者勿服主治通利小腸治濕熱腫滿小便熱淋膏淋石淋莖痛解熱毒氣及痘瘡變黑煎酒傅其身即發起大黃本經下品釋名塊大色黃故名黃良黃稱色良稱效將軍推陳致新如戡定禍亂以致太平所以有將軍之號火參膚如義未詳各方記述葉子莖並似羊蹄但莖高六七尺而脆味酸堪生啖葉粗長而厚根紅者亦似宿羊蹄大者乃如碗長二尺其性濕潤而易蛀壞辨別道地和漢俱有之和產二種藥肆今稱大和者為良今大和山城丹後諸州皆有之以紫地錦文者為佳售者多以羊蹄草根假之不可不細認也松岡先生曰藥家稱穿眼者真也稱片者非真乃羊蹄根也一種有大葉者名土大黃功同羊蹄修治凡用有生有熟有蒸不得一概用欲下行者生用邪氣在上者必須酒浸引上至高驅熱而下酒浸入太陽經酒洗入陽明經余經不用酒氣味苦寒無毒功用氣味俱厚沉而降陰也入足太陰兼入手足陽明厥陰經血分黃芩為之使忌冷水惡乾漆性峻利猛烈長驅直搗苟非血分熱結六脈沉實者切勿輕用凡停留便閉由於血少腸燥而不由於熱結中氣不運不由於飲食停滯女子少腹痛不由於經阻諸如此類不可誤投戒之慎之主治下瘀血血閉寒熱破癥瘕積聚留飲宿食盪滌腸胃推陳致新通利水穀調中化食安和五藏平胃下氣除痰實腸間結熱心腹脹滿女子寒血閉脹小腹痛諸老血留結通女子經候利水腫利大小腸貼熱腫毒小兒寒熱時疾煩熱蝕膿通利一切氣調血脈利關節泄壅滯水氣溫瘴熱瘧瀉諸實熱不通除下焦濕熱消宿食瀉心下痞滿下痢赤白裡急腹痛小便淋瀝實熱譫語黃疸諸火瘡常山本經下品釋名因生常山道中故名蜀漆生蜀中常山苗也採時莖內有汁如漆故名互草雞尿草鴨尿草三名義未詳各方記述生山谷間莖圓有節高者不過三四尺葉似茗而狹長兩兩相當二月生白花青萼五月結實青圓三子為房其草暴燥色青白堪用若陰乾便黑爛郁壞矣辨別道地和漢俱用之形如雞骨色如雞子黃者佳五月採葉陰乾名蜀漆和人以阿津佐伊充蜀漆以截瘧試之多得故亦常山種類也修治酒浸一宿切薄片漫火炒透又有醋製者吐人氣味苦寒有毒蜀漆辛平有毒功用入足厥陰經畏玉札即玉屑蔥菜及崧菜伏砒石生則上行必吐得甘草亦吐酒蒸炒熟則氣稍緩得大黃則利得烏梅山甲入肝得小麥竹葉入心得秫米麻黃入肺得龍骨附子入腎得草果檳榔入脾醋製亦作吐忌雞肉茶蔥菜服此藥勿滾熱下咽必露冷過宿才服年老久病人及形瘦挾虛者全忌蜀漆栝梗橋樓為使惡實眾主治傷寒寒熱熱發溫瘧鬼毒胸中痰結吐逆療鬼蠱往來水張洒洒惡寒鼠瘻治諸瘧吐痰涎治項下瘤癭蜀漆主治瘧及咳逆寒熱腹中症堅痞積聚邪氣蠱毒鬼疰療胸中邪結氣吐去之治鬼瘧多時溫瘧寒熱下肥氣破血洗去腥與苦酸同導膽邪附子本經下品釋名其母名烏頭附母而生故名各方記述松岡先生曰漢可用和雖有不知培養製法惟栽人家庭際稱烏胃玩花而已花史所謂僧鞋菊又名鴛鴦菊有紫花者白花者或蔓生者共草烏頭也種植採收之法詳見楊天惠彰明附子記辨別道地一兩以上矮而孔節稀者佳李中立曰市肆售者有以鹽水浸之取其潤濕體重買者當以體干堅實頂圓正底平者為良修治生用去皮臍熟用以水浸過炮令皴摺去皮臍切片炒黃色去火毒用或童便浸一日去皮切作四片童便及濃甘草湯同煮汁盡為度烘乾蓋生用則發散熟用則峻補各可從其制也氣味辛溫無毒功用氣厚味薄可升可降陽中之陰浮中沉無所不至為諸經引用之藥地膽為使惡蜈蚣畏防風黑豆甘草人參黃耆綠豆烏韭童便犀角忌豉汁得蜀椒食鹽下補命門衰敗之火投之陽虛之候肺腎本無熱證者參朮無功必加附子服之即能起死用之陰虛陽旺之人形瘦脈數者下咽遂不可救矣主治風寒咳熱邪氣寒溫踒躄拘攣膝痛不能行步破症堅積聚血瘕金瘡腰脊風寒腳氣疼冷心腹冷痛霍亂轉筋下痢赤白溫中強陰堅肌骨又墮胎為百藥長溫暖脾胃除脾濕腎寒補下焦之陽虛除藏府沉寒三陽厥逆濕淫腹痛胃寒蛔動治經閉補虛散壅督脈為病脊強而厥治三陽傷寒陰毒寒疝中寒中風痰厥氣厥柔痓癲癇小兒慢驚風濕麻痹腫滿腳氣頭風腎厥頭痛暴瀉脫陽久痢脾泄寒瘧瘴氣久病嘔噦反胃噎膈癰疽不斂久漏冷瘡合蔥涕塞耳治聾川烏頭釋名產川蜀綿州龍州者佳故名川烏頭其形似烏烏之首故以為名兩歧如烏開口者曰烏喙亦取其似也皆因象命名各方記述烏頭即附子之母也與附子同根春末生子故曰春採為烏頭冬則生子已成故曰冬採為附子生子多者一年傅之即有此數物也其原種之母莖枯則朽腐子在土中於冬初其苗已萌生故收採當在八九月間不爾雖有造得者全不堪用辨別道地形如魁芋頂未圓止為別修治制忌同附子氣味辛熱有毒功用浮也陽中之陽也入足太陰少陰經功用附子只稍緩耳但附子性重滯溫脾逐寒此則性輕疏溫脾去風大抵寒症用附子風症用烏頭然皆是補下焦藥也主治散風痹血痹治半身不遂祛積冷寒痛逐風痰風癇助陽退陰破堅除濕白附子別錄下品釋名因附子相似故得此名實非附子類也各方記述獨莖似鼠尾草細葉周匝生於穗間根形似天雄辨別道地漢來者但一種真而無偽和產亦真也修治炮去皮臍用氣味辛大溫大毒功用陽也升也入足陽明經純陽引藥勢上行其性燥似中風症雖有痰亦禁用小兒慢驚風勿服吳佩蘭說慢驚勿服本綱附方載慢脾驚風治驗每遇慢驚用之而屢得效兩說相矛盾未知孰是予從本草主治心痛血痹面上百病行藥勢中風失音一切冷風氣面皯瘢疵諸風冷氣足弱無力疥癬風瘡陰下濕癢頭面痕入面脂用補肝風虛風痰天南星宋開寶釋名本經所謂虎掌也虎掌因葉形似之非根也南星因根圓白形如老人星虎膚鬼蒟蒻二名以形名各方記述處處平澤有之二月生苗似荷梗其莖高一尺以來葉似蒟蒻兩枝相抱五月開花似蛇頭黃色七月結子作穗似石榴子紅色二月八月採根似芋圓扁與蒟蒻相類辨別道地和產可用又有形狀相似不真者採藥者宜擇之修治去皮臍入器中湯浸五七日日換三四遍去涎暴乾用或火炮裂用或以皂莢白礬生薑水水煮過用造膽南星法以南星研末臘月取黃牯牛膽汁和納入膽中系懸風處干之年久者彌佳方書謂之牛膽南星即此是若倉卒不能得此以生薑湯多炮六七次殺去毒堪用但其性猶烈耳氣味苦辛溫有毒功用陰中之陽可升可降入手太陰又入足厥陰太陰經畏附子乾薑生薑蜀漆為之使惡莽草得防風則不麻得牛膽則不燥得火炮則不毒生能伏雄黃丹砂焰硝此物大溫燥烈與半夏之性同而毒過之故亦善墮胎也西北人非真中風者勿服陰虛燥痰在所禁忌主治心痛寒熱結氣積聚伏梁筋痿拘緩利水道除陰下濕風眩主疝瘕腸痛傷寒時疾強陰主中風麻痹除痰下氣利胸膈攻堅積消癰腫散血墮胎金瘡折傷瘀血搗傅之蛇蟲咬疥癬惡瘡去上焦痰及眩運主破傷風口噤身強補肝風虛治痰功同半夏治驚癇口眼喎斜喉痹口舌瘡糜結核解顱半夏本經下品釋名禮月令五月半夏生蓋當夏之半也守由當夏之半故名水玉因形以名地文和姑名義未詳各方記述二月生苗一莖莖端三葉淺綠色頗似竹葉五月八月採根以灰裹二日湯洗暴乾辨別道地和產不擇處而生一種稱大半夏者其根塊極大葉亦闊大有紋縷且光是由跋而南星一種非半夏也不可混用以肉白為佳不厭陳久修治揀肥大而白者洗去皮垢以水浸五日每日換水去帽眼干切片薑汁拌焙入藥或製半夏一斤以生薑一斤切片拌半夏加水以煮熟割以無白星為度去姜曬乾炒用亦可治火痰以薑汁竹瀝治寒痰以薑汁礬湯入白芥子末和之風痰薑汁皂角煮汁和之造半夏曲法以半夏洗淨湯泡去衣垢研細以薑汁礬湯和作餅楮葉包裹待生黃衣去葉曬乾用氣味辛平有毒功用氣味俱薄沉而降陽中陰也入手少陰太陰陽明經亦入足太陰陽明少陽經射干柴胡為之使畏雄黃生薑乾薑秦皮龜甲及烏頭惡皂莢忌羊血海藻飴糖熱痰佐以黃芩風痰佐以南星寒痰佐以乾薑痰痞佐以陳皮白朮多用則瀉脾胃諸血證及口渴者禁用為其燥津液也孕婦忌之用生薑則無害主治傷寒寒熱心下堅胸脹咳逆頭眩咽喉腫痛腸鳴下氣止汗消心腹胸膈痰熱滿結咳嗽上氣心下急痛堅痞時氣嘔逆消癰腫療痿黃悅澤面目墮胎消痰下肺氣開胃健脾止嘔吐去胸中痰滿生者摩癰腫除瘤癭氣治吐食反胃霍亂轉筋腸腹冷痰瘧治寒痰及形寒飲冷傷肺而咳消胸中痞膈上痰除胸寒和胃氣燥脾濕治痰厥頭痛消腫散結治眉稜骨痛補肝風虛除腹脹目不得瞑白濁夢遺帶下五味子本經上品釋名皮肉甘酸核中辛苦都有鹹味此則五味具也莖蕏音知除玄及會及名義未詳各方記述春初生苗引赤蔓於高木其長六七尺葉尖圓似杏葉三四月開黃白花類蓮花狀七月成實叢生莖端如豌豆許大生青熟紅紫入藥生曝不去子辨別道地以朝鮮為上以漢為中以和為下方書所謂北五味子遼五味子皆謂朝鮮產也和產者本草所謂南五味子也時珍曰五味子今有南北之分南產者色紅北產者色黑入滋補藥必用北產者乃良修治入補藥蜜蒸熟再以泔水浸焙乾用入嗽藥生用連核入藥氣味酸甘辛苦鹹溫無毒功用味厚氣輕陰中微陽入手太陰血分又入足少陰氣分蓯蓉為之使惡萎蕤勝烏頭功用雖多總之收肺保腎四字盡之肺家實熱有火鬱者禁用主治益氣咳逆上氣勞傷羸瘦補不足強陰益精養五藏除熱生陰治中下氣止嘔逆補虛勞令人體悅澤明目暖水藏壯筋骨治風消食反胃霍亂轉筋痃癖奔豚冷氣消水腫心腹氣脹止渴除煩熱解酒毒生津治瀉痢補元氣不足收耗散之氣瞳子散大治喘咳燥嗽壯水鎖陽栝樓仁本經中品釋名栝檃括也樓蔞斂也言包斂其子在內白如括囊也果羸音轉也瓜蔞天瓜黃瓜地樓皆依音象形以名澤姑義未詳各方記述所在有之三四月生苗引藤蔓葉如甜瓜葉而窄作叉有細毛七月開花似壺蘆花淺黃色結實在花下大如拳生青至熟赤黃色其形有正圓者有銳而長者功用皆同根亦名白藥皮黃肉白辨別道地和產有二三種藥鋪栝樓仁王瓜子混而一之宜子細辨其殼中子似柿核者乃栝樓也如螳螂頭者乃王瓜也藥鋪稱柿核樣奴女樣者佳矣修治去殼皮草膜及油亦有不去油微炒者王肯堂曰肥大結實者連子皮細切用今人止用核仁非也氣味甘微寒無毒功用味厚氣薄陰也入手太陰同貝母則開結痰脾胃虛寒作泄者勿服主治胸脾悅澤人面潤肺燥降火治咳嗽滌痰結利咄喉止消渴利大腸消癰腫瘡毒子炒用補虛勞口乾潤心肺治吐血腸風瀉血赤白痢手面皺天花粉圖經釋名內有花文天然而成故名瑞雪以白色名之各方記述栝樓根也辨別道地近來以黃瓜根制之其功用大抵相同藥肆稱幾志幾志樣者良矣修治藥鋪製售者直用之制天花粉法秋冬採根厚去皮至白處寸切之水浸一日一易水經三五日取出搗如泥以絹濾澄粉曬乾用氣味甘苦微寒無毒功用降也陰也入手少陰太陰經枸杞為之使惡乾薑畏牛膝反烏頭脾胃虛寒作泄者勿服主治消渴身熱煩滿大熱補虛安中續絕傷除腸胃中痼熱癰疽身面黃唇乾口燥短氣止小便利通月水治熱狂時疾通小腸消腫乳癰發背痔瘻瘡癤排膿生肌長肉消撲損瘀血葛根本經中品釋名葛革也藤皮可為絺綌也雞齊義未詳鹿藿鹿食九草此其一種故名黃斤未詳各方記述葛有野生有家種其蔓延長取治可作絺綌其根外紫內白長者七八尺其葉有三尖如楓葉面青背淡其花成穗累累相綴紅紫色其莢如小黃豆莢亦有毛其子綠色扁扁如鹽梅子核生嚼腥氣八九月採之辨別道地松岡先生曰漢土植家園而用之名之家葛和邦皆野生方書呼乾葛者乃葛根俗醫誤以乾葛為葛粉或取葛莖為乾葛俱皆誤也不可不辨也修治去皮用之今在藥鋪者素去皮故洗水刻用氣味甘辛平無毒功用氣味俱薄輕而上行浮而降陽中陰也入足陽明胃經凡傷寒頭痛兼項強腰脊痛及遍身骨疼者足太陽也邪未入陽明故無渴證不宜服五勞七傷上盛下虛之人暑月雖有脾胃病不宜服主治消渴身大熱嘔吐諸痹起陰氣解諸毒療傷寒中風頭痛解肌發表出汗開腠理療金瘡止脅風痛治天行上氣嘔逆開胃下食解酒毒治胸膈煩熱發狂止血痢通小腸排膿破血傅蛇蠱齧罨毒箭傷殺野葛巴豆百藥毒生者墮胎蒸食消酒毒可斷谷不飢作粉尤妙作粉止渴利大小便去煩熱壓丹石傅小兒熱瘡搗汁飲治小兒熱痞猘狗傷搗汁飲並末傅之葛花氣味甘平無毒各方記述七月採之主治消酒治腸風下血天門冬本經上品釋名虋冬音門草之茂者為虋俗作門此草蔓茂而功同麥門冬故名顛勒顛棘天棘爾雅云髦顛棘也因其細葉如髦有細棘也顛天音相近也萬歲藤萬歲稱其性乎各方記述處處有之春生藤蔓大如釵股高至丈餘葉如茴香極尖細而疏滑有逆刺亦有澀而無刺者其葉如絲杉而細散夏生細白花亦有黃色及紫色者秋結黑子在其根枝旁入伏後無花暗結子其根或黃紫色大如手揩圓實而長二三寸大者為勝一科一二十枚辨別道地和漢俱有焉和一種蔓生葉如絲杉白花結實修治酒拌蒸剝去皮四破去心曝乾用氣味甘微苦平無毒功用氣薄味厚陽中之陰沉也降也入手太陰足少陰經氣分垣衣地黃貝母為之使畏曾青忌食鯉魚誤食中毒者以浮萍汁解之陰虛水涸火起下焦上炎於肺為痰喘者誠為要藥也味苦氣寒不利脾胃陰虛之脾胃多弱又以苦寒損其胃氣以致泄瀉惡食則危殆矣故脾虛泄瀉惡食者大非所宜主治諸暴風濕偏痹強骨髓殺三蟲去伏屍保定肺氣去寒熱養肌膚利小便冷而能補肺氣咳逆喘急肺萎生癰吐膿除熱通腎氣止消渴去熱中風治濕疥宜久服煮食之令人肌體滑澤白淨除身上一切惡氣不潔之疾鎮心潤五藏補五勞七傷吐血治嗽消痰去風熱煩悶主心病嗌乾心痛渴而欲飲痿蹷嗜臥足下熱而痛潤燥滋陰清金降火陽事不起宜常服之何首烏宋開寶釋名因順州南河縣何翁服之白髮變黑故稱交藤夜合其藤蔓夜交合相聊故名地精陳知白名義未詳馬肝石漢武時有馬肝石能烏人發故後人隱此名云桃柳藤以形名九真藤取根若獲九數者服之乃仙故名赤葛瘡帚紅內消赤者消腫毒外科呼為瘡帚紅內消各方記述春生苗蔓延竹木牆壁間莖紫色葉葉相對如著蕷而不光澤夏秋開黃白花如葛勒花結子有稜似蕎麥而雜小才如粟大秋冬取根大者如拳各有五稜瓣似小甜瓜有赤白二種赤者雄白者雌辨別道地松岡先生曰漢來者真也和稱何首烏者乃苦萎而非真本草所謂黃獨也與真何首烏功能迥別不可用其真何首烏俗醫本草極讚美其功因逞欲者好單味服餌多誤性命者可不戒乎予嘗疑此物無益而有害怪世人漫服不知其中酷烈苦澀之毒及閱倪朱謨本草匯言其說與予意合云云匯言全文見於用藥須知標註故略之修治用竹刀切米泔浸一宿木杵搗一法用竹刀刮去黑皮米泔浸二日切片每赤白各一斛用黑豆三斗每次三升三合三勺以水浸過甑內鋪豆一層藥一層重重鋪盡砂鍋上蒸之豆熟為度去豆九蒸九曬為度氣味苦澀微溫無毒功用升也陽也入足厥陰少陰經白者入氣赤者入血茯苓為之使忌諸血無鱗魚蘿蔔蒜蔥鐵器同地黃能伏硃砂主治瘰癧消癰腫療頭面風瘡治五痔止心痛益血氣黑髭發悅顏色久服長節骨益精髓治婦人產後及帶下諸疾治腹藏一切宿疾冷氣腸風瀉肝風土茯苓綱目釋名形似茯苓故云土萆薢刺豬苓山豬糞山地慄皆象形草禹餘糧仙遺糧冷飯糰昔禹行山乏食採此充糧而棄其餘故有此數名各方記述土茯苓楚蜀山中甚多蔓生如蒪莖有細點其葉不對狀頗類大竹葉而質厚滑如瑞香葉而長五六寸其根狀如菝葜而圓其大若雞鴨子連綴而生遠者離尺許近或數寸其肉軟可生啖與萆薢及菝葜其根苗迥然不同宜參考之但其功用頗相近辨別道地漢來者可用和產無之和邦以菝葜稱山歸來菝葜功用與土茯苓不甚相遠形狀克相似則代用土茯苓亦不為不可矣漢來有赤白二種入藥用白者良今藥肆雜菝葜以售宜審擇焉修治削去皮用氣味甘淡平無毒功用入足陽明厥陰經忌茶茗及牛羊雞鵝魚肉燒酒面房勞凡好淫之人病楊梅瘡毒其證多屬厥陰陽明二經如兼少陰太陰則發於咽喉兼太陽少陰則發於頭耳蓋相火寄於厥陰肌肉屬於陽明故也醫用輕粉銀硃劫劑七日即愈水銀性走不守如以鹽礬升為輕粉銀硃其性燥熱善逐痰涎涎乃脾液此物入胃氣歸陽明故涎被劫隨火上升從喉頰齒縫而出故瘡即干痿而愈若服之過劑及用不得法則毒氣竄入筋骨經絡莫之能出痰涎去而血液耗筋失所養營衛不從變為筋攣骨痛發為癰毒遂成廢痼土茯苓能健脾胃去風濕脾健而風濕去故毒得以愈主治食之當谷不飢調中止泄健行不睡健脾胃強筋骨去風濕利關節止泄瀉治拘攣骨痛惡瘡癰腫解汞粉銀硃毒威靈仙宋開寶釋名威言其性猛也靈仙言其功用神也各方記述莖如釵股七月內生花六出淺紫或白色作穗似蕓薹子亦有如菊花頭者實青色根稠密多須似谷母年朽敗九月採根一根叢須數百條長者二尺許初時黃黑色干則深黑色稱鐵腳威靈仙色或黃或白者皆不可用辨別道地和漢俱有之漢來者為上所謂鐵腳威靈仙是也和藝花家呼九蓋草者即是也採藥售者間雜仙人草根此物大有毒宜擇用近年出於薩州者形色氣味殆逼真可用修治洗水銼用或洗焙以好酒微和濕緊塞竹筒內九蒸九曬氣味苦溫微辛鹹無毒功用可升可降陰中陽也入太陽經又曰通行十二經忌茶茗及麩麵湯主諸濕然疏利之物久服損真壯實者服之誠有殊功氣弱者反成痼疾凡病非風濕及陽盛火升血虛有熱表虛有汗痎瘧口渴身熱者並忌用之主治諸風宣通五藏去腹內冷滯心膈痰水久積癥瘕痃癖氣塊膀胱宿膿惡水腰膝冷疼療折傷久服有效溫疫瘧推新舊積滯消胸中痰唾散皮膚大腸風邪防己本經中品釋名已止也防止足疾也斛離石斛因其紋斛以名各方記述生漢中有二種木防己皮皺上有丁足子青白虛軟漢防己破之紋作車輻斛黃實馨香狀與木通近似惟漢者勝辨別道地和漢俱有之本草原始出條防己瓜防己者本草所謂漢防己也今漢來者皆瓜防己也因方宜擇用修治去皮銼酒洗曬乾用氣味苦辛寒無毒功用陰也泄也太陰本經藥也漢主肺氣本經風邪殷蘖為之使惡細辛畏萆薢滷咸伏硝石殺雄黃毒蓋其性𢛞其氣猛能走竄決防傷胃氣故凡胃氣陰虛自汗盜汗口苦舌乾腎虛小水不利及胎前產後血虛雖有下焦濕熱慎毋用之主治風寒溫瘧熱氣諸癇除邪利大小便療水腫風腫去膀胱熱傷寒熱邪氣中風手腳攣急通腠理利九竅止泄散癰腫惡結諸疥癬蟲瘡治濕風口面喎斜手足拘痛散留痰肺氣喘嗽治中下濕熱腫泄腳氣行十二經木防己主治男子肢節中風毒風不語散結氣擁腫溫瘧風水腫去膀胱熱木通士良釋名有細孔兩頭皆通本經所謂通草也附支丁翁萬年藤名義未詳燕覆子名各方記述藤生蔓大如指其莖幹大者徑三寸一枝五葉頗類石葦又似芍藥二葉相對夏秋開紫花亦有白花者結實如小木瓜食之甘美辨別道地和漢俱有之和產者阿氣比也今漢來者蘿蔔藤也本草頌曰或以木通為蘿蔔非也然論其功用則二物彼是相同而足可通用而已如無通草則代用蘿蔔藤亦可矣修治去粗皮切片用治痛風煮酒用炒氣味甘辛淡微寒無毒功用味薄降也陰也入足少陰太陽亦入手少陰厥陰太陽經其性通利凡精滑夢遺及陽虛氣弱無濕熱者禁用妊娠忌之主治除脾胃寒熱通利九竅血脈關節令人不忘去惡蟲療脾疽常欲眠心煩噦出音聲治耳聾散癰腫諸結不消及金瘡惡瘡鼠瘻踐折齆鼻息肉墮胎去二蟲治五淋利小便開關格治人多睡主水腫浮大利諸經脈寒熱不通之氣理風熱小便數急疼小腹虛滿安心除煩止渴結熱明耳目治鼻塞通小腸下水破積聚血塊排膿治瘡癤止痛催生下胞女人血閉經候不勻天行時疾頭痛目眩羸劣乳結及下乳利大小便令人心寬下氣主諸痿瘡喉痹咽痛濃煎含咽通經利竅導小腸火鉤藤鉤別錄下品釋名其刺曲如釣鉤故名或作吊藤療天吊故名乎各方記述狀如葡萄藤而有鉤辨別道地選紫色者用修治去梗純用嫩鉤其功十倍氣味甘苦微寒無毒功用入手足厥陰經按釣藤祛肝風而不燥中和之品也足厥陰主風手厥陰主火驚癇眩運皆肝風相火之病此能通心包於肝木風靜火息則諸症自愈其性寒多宜小兒科大人有寒者不宜多服主治小兒寒熱十二驚癇小兒驚啼瘛瘲熱擁客忤胎風大人頭旋平肝風除心熱小兒內釣腹痛發斑疹忍冬別錄上品釋名藤生凌冬不凋故名金銀藤鴛鴦藤鷺鷀藤老翁須左纏藤其花長瓣垂須黃白相半而其藤左繞附木故有以上諸名金釵股貴其功也蜜橘藤通靈草陰草也取汁能伏硫制汞故名各方記述在處有之附樹延蔓莖微紫色對節生葉葉似薜荔而青有澀毛三四月開花長寸許一帶兩花二瓣一大一小如半邊狀長蕊花初開者蕊瓣俱色白經二三日則色變黃新舊相參黃白相映故呼金銀花氣芬芳四月採花陰乾藤葉不拘時採陰乾辨別道地和產真可用沉內輸日如無生者只用乾者然力終不及生者效速修治水洗銼用匯日勿犯鐵器氣味甘微寒無毒功用入手太陰經煮汁釀酒補虛療風性極中和近世但知其消毒之功昧其腹脹風虛痢澼之用主治寒熱身腫腹脹滿能止氣下澼熱毒血痢水痢治五種屍注五屍出於本綱附方鬼擊一切風濕及諸腫毒癰疽疥癬楊梅諸惡瘡散熱解中野菌毒為膏一切疔腫金刃傷瘡皆治澤瀉本經上品釋名生池澤淺水功能止瀉故名水瀉去水曰瀉如澤水之瀉故名鵠瀉及瀉蕍芒芋諸名未詳禹孫禹能治水故稱各方記述春生苗多在淺水中葉似牛舌獨莖而長秋時開白花作叢似穀精草秋末採根暴乾辨別道地和產有二種丹後仙台者堅實而好近江者輕虛而性惡故仙台丹後為上江州為下色白堅實者可選用修治去毛酒洗一宿曝乾用氣味甘鹹微寒無毒功用沉而降陰也入足太陽少陰經畏海蛤文蛤凡病人下焦無濕熱而陰虛及腎氣之陽衰精自流者目虛不明者切勿輕與暴服能明目多服則昏目不可不知主治風寒濕痹乳難養五藏益氣力肥健消水五藏痞滿起陰氣止泄精消渴淋瀝逐膀胱三焦停水主腎虛精自出治五淋宣通水道主頭旋耳鳴筋骨攣縮通小腸止尿血主難產入腎經去舊水養新水利小便消腫脹滲泄止渴去脬中留垢心下水痞滲濕熱行痰飲止嘔吐瀉痢疝痛腳氣菖蒲本經上品釋名蒲類之昌盛者故名菖陽名大根者堯韭堯時天降精於庭為韭感百陰之氣為菖蒲水劍草因葉形而名各方記述菖蒲有數種生於池澤葉肥根高三四尺者泥菖也名白菖和邦端五插檐者也又有花菖蒲紫白嬌豔可愛者燕子花之類也生於溪澗葉瘦根高一二尺其葩與花菖蒲相肖而小者溪孫也生於水石之間有釰脊瘦根密節高尺余二三月間抽莖開小黃花成穗者石菖蒲也惟採此種可以入藥余皆不堪其養以沙石愈剪則愈細愈久則愈密高四五寸葉如韭甚則根長二三分葉長寸許謂之錢蒲又山中泉石間自有根苗纖細一寸不啻九節而至二十節者方技家獨貴之然不必拘之其一寸九節至其餘者多露瘦根而形質堅氣味薄而且有毒但當以深山窮谷水磧上生肥大者為佳辨別道地和產可用生於溪澗葉長根肥者可擇用人家栽園圃者為不佳冬月採根曬乾用修治以銅刀刮去毛節皮微焙用氣味辛溫無毒功用陽中之陰可升可降入手少陰足厥陰太陽經秦皮秦艽為之使惡地膽麻黃忌飴糖羊肉犯鐵器令人吐逆葉洗疥大風瘡妙主治風寒濕痹咳逆上氣開心孔補五藏通九竅明耳目出音聲主耳聾癰瘡溫腸胃止小便利久服輕身不忘不迷延年益心智高志不老四肢濕痹不得屈伸小兒溫瘧身積熱不解可作浴湯治耳鳴頭風淚下鬼氣殺諸蟲惡瘡疥瘙除風下氣丈夫水藏女人血海冷敗多忘除煩悶止心腹痛霍亂轉筋及耳痛者作末炒乘熱裹罨甚驗心積伏梁治中惡卒死客忤癲癇下血崩中安胎漏散癰腫搗汁服解巴豆大戟毒白扁豆別錄中品釋名白者稱花實色扁者象莢實形以名沿籬豆沿籬蔓延故名蛾眉豆花形象豆脊也各方記述扁豆二月下種蔓生延纏葉大如杯團而有尖其花狀如小蛾有翅尾形其莢累累成枝白露後實更繁衍嫩時可充蔬食老則收子煮食辨別道地和產有二種花白色而實形扁者色亦白花紫色實圓而不白者應以花實白而扁者入藥花實不白而圓者可充食料修治連皮炒熱用氣味甘微溫無毒功用陽也可升可降入足太陰經傷寒邪熾者禁用主治和中下氣補五藏主嘔逆久服頭不白療霍亂吐利不止研末和醋服之行風氣治女子帶下解酒毒河豚魚毒一切草木毒生嚼及煮汁飲取效止泄痢消暑暖脾胃除熱止消渴花焙研服治赤白崩帶並泄痢神麯藥性論釋名昔人用曲多是造酒之曲後醫乃造神麯專以供藥力更勝之蓋取神聚會之日造之故得神名各方記述五月五日或六月六日用白麵百斤青蒿自然汁三升赤小豆末杏仁泥各三升蒼耳自然汁野蓼自然汁各三升以配白虎青龍朱雀玄武勾陣螣蛇六神用汁和麵豆杏仁作餅麻黃或楮葉包罨如造醬黃法待生黃衣曬收臨用炒之陳久者良一法用青蒿蒼耳野蓼自然汁及赤小豆末杏仁泥各三盞和勻於瓷器內次第下白麵搜和得所作餅如上生黃曬收之尤為簡便也醫壘元戎有三奇六神麯法可考見焉辨別道地藥鋪所售者不得其制如法自採自制可用之修治陳久者細碎去蛀炒用氣味甘辛溫無毒功用陽中之陽也入足陽明經須與參朮香砂同用為佳主治化水穀宿食癥結積滯健脾暖胃養胃氣治赤白痢消食下氣除痰逆霍亂泄痢脹滿諸疾其功與曲同閃挫腰痛者煅過淬酒溫服有效婦人產後欲回乳者炒酒服二錢日二即止甚驗麥芽別錄中品釋名大麥水浸生芽故名修治麥牙去須取其中米炒研曲用今惟炒用氣味鹹甘溫無毒功用陰中之陽可升可降入足陽明經豆蔻縮砂烏梅木瓜芍藥五味子為之使麥芽神麯二藥胃氣虛人宜服之雖然有食積者能消化無積者久服則損腎消元氣須同白朮諸藥兼用方為無害主治消食和中破冷氣去心腹脹滿開胃止霍亂除煩悶消痰飲破癥結催生落胎補脾胃虛寬腸下氣腹鳴者用之消化一切米麵諸果食積產後回乳為末服甚良生薑別錄中品釋名姜能強御百邪故謂之姜初生嫩者其尖微紫名紫薑或作子姜宿根謂之母姜也各方記述繆仲醇曰生薑不宜使熟宜搗絞汁待藥煎成頃方不失生之義如入藥煎乃熟姜非生薑此說雖新奇非是何則絞汁待煎成而入則薑汁而非生薑生薑乾薑乾生薑等之精辨詳於松岡先生之說故不贅於此方書謂生薑一片者片者以生薑一塊判為數片其一片之分量亦不分明按奇效醫述經驗四時感寒發散方中生薑三片為引約重二錢此方藥約計八錢一分和制一貼一錢之藥約計二分七釐一毫也是發表之劑故應生薑分量多如不發表之藥則大抵半減而可用之乎修治去皮則熱留皮則冷氣味辛溫無毒功用氣味俱厚浮而升陽也入手足太陰足陽明經秦椒為之使殺半夏莨菪毒惡黃芩黃連天鼠糞食姜久積熱患目病痔人忌之癰瘡人多食則生惡肉夜勿食姜者夜主闔而姜主闢也主治久服去臭氣通神明歸五藏除風邪寒熱傷寒頭痛鼻塞咳逆上氣止嘔吐去痰下氣去水氣滿療咳嗽時疾和半夏主心下急痛和杏仁作煎下急痛氣實心胸擁隔冷熱氣神效搗汁和蜜服治中熱嘔逆不能下食散煩悶開胃氣汁作煎服下一切結實沖胸膈惡氣神驗破血調中去冷氣汁解藥毒除壯熱治痰喘脹滿冷痢痛腹轉筋心滿去胸中臭氣狐臭殺腹內長蟲益脾胃散風寒解菌蕈諸物毒生用發散熟用和中解食野禽中毒成喉痹浸汁點赤眼搗汁和黃明膠熬貼風濕痛甚妙乾生薑修治生薑銼日曬乾收用主治治嗽溫中治脹滿霍亂不止腹痛冷痢血閉病人虛而冷宜加之姜屑和酒服治偏風肺經氣分之藥能益肺乾薑本經中品釋名白姜造以白淨結實者為良故云造乾薑法以丹姜水浸三日去皮又置流水中六日更刮去皮然後曬乾置瓷缸中釀三日乃成也辨別道地藥肆中以母姜略煮過然後曝之令乾名之乾薑或有欲其色白以石灰纏收者有毒俱非是惟藥肆稱寒曬生薑者佳可用修治有石灰氣者洗去之微炒用氣味苦辛大熱功用氣薄味厚半沉半浮可升可降陽中之陽也入手太陰陽明足太陰少陰四經若治產後血虛發熱及止血俱炒黑溫中炮用散寒邪理肺氣止嘔生用使惡殺同生姜多服損陰傷目陰虛內熱表虛有汗因熱下血火熱腹痛法並忌之孕婦不可食之令胎內消姜皮作散消浮腫故五皮散用之主治胸滿咳逆上氣溫中止血出汗逐風濕痹腸澼下痢生者尤良寒冷腹痛中惡霍亂脹滿風邪諸毒皮膚間結氣止唾血治腰腎中疼冷冷氣破血去風通四肢關節開五藏六府宣諸絡脈去風毒冷痹夜多小便消痰下氣治轉筋吐瀉反胃乾嘔瘀血撲損止鼻紅解冷熱毒開胃消食主心下寒痞目睛久赤茴香唐本草釋名蘹香北人呼為茴香聲相近也各方記述茴香宿根深冬生苗作叢肥莖綠葉五六月開花如蛇床花而色黃結子大如麥粒輕而有細稜俗呼為大茴香入食料藥肆謂八角茴香者形如柏實裂成八瓣者大茴香性熱不宜入食料辨別道地大茴香者有漢來無和產也和產皆小茴香也可入藥而用藥肆所售大茴香多將莽草實中截雜以稱八角茴香飾偽之甚者也莽草和謂施己密者而其實有毒以殺人宜子細辨之修治得酒良炒黃用得鹽則入腎經氣味辛溫無毒功用陽也浮也入手足太陰陽明太陽少陰經小茴性平夏月祛蠅闢臭食料宜之大茴香性熱多食傷目發瘡食料不宜過用治小腸疝氣有效主治諸痿霍亂及蛇傷膀胱腎間冷氣及盲腸氣調中止痛嘔吐治乾溼腳氣腎勞㿗疝陰疼開胃下氣補命門不足暖丹田山藥本經上品釋名本經所謂薯蕷也薯蕷二字薯字犯宋英宗諱蕷字犯唐代宗諱故改為山藥蓋言山中之藥也遂名藷藇音同土藷山藷江閩呼之山芋齊魯名之玉延秦楚名之各方記述四月生苗延蔓紫莖綠葉有三尖似白牽牛葉而更光潤五六月開花成穗淡紅色結莢成簇莢凡三稜合成堅而無仁其子別結子於一旁狀似雷丸大小不一皮色土黃而肉白煮食甘滑與其根同辨別道地和產可用修治山產者採得以銅刀刮去赤皮糝白礬末少許洗去涎蒸乾用今藥家所制去皮以米粉糝涎日乾售之氣味甘平無毒功用陽中微陰可升可降入手足太陰經紫英為之使惡甘遂與面同食則動氣但性緩非多用不效主治傷中補虛羸除寒熱邪氣補中益氣力長肌肉主頭面遊風頭風眼眩下氣止腰痛克五藏除煩熱強陰補五勞七傷去冷風鎮心神安魂魄補心氣不足開達心孔多記事強筋骨主泄精健忘益腎氣健脾胃止泄痢化痰涎潤皮毛生搗貼腫硬毒能消散薏苡仁本經上品釋名薏意也苡實也解蠡其葉似蠡實葉而解散故名芑實似芑黍之苗故名𧆐米音感其堅硬者有贛強之意同回米謂回回國米也薏珠子小兒以線穿如貫珠為戲各方記述薏苡二三月宿根自生葉如初生芭茅五六月抽莖開花結實有二種一種黏牙者尖而殼薄即薏苡也其米白色如糯米一種圓而殼厚堅硬者即菩提子也其米少即粳𥽇也但可穿作唸經數珠辨別道地松岡先生曰有三種和名唐麥者真也皮柔而色白肉厚粒大野生者名川殼或贛珠皆非真小兒作念珠為戲玩者如乏時可通用修治淘曬炒用氣味甘淡微寒無毒功用陽中微陰可升可降入手足太陰陽明足太陰陽明足厥陰經性主下行虛而下陷者非其宜也妊娠禁服主治筋急拘攣不可屈伸久風濕痹下氣除筋骨中邪氣不仁利腸胃消水腫令人能食炊飯作麵食主不飢溫氣煮飲止消渴殺蛔蟲治肺痿肺氣積膿血咳嗽涕唾上氣煎服破毒腫去幹濕腳氣大驗健脾益胃補肺清熱去風勝濕炊飯食治冷氣煎飲利下便熱淋黃蘗本經上品釋名本經所謂蘗木黃者色也蘗者巨也俗呼黃柏各方記述樹高數丈葉似吳茱萸亦如紫椿經冬不凋皮外白里深黃色其根結塊如松下茯苓二月五月採皮日乾辨別道地和產可用肉厚色黃者為良修治水洗銼炒褐色降實火則生用治上則酒製治下則鹽制治中則蜜制氣味苦寒無毒功用氣味俱厚沉而降陰也陰中之陽入足少陰經為足太陽引經藥惡乾漆伏硫黃夫氣為陽血為陰邪火煎熬則真陰消涸真陰消涸則邪火益烈而陰虛火動之病隨之矣取知柏之苦寒以抑南扶北誠如久旱甘霖然惟火旺胃強者為能當之倘中氣已殘則邪火雖亢命曰虛炎從事弗衰將有寒中之變且味苦久服有反從火化之害矣今天下極其崇尚以為去熱治勞之妙藥而不知真元之火與健運之職已消亡而阻喪獨不聞虛火可補實火可瀉之說乎苟非甘溫則大熱焉除也必尺中洪大按之有力可炒黑暫用不然便當痛絕主治五藏腸胃中結熱黃疸腸痔止泄痢女子漏下赤白陰傷蝕瘡療驚風在皮間肌膚熱赤起目熱赤痛口疳熱皰起蟲瘡血痢止消渴殺蛀蟲男子陰痿及傅莖上瘡治下血如雞鴨肝片安心除勞治骨蒸洗肝明目多淚口乾心熱殺疳蟲治蛔心痛鼻衄腸風下血後急熱腫痛瀉膀胱相火補腎水不足堅腎壯骨髓療下焦虛諸痿癱瘓利下竅除熱瀉伏火救腎水治衝脈氣逆不渴而小便不通諸瘡痛不可忍得知母滋陰降火得蒼朮除濕清熱為治痿要藥得細辛瀉膀胱火治口舌生瘡傅小兒頭瘡厚朴本經中品釋名其木質樸而皮厚故名烈樸味辛烈故名赤樸色紫赤故名厚皮重皮義未明各方記述木高三四丈徑一二尺春生葉如檞葉四季不凋紅花而青實皮極鱗皺而厚紫色多潤者佳薄而白者不堪用三月九月採皮陰乾辨別道地和漢俱有之松岡先生曰和漢俱可通用是大抵有二種李時珍所說及三才圖會所圖者複復樹也愚視漢來者與和產者其皮色味似有不同今多漢來者足可用修治去粗皮薑汁浸透炒用氣味苦溫無毒功用氣味俱厚體重濁而微降陰中陽也入足太陰手足陽明經乾薑為之使惡澤瀉硝石寒水石忌豆食之動氣厚朴之用有三平胃一也去腹脹二也孕婦忌之三也雖除腹脹若虛弱人宜斟酌用之誤服脫人元氣主治中氣傷寒頭痛寒熱驚悸氣血痹死肌去三蟲溫中消痰下氣療霍亂及腹脹痛滿胃中疼冷逆胸中嘔不止泄痢淋露除驚去留熱心煩滿厚腸胃健脾治反胃霍亂轉筋冷熱氣瀉膀胱及五藏一切氣婦人產前後腹藏不安殺腸中蟲明耳目調關節治積年冷氣腹內雷鳴宿食不消去結水破宿血化水穀止吐酸水大溫胃氣治冷痛主病人虛而尿白主肺氣脹滿膨而喘咳杜仲本經上品釋名昔杜姓仲名者服此得道因名思仲思仙二名由上說木綿皮中有銀絲如綿故名各方記述樹高數丈葉如辛夷亦類柘其皮類榆柳折之內有白絲如綿相連五月六月九月採皮稻生先生曰有樹生蔓生二種本草即蔓生一種松岡先生曰蔓生者不入藥用辨別道地和漢俱可用樹大皮厚多綿者為良修治去粗皮鹽酒炒腰痛必以酒行或以薑汁拌炒去絲氣味苦辛甘溫無毒功用氣味俱薄沉而降陰也入足少陰腎之經兼入肝經氣分惡玄參蛇蛻腎虛火熾者不宜用即用當與黃蘗知母同入主治腰膝痛補中益精氣堅筋骨強志除陰下癢濕小便餘瀝腳中痠疼不欲踐地治腎勞腰脊攣腎冷暨腰痛人虛而身強直風也腰不利加而用之能使筋骨相著潤肝除補肝經風虛訶子唐本草所謂訶黎勒釋名訶黎勒梵言也俗訶子各方記述樹似木槵花白子形似梔子橄欖青黃色皮肉相著七月八月實熟時採六路者佳辨別道地漢來只一種而無和產六稜黑色肉厚者佳修治酒浸蒸一伏時去皮取肉焙用或麵裹煨去核氣味酸苦澀溫無毒功用味厚陰也降也入手太陰陽明兼入足厥陰陽明少陰經若氣虛暴嗽初瀉或肺有實熱瀉因濕熱氣喘因火沖者用之立致殺人不可不深戒也主治冷氣心腹脹滿下食破胸膈結氣通利津液止水道黑髭發下宿物止腸澼久泄赤白利消痰下氣化食開胃除煩治水調中止嘔吐霍亂心腹虛痛奔豚腎氣肺氣喘急五膈氣腸風瀉血崩中帶下懷孕漏胎及胎動欲生脹悶氣喘並患痢人肛門急痛產婦陰痛和蠟燒煙薰之及煎湯薰洗治痰嗽咽喉不利含三數枚殊勝寬大腸斂肺降火杏仁別錄下品釋名杏字篆文象子在木枝之形甜梅楊行蜜改杏名各方記述諸杏葉皆圓而有尖二月開紅花亦有千葉者不結實辨別道地和可用杏桃梅之三種藥家多混雜本草原始有圖可考見而擇用修治湯浸去皮尖炒黃研細風寒肺病藥中連皮尖用取其發散也氣味甘苦溫無毒功用氣薄味厚濁而沉墜降也陰也入手太陰經作湯如白沫不解者食之氣壅湯經宿者動冷氣雙仁者有毒惡黃芩黃耆葛根得火良陰虛咳嗽肺家有虛熱痰者忌之風寒外邪非壅逆肺分喘息急促者不得用主治咳逆上氣雷鳴喉痹下氣產乳金瘡寒心奔豚驚癇心下煩熱風氣往來時行頭痛解肌消心下急滿痛殺狗毒解錫毒治腹痹不通發汗主溫病腳氣咳嗽上氣喘促入天門冬煎潤心肺和酪作湯潤聲氣除肺熱治上焦風燥利胸膈氣逆潤大腸氣秘殺蟲治諸瘡疥消腫去頭面諸風氣㾴皰烏梅本經中品釋名本經梅實即今之烏梅也梅者媒也合眾味烏者火薰黑故名各方記述梅花開於冬而實熟於夏得木之全氣故其味最酸其花實有數品今略於此辨別道地取大青梅剝皮籃盛於突上燻黑若以稻灰淋汁潤濕蒸過則肥澤不蠹修治去核微炒用氣味酸澀溫平無毒功用陰也降也入手足太陰足少陰經忌豬肉梅實過食而齒齼者嚼胡桃肉解之病未久有當發散者咸忌之主治下氣除熱煩滿安心止肢體痛偏枯不仁死肌去青黑痣蝕惡肉去痹利筋脈止下痢好唾口乾水漬汁飲治傷寒煩熱止渴調中去痰治瘧瘴止吐逆霍亂除冷熱痢治虛勞骨蒸消酒毒令人得睡和建茶乾薑為丸服止休息痢大驗斂肺澀腸止久嗽瀉痢反胃噎膈蛔厥吐利消腫殺蟲解魚毒馬汗毒硫黃毒桃仁本經下品釋名桃性早花易植而子繁故字從木從兆十億曰兆言其多也各方記述桃品甚多易於栽植且早結實五年宜以刀剝其皮出其脂則多延數年其花有紅紫白千葉三色之殊其餘不可枚舉今省略之辨別道地藥肆多雜梅杏核以售宜擇之修治行血連皮尖生用活血潤燥湯浸去皮尖炒用氣味苦辛甘溫無毒功用氣薄味厚陰中之陽可升可降入手足厥陰血分亦入手陽明經香附為之使雙仁有毒不用若經閉由於血枯腹痛由於血虛便塞由於津液不足者並不可服如用之不當能使下血不止損傷陰真為害非淺婦人難產桃仁一個劈開一片書可字一片書出字吞之即生主治瘀血血閉癥瘕邪氣殺小蟲止咳逆上氣消心下堅硬除卒暴擊血通月水止心腹痛治血結秘血燥通潤大便破畜血殺三蟲主血滯風痹骨蒸肝瘧寒熱鬼注疼痛產後血病大棗本經上品釋名棗性重喬故重束為棗入藥宜用肥大甘美者故諸果只載其名惟棗獨加大字干棗美棗良棗各方記述棗大赤心有刺四月生小葉尖觥光澤五月開小花白色微青長夏結實摘取暴乾辨別道地和邦處處多矣植家園可以採用小者止可充果食入藥惟用形大而核小多脂甘美者凡有大小二三種形大而味甘者稱朝鮮棗上品也形小而肉薄味淡者下品也修治劈去核用氣味甘溫無毒功用氣味俱厚陽也可升可降入足太陰陽明經忌與蔥魚同食殺烏頭附毒小兒患秋痢蛀棗與食能止府病及齒痛痰熱之人俱不宜食生者尤不利人紅者功用相仿差不及耳主治心腹邪氣安中養脾氣平胃氣通九竅助十二經補少氣少津液身中不足大驚四肢重和百藥補中益氣堅志強力除煩悶療心下懸除腸澼潤心肺止嗽補五藏治虛損除腸胃癖氣和光粉燒治疳痢和陰陽調營衛生津液木瓜別錄中品釋名木實如小瓜酢而可食故名楙音茂爾雅木瓜各方記述木瓜有三種花深紅而實形如小瓜者木瓜和名加良保計者花淡紅色而實形扁圓者榠樝和名久和俚牟者也花實俱如木瓜而形狀矮者貼莖海棠者也俱是一類詳出於松岡先生用藥須知中可考見辨別道地和漢俱有之陳久為良則可用漢來者也修治忌鐵器銅刀削去硬皮並子切片曬乾用氣味酸澀溫無毒降多於升陽中陰也入手足太陰血分兼入足厥陰經多食木瓜損齒及骨皆伐肝之明驗主治濕痹腳氣霍亂大吐下轉筋不止治腳氣衝心取嫩者一顆去子煎服佳強筋骨下冷氣止嘔逆心膈痰唾消食止水利後渴不止作飲服之止吐瀉奔豚及水腫冷熱痢心腹痛調營衛助穀氣去濕和胃滋脾益肺治腹脹善噫心下煩痞山楂唐本草即山樝釋名赤瓜子瓜當作棗音訛也樝狀似赤棗鼠樝猴樝茅樝此物生山原茅林中猴鼠喜食故名朹子音求檕梅音計機子音求樹如梅羊梂子一種大者山人呼之棠梂子山裡果以上三名未詳各方記述樹高數尺葉有五尖椏間有刺三月開五出小白花實有赤黃二色肥者如小林檎小者如指頭九月乃熟辨別道地和漢俱有之葉似甘棠有小鋸齒一種大者名朹子非常用之藥品今藥肆在丸山楂子肉山楂子之二種以丸山楂子為良修治不去核克用以有核功能也氣味酸微溫無毒功用入足陽明太陰經同紅曲麥芽橘皮白朮肉豆蔻厚朴砂仁能消食健脾同牛膝生地當歸續斷益母澤蘭丹皮蒲黃芍藥治兒枕痛若胃家無食積及脾虛不能運化者食之反致克伐脾胃生氣如胃虛兼有積滯者當與補藥同施主治煮汁服止水痢沐頭洗身治瘡癢煮汁洗漆瘡多瘥治腰痛有效消食積補脾治小腸疝氣發小兒瘡疹健胃行結氣治婦人產後兒枕痛惡露不盡煎汁入沙糖服之立效化飲食消肉積癥瘕痰飲痞滿吞酸滯血痛化血塊活氣活血陳皮本經上品釋名本經所謂橘柚也云五色為慶二色為矞靈外赤內黃非煙非云鬱郁紛紛橘實外赤內黃剖之香霧紛郁有似矞雲又取此意也橘皮以色紅日久者為佳故曰紅皮陳皮去白者曰橘皮也各方記述橘樹高丈許枝多生刺其葉兩頭尖緣色光面大寸余長二寸許四月著小白花甚香結實至冬黃熟大者如杯包中有瓣瓣中有核也辨別道地和漢俱可用漢稱橘皮者良稱陳皮者多挾雜而不佳家園新收者隔歲而可用修治水洗潤透刮去筋膜曬乾銼炒用入理胃藥則留白氣味苦辛溫無毒功用氣薄味厚陽中之陰可升可降入足陽明太陰經理氣燥濕雖曰中和然單服久服亦能損真也中氣虛與氣不歸元者忌與耗氣藥同用陰虛咳嗽生痰不宜與半夏南星等藥同劑主治胸中瘕熱逆氣利水穀久服去臭下氣止咳嘔治氣衝胸中吐逆霍亂療脾不能消穀止泄除膀胱留熱停水起淋利小便去寸白蟲清痰涎治上氣咳嗽開胃主氣痢破症癖痃癖療吐噦反胃嘈雜時吐清水痰痞痎瘧大腸悶塞婦人乳癰入食料解魚腥毒青皮各方記述青橘皮乃橘之未黃而青色者薄而光其氣芳烈古方無用者至宋時醫家始用之辨別道地頭破裂者俗呼四花青皮凡用以此為勝今人多以小柑小柚小橙偽為之不可不辨修治以湯浸切片酸拌炒過用氣味苦辛溫無毒功用氣味俱厚沉而降陰也入厥陰少陽經其性最酷烈削堅破滯是其所長然誤服之立損人真氣為害不淺凡欲施用必與參朮芍藥等補脾藥同用庶免遺患必不可單行也肺脾氣虛者概勿施用主治氣滯下食破積結及膈氣破堅癖散滯氣去下焦諸濕治左脅肝經積氣治胸膈氣逆脅痛小腹疝痛消乳腫疏肝膽瀉肺氣龍眼肉別錄中品釋名龍眼象形以名龍目圓眼義同上益智甘味歸脾能益人智故名亞荔枝亞枝奴荔枝才過龍眼熟故南人呼之驪珠燕卵鮫淚川彈蜜脾以上諸名象形味以名各方記述木高一二丈似荔枝而枝葉微小凌冬不凋春來夏初開細白花七月實熟谷青色文作鱗甲形圓大如彈丸核若木梡子而不堅肉薄於荔枝白而有漿其甘如蜜實極繁每枝二三二顆作穗如葡萄辨別道地漢來無和產漢來者亦有大小二種皆蒸熟者而無生乾者入藥生為良予曏者偶見生乾者來於崎港色味與蒸熟者懸隔矣松岡先生曰薩州其外諸國有之而不結實偶雖實亦不熟不應土地故乎修治去殼核採肉用氣味甘溫平無毒功用入手少陰足大陰經核治孤臭以六枚同胡椒二七粒研遇汗出即擦之主治五藏邪氣安志厭食除蠱毒去三蟲久服強魄聰明開胃益脾補虛長智檳榔別錄中品釋名賓與郎皆貴客之稱交廣人凡貴勝族客必先呈此果若邂逅不設用相嫌恨則檳榔之名義蓋取諸此賓門名義同上仁頻上林賦注仁頻即檳榔也洗瘴丹南方地濕不食此無以祛瘴癘故名各方記述初生若筍竿積硬引莖直上莖幹頗似桄榔椰子而有節旁無枝柯條從心生端頂有葉如甘蔗條派開破風至則如羽扇掃天之狀三月葉中腫起一房因自坼裂出穗凡數百顆大如桃李又生刺重累於下以護衛其實五月成熟剝去其皮煮其肉而干之皮皆筋絲與大腹皮同也辨別道地漢來一種而無偽雜與大腹子一種而有少別者也修治去空心者刮去臍皮見火無功氣味苦辛微溫澀無毒功用味厚氣輕沉而降陰中陽也入手足陽明經凡病屬陰陽兩虛中氣不足無宿食者悉在所忌主治消穀逐水除痰澼殺三蟲伏屍寸白治腹脹生搗末服利水穀道傅瘡生肌肉止痛燒灰傅口吻白瘡宣利五藏六府壅滯破胸中氣下水腫治心痛積聚除一切風下一切氣通關節利九竅補五勞七傷健脾調中除煩破癥結主賁豚膀胱諸氣五膈氣風冷氣腳氣宿食不消治衝脈為病氣逆裡急瀉痢後重心腹諸痛大小便氣秘痰氣喘急療諸瘧御瘴癘大腹皮宋開寶釋名大腹檳榔豬檳榔各方記述檳榔中一種腹大形扁而味澀者不似檳榔尖長味良所謂豬檳榔者是矣謂其皮名大腹皮辨別道地有漢來而無和產修治鴆鳥多集檳榔樹上凡用榔檳皮宜先以酒洗令黑汁去盡火焙切用氣味辛微溫無毒功用可升可降入足太陰陽明經按大腹皮即檳榔外皮也其氣味所主與檳榔大約相同第檳榔性烈破氣最捷腹皮性緩下氣稍遲乃疏泄之藥也凡病涉虛者勿用主治冷熱氣攻心腹大腸蠱毒痰膈醋心並以姜鹽同煎入疏氣藥用之下一切氣止霍亂通大小腸健脾開胃調中降逆氣消肌膚中水氣浮腫腳氣壅逆瘴瘧痞滿胎氣惡阻脹悶吳茱萸本經中品釋名以吳地者為好所以有吳之名也茱萸二字義未詳各方記述茱萸枝柔而肥葉長而皺其實結於梢頭累累成簇而無核與椒同一種粒大一種粒小小者入藥為勝辨別道地和漢俱有之真可用漢來為良修治鹽湯洗去苦烈汁焙乾用開口者佳氣味辛苦大熱有小毒功用氣味俱厚半沉半浮陽中陰也入足太陰血分又入少陰厥陰經氣分蓼實為之使惡丹參畏紫石英凡病非寒滯者勿用即因寒亦當斟量虛實適事為效也如一切陰虛及五藏有熱無寒之人法所大忌寒傷胃脘腎氣噦逆宜醋炒茱萸同陳皮熟附為丸薑湯下主治溫中下氣止痛除濕血痹逐風邪開腠理咳逆寒熱利五藏去痰冷逆氣飲食不消心腹諸冷絞痛中惡心腹痛霍亂轉筋胃冷吐瀉腹痛產後心痛治遍身𤸷痹刺痛腰腳軟弱利大腸壅氣腸風痔疾殺三蟲殺惡蟲毒牙齒蟲䘌鬼魅疰氣下產後余血治腎氣腳氣水腫通關節起陽健脾主痢止瀉厚腸胃肥健人治痞滿塞胸咽膈不通潤肝燥脾開鬱化滯治吞酸厥陰痰涎頭痛陰毒腹痛疝氣血痢喉舌口瘡蓮肉本經所謂蓮子釋名蓮者連也花實相連而出也蓮子刮去黑殼謂之蓮肉藕實藕者耕也善耕泥故字從耦菂菂的也子在房中點點如的也薂音吸石蓮子深秋之老蓮子黑堅如石者也水芝澤芝芝者靈芝水澤尊稱之乎各方記述藕者根也蓮者實也荷者葉也芙蕖者總名也蓮子八九月採黑堅如石者干搏破之辨別道地石蓮子者其子中肉黃白色心內空無青芽形細長而頭圓谷光黑硬如石故名石蓮別是一種藥物非藕實也繆仲醇曰今肆中一種石蓮子狀如榧子有味太苦產廣中出樹上木實不宜入藥其外有數說而詳於炮炙全書中不知熟是矣惟有經霜老蓮實之可用用者宜詳審之修治不去心使人作吐凡使須去心蒸焙用氣味甘平澀無毒功用入手少陰足太陰陽明厥陰少陰經得茯苓白朮枸杞良蓮實脾家果也甘平無毒無諸疾並無相迕第生者食之過多微動冷氣脹人大便燥澀者不可食主治補中養神益氣力除百疾五藏不足傷中益十二經脈血氣止渴去熱安心止痢治腰痛及泄精多食令人歡喜交心腎厚腸胃固精氣強筋骨補虛損利耳目除寒濕止脾泄久痢赤白濁女人帶下崩中諸血病搗碎和米作粥飯食輕身益氣令人強健安靖上下君相火邪肉桂別錄上品牡桂本經上品釋名凡木葉心皆一縱理獨桂有兩道如圭形故字從圭祲能侵害他木也桂釘木根其木死是也各方記述桂有數種以今參訪牡桂葉長如枇杷葉堅硬有毛及鋸齒其花白色其皮多脂菌桂葉如柿葉而尖狹光淨有三縱文而無矩齒其花有黃白其皮薄而卷今商人所貨皆此二桂但以卷者為菌桂半卷及板者為牡桂辨別道地漢來者以東京為上交趾阿港蛇吧等次之且有桂心桂枝之殊菌桂官桂之品肉桂乃近根之最厚者辛烈肉厚官桂即在中之次厚者味稍淡於肉桂皮薄少脂因桂多品而取其品之最高及上等供官之桂也桂心即去皮上甲錯而取其近木而有理者桂枝即頂上細桂條春夏禁服秋冬宜煎間有和產者藥肆稱桂心以售之味薄氣烈近年多出於薩摩者其形狀本草所謂菌桂也猶可用又松浦桂心者氣味甚薄殊不堪用修治忌火氣味甘辛大熱有小毒功用陽中之陽浮也入足少陰太陰厥陰血分忌生蔥石脂得人參甘草麥冬大黃黃芩柴胡地黃良凡腎虛命門火衰不能生土完穀不化產後下元不足營衛衰微者可用若陰虛之人及一切血症非挾寒目疾非脾虛者不可誤投主治利肝肺氣心腹寒熱冷痰霍亂轉筋頭痛腰痛出汗止煩止唾咳嗽鼻齆墮胎炒過便不損胎溫中堅筋骨通血脈理疏不足宣導百藥無所畏補下焦不足治沉寒痼冷之病滲泄止渴去營衛中風寒表虛自汗春夏為禁藥秋冬下部腹痛非此不能止補命門不足益火消陰治寒脾風瘖陰盛失血瀉痢驚癇沉香別錄上品釋名木之心節置水則沉故名沉水香蜜香謂其氣如蜜脾也各方記述漢來者種類不一香之等凡三曰沉曰棧曰黃熟沉香者為沉香半沉者為棧香不沉者為黃熟香入藥沉水者上半沉者次之不沉者可薰衣及焚燒而已辨別道地今肆中所賣其氣多焦烈又置之水中不能沉乃黃熟香類爾非沉之精美者也入選藥品之高者用之可也此外有奇南香番香不載於綱目性異用亦殊今略於此修治入丸散銼為末入煎劑惟磨臨時入之忌日曝火烘氣味辛苦溫無毒功用陽也可升可降入足太陰少陰兼入手少陰足厥陰按諸木皆浮此獨沉故入肝木而治逆上之氣行氣溫中而不助火誠良劑也合於冷氣氣逆氣鬱氣結如中氣虛而氣不歸元及氣虛下陷者心經有實邪者均不可投設施火症反羅禁矣若命門真火衰者亦不宜入下焦藥主治風水毒腫去惡氣主心腹痛霍亂中惡邪鬼疰氣清人神並宜酒煮服之諸瘡腫宜入膏中調中補五藏益精壯陽暖腰膝止轉筋吐瀉冷氣破症癖冷風麻痹骨節不任風濕皮膚瘙癢氣痢補右腎命門補脾胃及痰涎出血理脾益氣和神治上熱下寒氣逆喘急大腸虛閉小便氣淋男子精冷丁香宋開寶釋名其子形如釘子故名丁子香俗人以其似丁子故名雞舌香其中心最大者為雞舌擊破有順理而解為兩向如雞舌故名各方記述生交廣南蕃今惟廣州有之木類桂高丈餘葉似櫟凌冬不凋花圓細黃色其子出枝藥上紫色長三四分形如釘子辨別道地蠻舶所載來者只一種此物有雌雄者顆小為丁香可入藥雌者為母丁香形雖大性不良入藥最為勝者恐非是修治去丁蓋乳子銼用勿見火氣味辛熱無毒功用氣厚味薄升也陽也入手太陰足少陰陽明經畏鬱金以生薑汁和拔去白髮塗孔中即異常黑一切火熱證切忌主治溫脾胃止霍亂擁脹風毒諸腫齒疳䘌能發諸香風䘌骨槽殺患辟惡去邪治奶頭花止五色毒痢五痔治口氣冷氣冷勞反胃鬼疰蠱毒殺酒毒消痃癖療腎氣奔豚氣陰痛腹痛壯陽暖腰膝療嘔逆甚驗去胃寒理元氣氣血盛者勿服治虛噦小兒吐瀉痘瘡胃虛灰白不發烏藥宋開寶釋名烏以色名旁其鰟魮其葉狀似鰟魮鯽魚故俗呼為鰟魮樹作旁其方音訛也矮樟其氣似樟故名各方記述樹生似茶高丈餘一葉三椏葉青陰白根狀似山芍藥及烏樟根色黑褐作車轂紋橫生八月採根其直根者不堪用辨別道地酒浸一宿炒用氣味辛溫無毒功用氣厚於味陽也可升可降入足陽明少陰經味薄無滋益人不過疏散宜通暢於香附而已不必多用也惟與參朮同行庶無弊耳氣血俱虛及內熱者勿用主治中惡心腹痛蠱毒疰忤鬼氣宿食不消天行疫瘴膀胱腎間冷氣攻衝背膂婦人血氣小兒腹中諸蟲除一切冷霍亂反胃吐食瀉痢癰癤疥癘並解冷熱其功不可悉載貓犬百病並可磨服理元氣中氣腳氣疝氣氣厥頭痛腫脹喘急止小便頻數及白濁桑白皮本經中品釋名桑字從叒從木眾手採取之形也各方記述桑有數種有白桑葉大如掌而厚雞桑葉花而薄子桑先椹而後葉山桑葉尖而長以子種者不若壓條而分者修治干桑皮臨時刮去上薄衣銅刀銼炙用氣味甘辛苦寒無毒功用甘厚而辛薄可升可降陽中陰也入手太陰經續斷桂心麻子為使忌鐵及鉛此物乃瀉肺諸方之準繩也古稱補氣者非若參耆之正補乃瀉邪所以補正也愚者信為補劑而肺虛亦用之大失桑皮之面目矣若肺虛無火而小便利者及因風寒而嗽者不宜用也主治傷中五勞六極羸瘦崩中絕脈補虛益氣去肺中水氣唾血熱渴水腫腹滿臚脹利水道去寸白可以縫金瘡治肺氣喘滿虛勞客熱頭痛內補不足煮汁飲利五藏入散用下一切風氣水氣調中下氣消痰止渴開胃下食殺腹藏蟲止霍亂吐瀉研汁治小兒天吊驚癇客忤及傅鴨口瘡大驗瀉肺利大小腸降氣散血枳實本經中品釋名枳乃木名從只諧聲也實乃其子枳殼實殼一物也呼老者為枳殼生則皮厚而實熟則殼薄而虛正如青皮陳皮之義各方記述木如橘而小高五七尺葉如橙多刺春生白花至秋成實七月八月採者為實九月十月採者為殼今醫家以皮厚而小者為枳實完大者為枳殼皆以翻肚如盆口狀久者為勝近道所出者俗呼臭橘不堪用時珍曰臭橘一名枸橘樹葉與橘同但干多刺三月開白花青蕊不香結實大如彈丸形如枳實而殼薄不香人家多收種為藩籬亦或收小實充枳實及青橘皮售之不可不辨辨別道地漢產可用枸橘吾本邦亦多為藩籬俗稱嗑辣咀知或積枳殼藥肆中採收熟者為枳實未熟者為枳殼貨之非真不可用修治水漬透去穰切片曬乾麩炒至麩焦去麩用氣味苦酸寒無毒功用氣厚味薄沉也陰也入足陽明太陰經凡中氣虛弱勞倦傷脾發為痞滿者當用補中益氣補其不足此藥所當忌也時醫不識病之虛實藥之補瀉往往概施損人真氣為害不淺設誤投之雖服參耆亦難挽回其刻削之禍矣戒之戒之主治大風在皮膚中如麻豆苦癢除寒熱結止痢長肌肉利五藏除胸脅痰癖逐停水破結實消脹滿心下結痞痛逆氣脅風痛安胃氣止溏泄明目解傷寒結胸主上氣喘咳腎內傷冷陰痿而有氣加而用之消食散敗血破積堅去胃中溫熱枳殼修治水浸去穰切片麩炒黑去麩用氣味苦酸寒無毒功用氣厚味薄浮而微升陰中陽也又曰沉也陰也入手太陰陽明經久瀉不實者禁用主治風痹淋痹通利關節勞氣咳嗽背膊悶倦散留結胸膈痰滯逐水消脹滿安胃止風痛遍身風𤺋肌中如麻豆惡瘡腸風痔疾心腹結氣兩脅脹虛關膈壅塞健脾開胃調五藏下氣止嘔逆消痰治反胃霍亂瀉痢消食破癥結痃癖五膈氣及肺氣水腫大小腸除風明目炙熱熨痔腫泄肺氣除胸痞治裡急後重山梔子本經中品釋名卮酒器也卮子象之俗作梔木丹越桃皆象色與形鮮支司馬相如賦注鮮支即支子薝蔔佛書稱花云各方記述卮子葉如兔耳厚而深綠春榮秋瘁入夏開花大如酒杯白瓣黃蕊隨即結實薄皮細子有須霜後收之辨別道地和產可用皮薄而圓小者為佳形大皮厚者可供染色一種有矮山梔不入藥用修治炒透治上焦中焦連殼治下焦去殼洗去黃漿治血病炒心胸中熱用仁肌表熱用皮今殼皮仁連用氣味苦大寒無毒功用氣薄味厚輕清上行氣浮味降陽中陰也入手太陰血分按苦寒損胃而傷血脾胃虛弱者血虛發熱者忌之性能瀉有餘之火心肺無邪熱者不宜用小便不通由於膀胱虛無氣以化而非熱結小腸者不可用主治五內邪氣胃中熱氣面赤酒皰皶鼻白癲赤癩瘡瘍療目赤熱痛胸心大小腸大熱心中煩悶去熱毒風除時疾熱解五種黃病利五淋通小便解消渴明目主中惡殺䗪蟲毒解玉支毒羊躑躅也主瘖瘂紫癜風治心煩懊憹不得眠臍下血滯而小便不利瀉三焦火清胃脘血治熱厥心痛解熱鬱行結氣治吐血衄血血痢下血血淋損傷瘀血及傷寒勞復熱厥頭痛疝氣湯火傷酸棗仁本經上品釋名實似棗味酸故名樲孟子曰養其樲棘是也山棗各方記述似棗木而皮細其木心赤色莖葉俱青花似棗八月結實紅色似棗而圓小味酸當月採實取核中仁辨別道地和漢俱可用修治去皮尖用多睡生用不得睡炒熟用氣味酸甘平無毒功用可升可降陽中陰也入手少陰足少陽厥陰經兼入足太陰經惡防己凡肝膽脾三經有實邪熱者勿用以其收斂故也主治心腹寒熱邪結氣聚四肢痠痛濕痹煩心不得眠臍上下痛久泄虛汗煩渴補中益肝氣堅筋骨助陰氣能令人肥健筋骨風炒仁研湯服山茱萸本經中品釋名茱言色紅萸言肥潤故名蜀酸棗肉棗魃實雞足鼠矢諸因形狀而名各方記述葉如梅有刺二月開花如杏四月結實如酸棗赤色五月採實辨別道地漢來者可用雖有和產不多得修治酒潤去核核能消精氣味酸微溫無毒功用陽中之陰可升可降入足厥陰少陰經氣分蓼實為之使惡桔梗防風防己按命門火熾強陽不痿者忌之膀胱熱結小便不利者法當清利此藥味酸主斂不宜用陰虛血熱宜用即用當與黃蘗同加主治心下邪氣寒熱溫中逐寒濕痹去三蟲久服輕身腸胃風邪寒熱疝瘕頭風風氣去來鼻塞目黃耳聾面皰下氣出汗強陰益精安五藏通九竅止小便利久服明目強力長年治腦骨痛療耳鳴補腎氣興陽道堅陰莖添精髓止老人尿不節治面上瘡能發汗止月水不定暖腰膝助水藏除一切風逐一切氣破癥結治酒皶溫肝地骨皮本經上品釋名枸杞根最長故名各方記述枸杞莖幹高三五尺作叢其根採無時辨別道地和產可用和產有二種無刺者為真有刺者亦可用實非別類也修治洗淨去心以熟甘草湯浸焙乾用氣味甘淡苦寒無毒功用升也降也入足少陰手太陰少陽經制硫黃丹砂嘗以青蒿佐之退熱有殊功世人但知用黃芩黃連知母而不知枸杞地骨甘能使精氣充而又退火之妙也中寒者勿服主治細銼拌麩煮熟吞之去腎家風益精氣去胃熱消渴解骨蒸肌熱風濕痹堅筋骨涼血治在表無定之風邪傳屍有汗之骨蒸瀉腎火降肺中伏火去胞中火退熱補正氣治上膈吐血煎湯漱口止齒血治骨槽風金瘡神驗去下焦肝腎虛熱蔓荊子本經上品釋名苗蔓生故名今所有非蔓而枝弱如蔓故云各方記述蔓荊莖高四五尺對節生枝初春因舊枝而生葉如榆葉長尖有鋸齒至夏盛茂杪間開花成穗紫色其子如梧子許大而有白膜皮裹之海濱沙地皆有之八九月採實辨別道地和產真可用修治去蒂並白膜打碎用氣味苦辛微寒無毒功用陰中之陽升也入足太陽厥陰經惡烏頭石膏頭目痛不因風邪而由於血虛有火者忌之胃虛人不可服恐生痰疾主治筋骨間寒熱濕痹拘攣明目堅齒利九竅去白蟲風頭痛腦鳴目淚出治賊風長髭發利關節治癇疾赤眼太陽頭痛頭沉昏悶除昏暗散風邪涼諸經血止目睛內痛搜肝風茯苓本經上品釋名茯者附也伏松之下有附之義也苓者零也離松之體有零之義也故名伏靈松之神靈之氣伏結而成故云伏菟下有伏靈上有菟絲故名松𦛟不死麵未詳伏神抱根者名神赤茯苓即茯苓色赤者也各方記述生大山山谷雄松下假土之精氣松之餘氣而成赤白共有之出於松根者為良辨別道地茯苓茯神俱和產可用色白而堅實者為良色淡白赤而輕虛者不可用修治去皮膜及筋用氣味甘淡平無毒功用氣味俱薄浮而升陽中之陰也入手太陰足太陽經氣分惡白蘞畏牡蠣地榆雄黃秦艽龜甲忌米醋及酸物病人腎虛小水自利或不禁或虛寒精清滑皆不得服汗多者亦禁主治胸脅逆氣憂恚驚邪恐悸心下結痛寒熱煩滿咳逆口焦舌乾利小便止消渴膈中痰水水腫淋結開胸腑調藏氣伐腎邪長陰益氣力保神氣開胃止嘔逆善安心神主肺痿痰壅心腹脹滿小兒驚癇女人熱淋補五勞七傷開心益志止健忘暖腰膝安胎止渴利小便除濕和中益氣生津除虛熱開腠理瀉膀胱益脾胃治腎積奔豚茯苓皮主治水腫膚脹利水道開腠理赤茯苓主治破結氣瀉心小腸膀胱濕熱利竅行水茯神主治療眩運定上氣安神志益心氣止心下急痛堅滿療虛勞驚悸善忘心內木名黃松節主治善治風寒冷濕搏於筋骨足攣難定之病豬苓本經中品釋名豬者其形黑似豬屎苓者其塊零落而下亦是木之餘氣所結如松之餘氣結茯苓之義豭豬屎豕橐形狀似豬矢故名地烏桃以形而名各方記述生土底是木之餘氣所結二八月採之辨別道地有漢來而無和產皮黑肉白而實者良修治水浸去皮蒸曬行濕生用氣味甘淡平無毒功用氣味俱薄降也陽中陰也入足太陽少陰經久服必損腎氣昏人目淡滲太燥能亡津液無濕證者勿服有濕宜暫用主治痎瘧解毒蠱疰不祥利水道解傷寒溫疫大熱發汗主腫脹滿腹急痛治渴除濕去心中懊憹瀉膀胱開腠理治淋腫腳氣白濁帶下妊娠子淋胎腫小便不利桑寄生本經上品釋名此物寄寓他木而生如烏立於上故名寄屑寓木宛童蔦皆寄生之義也各方記述寄生高者二三尺其圓而微尖厚而面青光澤背淡紫而有茸以其莖色深黃者為真辨別道地寄生難得桑上真者藥肆多收他木者售之非特不適疾而已卻至損命不可不慎也今醫家知寄生之難得藥肆之不真而以桑耳代之者多矣雖非是亦不遠桑上癭木猶勝他木之寄生者乎予每以松寄生代用之雖非類惟取其寄寓之性而已亦是不得已者也修治採得銅刀和根枝莖細銼陰乾用勿見火氣味甘平無毒功用入足厥陰經主治腰痛小兒背強癰腫充肌膚堅發齒長鬚眉安胎去女子崩中內傷不足產後余疾下乳汁主金瘡去痹助經骨益血脈主懷妊漏血不止令胎牢固竹茹本經上品釋名竹字象形刮取竹皮為茹各方記述乃淡竹也竹稟陰氣以生種類甚多惟味甘者為勝必生長甫及一年者嫩而有力辨別道地竹茹以淡竹為上苦竹勿用修治刮去青皮用第二層乃青皮與白肉之間刮取淡青者也氣味甘微寒無毒功用陰也可升可降入足陽明經胃寒嘔吐及感寒挾食作吐忌用主治嘔吐溫氣寒熱吐血崩中止肺痿唾血鼻衄治五痔噎膈傷寒勞復小兒熱癇婦人胎動竹瀝取竹瀝法將淡竹截尺許劈開以磚兩片對立架竹於上以炭火炙之其瀝自出以器盛取之氣味甘微寒無毒功用陽中之陰可升可降入手太陰足少陰太陰經薑汁為使大抵風火燥熱而有痰者宜之胃虛濕痰及食積生痰者不宜服也主治暴中風風痹胸中大熱止煩悶消渴勞復中風失音不語養血清痰風痰虛痰在胸膈使人癲狂痰在經絡四肢及皮裡膜外非此不達不行治子冒風痓解射罔毒殭蠶本經中品釋名強死而不朽故云蠶從朁象其頭身之形從蟲以其繁也白殭蠶自死者其色自白故名各方記述蠶孕絲蟲也種類甚多有大小烏斑色之異其蟲屬陽喜燥惡濕食而不飲三眠三起二十七日而老自卵出而為䖢自䖢蛻而為蠶蠶而繭繭而蛾蛾而卵卵而復䖢亦有胎生者與母同老蓋神蟲也辨別道地和產不拘早晚但用白色而條直者烏黑者不用修治米泔浸一日待涎浮水上然後灑出焙去絲及黑口用氣味鹹辛溫有小毒功用氣味俱薄輕浮而分陽中之陽厥陰陽明之藥惡桑螵蛸桔梗茯苓茯神萆薢殭蠶性辛溫辛能散其功長於祛風化痰散有餘之邪凡中風口噤小兒驚癇夜啼由於心虛神魂不寧血虛經絡勁急而無外邪為病者忌之女子崩中赤白產後腹痛滅諸瘡瘢痕為未封丁腫拔根極效治噤口發汗同白魚鷹屎白等分治瘡滅痕以七枚為末酒服治中風失音並一切風疰小兒客忤男子陰癢痛女子帶下焙研薑汁調灌治中風喉痹欲絕下喉立愈散風痰結核瘰癧頭風風蟲齒痛皮膚風瘡丹毒作癢痰瘧癥結婦人乳汁不通崩中下血小兒疳蝕鱗體一切金瘡疔腫風痔全蠍開寶釋名蠆幽州人謂之蠍入藥有全用者故云蛜𧌴未詳主簿蟲江南本來無蠍有主簿將至故俗呼為主簿故名杜白詩疏蠆一名杜白蠆尾蟲蠍前為螫後為蠆其毒在尾用尾者謂之蠍梢其力尤緊各方記述蠍形如水黽八足而長尾有節色青辨別道地漢來者可用修治水浸去鹹味並足炒用氣味甘辛有毒功用入足厥陰經小兒驚風尤不可闕若似中風及小兒慢脾風病屬於虛者法咸忌之主治諸風癮𤺋及中風半身不遂口眼喎斜語澀手足抽掣小兒驚癇風搐大人痎瘧耳聾疝氣諸風瘡女人帶下隱脫蟬蛻本經中品釋名蟬殼枯蟬腹蜟金牛兒皆以形名修治凡用蛻殼沸湯洗去泥土翅足漿水煮過曬乾用氣味鹹甘寒無毒功用入手太陰足陰太陰經按蟬蛻乃土木之餘氣所化飲風吸露其氣清虛故主療一切皮膚風熱之症痘疹虛寒證不得服主治小兒驚癇婦人生子不下燒灰水服治久痢小兒壯熱驚癇止渴研末一錢井華水服治啞病除目昏障翳以水煎汁服治小兒瘡疹出不快甚良治頭風眩運皮膚風熱痘疹作癢破傷風及下腫毒瘡大人失音小兒噤風天吊驚哭夜啼陰腫阿膠本經上品釋名出東阿縣故名一名驢皮膠各方記述山東袞州府陽穀縣東北六十里即古之東阿縣也有井官禁真膠難得其膠以黑驢皮汲阿井水加鹿角一片熬之成膠辨別道地此藥多偽偽者能滯痰當以光如漆色帶油綠者為真折之即斷亦不作臭氣今漢來有三種硯樣為上品算木樣為中品皿樣為下品修治土器炒至成珠可用或蛤粉或糯米或酥炒各從本方也得火良氣味甘鹹微溫無毒功用氣味俱薄浮而升陽也入手少陰足少陰厥陰經薯蕷為之使畏大黃胃弱作吐與脾虛食不消者忌之主治心腹內崩勞極洒洒如瘧狀腰腹痛四肢痠痛女子下血安胎丈夫小腹痛虛勞羸瘦陰氣不足腳痠不能久立養肝氣堅筋骨益氣止痢療吐血衄血血淋尿血腸風下痢女人血痛血枯經水不調無子崩中帶下胎前產後諸疾男女一切風病骨節疼痛水氣浮腫虛勞咳嗽喘急肺痿唾膿血及癰疽腫毒和血滋陰除風潤燥化痰清肺利小便調大腸聖藥也犀角本經中品釋名犀字篆文象形兕其牸名兕各方記述犀角紋如魚子形謂之粟紋紋中有眼謂之粟眼黑中有黃花者為正透黃中有黑花者為倒透花中復有花者為重透併名通犀乃上品也花如椒豆斑者次之烏犀純黑無花者為下品其通天夜視有光者名夜明犀故能通神開水飛禽走獸見之皆驚辨別道地今漢來及蠻舶所來者有白犀角有烏犀角而多贗物宜精詳擇用凡稱一角者亦通天犀之類而上品真難多得修治入藥用黑光潤者鋸成以薄紙裹懷中一宿乘燥搗之應手如粉氣味酸鹹苦寒無毒功用味厚於氣可升可降陽中之陰也入足陽明兼入手少陰經松脂升麻為之使惡烏頭鳥喙雷丸雚菌忌鹽醬按肺火燥熱及痘瘡氣虛無大熱者不宜用傷寒陰症發燥者尤不宜用妊婦勿多服消胎氣主治百毒蟲疰邪鬼瘴氣殺鉤吻鴆羽蛇毒除邪不迷惑魘寐傷寒溫疫頭痛寒熱諸毒氣令人駿健闢中惡毒氣鎮心神解大熱散風毒治發背癰疽瘡腫化膿作水療時疾熱如火煩毒入心狂言妄語治心煩止驚鎮肝明目安五藏應虛勞退熱消痰解山瘴溪毒主風毒攻心毷氉熱悶赤痢小兒風熱驚癇燒灰水服治卒中惡心痛飲食中毒藥毒熱毒筋骨中毒心風煩悶中風失音以水磨服治小兒驚熱山犀水犀功用相同磨汁治吐血衄血下血及傷寒畜血發狂譫語發黃發斑痘瘡稠密內熱黑陷或不結痂瀉肝涼心清胃解毒鹿茸本經中品釋名鹿字篆文象其頭角身足之形茸覆蓋也各方記述茸最難得不破及不出血者蓋其力盡在血中故也此以如紫茄者為上名茄子茸取其難得耳然此太嫩血氣未具其實少力堅者又太老惟長四五寸形如分歧馬鞍茸端如瑪瑙紅玉破之肌如朽木者最善人亦將麋角偽為之不可不審辨別道地今藥肆所售者有大小堅軟軟小而輕虛者為上堅大者為下修治用酥塗勻於烈火中灼之候毛盡微炙候黃褐色研細入藥不可缺酥又有用酒及酒蒸焙用者當各從本方氣味甘鹹溫無毒功用氣薄味厚陰中之陽也入手厥陰少陰足少陰厥陰經不可以鼻嗅之中有小白蟲視之不見入鼻必為蟲顙藥不及也凡陰衰火盛胃有火者吐血下血陰虛火熾者俱忌之主治漏下惡血寒熱驚癇益氣強志療虛勞洒洒如瘧羸瘦四肢痠疼腰脊痛小便數利泄精溺血破瘀血在腹散石淋癰腫骨中熱疽安胎下氣殺鬼精物久服耐老丈夫陰痿補男子腰腎虛冷腳膝無力夜夢鬼交精溢自出女人崩中漏血赤白帶下炙末空心酒服方寸匕壯筋骨生精補髓養血益陽強精健骨治一切虛損耳聾目暗眩運虛痢石膏本經中品釋名火煅細研醋調封丹灶其固密甚於脂膏故名細理石文理細密故名寒水石其性大寒如水故名各方記述生齊山山谷及齊廬山魯蒙山塊大如蠟有二三寸厚者色至瑩白可愛有縱理而不方解辨別道地漢來者真也此物有軟硬二種入藥軟石膏為佳和產多硬石膏也不堪藥用修治搗粉生甘草水飛過澄曬虛人煅用或糖拌炒則不妨脾胃氣味甘辛大寒無毒功用氣味俱薄降也陰也入手太陰少陽足陽明經雞子為之使惡莽草巴豆馬目毒公畏鐵主治中風寒熱心下逆氣驚喘口乾舌焦不能息腹中堅痛除邪鬼產乳金瘡除時氣頭痛身熱三焦大熱皮膚熱腸胃中結氣解肌發汗止消渴煩逆腹脹暴風喘咽熱亦可作浴湯治傷寒頭痛如裂壯熱皮如火燥和蔥煎茶去頭痛治天行熱狂頭風風旋下乳揩齒益齒除胃熱肺熱散火邪緩脾益氣止陽明經頭痛發熱惡寒日晡潮熱大渴引飲中暑潮熱牙痛滑石本經上品釋名性滑利竅其質又滑膩故名畫石畫家用刷紙代粉最白故名液石𤇾日石𤇾日乃肺膏也故名脫石脫乃肉無骨也番石冷石共石三名未詳各方記述生赭陽山谷及太山之陰初取軟如泥久漸堅強白如凝脂辨別道地和漢俱有之漢來者為上修治刮淨研粉水飛曬乾用氣味甘淡大寒無毒功用降也入足陽明太陽手少陰太陽陽明經石葦為之使惡曾青制雄黃陰火虛熾水涸者勿用精滑便利者禁之主治身熱泄澼女子乳難癃閉利小便蕩胃中積聚寒熱益精氣通九竅六府津液去留結止渴令人利中燥濕分水道實大腸化食毒行積滯逐凝血解燥渴補脾胃降心火偏主石淋為要藥療黃疸水腫腳氣吐血衄血金瘡血出諸瘡腫毒芒硝本經上品釋名朴硝再煎煉傾盆中結成鋒芒故名各方記述朴硝生於斥鹵之地彼人刮掃煎汁經宿結成狀如末鹽猶有沙土內雜須再煎煉入藥以朴硝一斤水二瓶同入鍋內溶化掠去油膩其水將細布或縑子濾去滓腳用蘿蔔一斤切厚片同硝水入鍋內煮數十沸撈去蘿蔔再隔厚紙三重濾過令滓去淨放瓦盆內星月下露一夜則結成白硝如冰如蠟名之盆硝其底多而上面生細芒如鋒謂之芒硝底少而二面生芽如圭角作六硝縱橫玲瓏洞徹可愛謂馬牙硝狀如白石英又名英硝二硝之底則名朴硝取芒硝英硝再三以蘿蔔煎煉去鹹味即為甜硝以二硝置之風日中吹去水氣則輕白如粉即為風化硝以芒硝英硝同甘草煎過鼎罐升煅則為玄明粉辨別道地漢來者為真和產未見之氣味鹹辛苦大寒有小毒功用氣薄味厚沉而降陰也石葦為之使惡麥句姜畏三稜其用有三去實熱一也滌腸中宿垢二也破堅積熱塊三也孕婦惟三四月及七八月不可用主治五藏積聚胃中火熱除邪氣破留血腹中痰實結摶通經脈利大小便及月水破五淋推陳致新下瘰癧黃疸病時疾壅熱能散惡血墮胎傅漆瘡人中白唐本草釋名溺白垽滓澱為垽乃人溺澄下白垽也故名各方記述人溺之積氣結成者也辨別道地以風日久乾者為良修治煅過水飛用氣味鹹寒無毒功用能瀉肝腎三焦膀胱有餘之火為除熱去火之聖藥主治鼻衄湯火灼瘡燒研主惡瘡治傳屍熱勞肺痿心膈熱羸瘦渴疾降火消瘀血治咽喉口齒生瘡疳䘌諸出血肌膚汗血童便釋名輪迴酒即小便之別名各方記述飲入於胃隨脾之氣上歸於肺下通水道而入膀胱故能治肺病引火下行但取十二歲以下童子絕其烹炮鹹酸多與米飲以助水道每用一盞入薑汁或韭汁二三點徐徐服之久則自效辨別道地童男者良自便如雪者亦妙氣味鹹寒無毒功用入肺胃膀胱三經宜於陰虛火動熱蒸如燎服藥無益者若氣血虛無熱者不宜多服主治寒熱頭痛溫氣主久嗽上氣失音及症積腹滿明目益聲潤肌膚利大腸推陳致新去咳嗽肺痿鬼氣痓病乘熱時服之佳冷則和熱湯服勞渴潤心肺療血悶熱狂撲損瘀血在內運絕止吐血鼻衄皮膚皴裂難產胎衣不下蛇犬咬滋陰降火甚速殺蟲解毒療瘧中暍中國藥物學大綱補正人參條真判事達按昔時韓人某氏官判事者始將來之故名乃上好韓參也今藥家稱判事者賈舶將來標京參者以形色相似偽充之乃上好漢參也又藥家稱唐參者多是女直參也其形膨大輕虛氣味極劣明一統志所謂女直國歲貢人參八十萬斤是也小人參根橫生如竹節者此往年賈舶將來標竹節參者味苦惡不堪用乃參鬚之橫梁根也或曰古人言參蘆吐人疑指此歟附其橫根生細須名參鬚出張璐玉本草逢原和邦稱胡人參稍粗者稱折人參蓋往昔所不用者近始用之蔓人參蔓生一枝四葉形如茜草柔軟有毛摘之有白汁出其氣極臭四五月葉間著花紫白色形頗類鈴鐸但比沙參花極膨大一處著一花為異根條直圓團不一皮上有疙瘩斷之又有白汁出故名羊乳乃沙參別種也出陳藏器本草拾遺鬘人參一名日光人參乃上條三枝五葉草根鬚也非別種須擇用似人形者達按孩兒參說就人字附會宜擇用單股者凡如黃耆防風輩擇用單股者而不用多歧者云殺人豈人參獨貴多歧乎又一種近世賈舶所將來稱廣東人參今藥家又呼芍藥樣人參其根似參輕虛味甘氣薄皮色黯黑未詳何物或曰近廣東人有栽數根獻於官者詳其形狀即本邦所產零餘子人參是也用者宜察稻若水云救荒本草地瓜兒即是沙參條一名羊乳根多白汁羊乳即蔓人參沙參即土土岐今按沙參薺苨形狀相類達爾沙參與薺苨不同李時珍綱目以蘇頌圖經所載杏葉沙參為薺苨故形狀相類然此物乃沙參圓葉者而不似桔梗不可稱甜桔梗讀者審焉救荒野譜野譜當作本草松沙參束細長根為團此非細長根乃擘開其根欲易乾者且云其色黃與本草說不合恐不然此經久變黃色者近有一種以防葵根偽造者宜辨別萎蕤女萎苗葉類冬青云云按是乃李仲立言而本書抄略失義今補之李仲立曰女萎苗葉類冬青但冬青凌冬不凋故得女貞之稱此草未秋即萎故有女萎之名天麻出奧州他處未聞有之按天麻諸州又間產之不止奧州白朮和產多是蒼朮按一種關東產者葉如棠梨稍軟根如雲頭味最佳但藥家未鬻遠志小葉者為是按遠志大葉者根大小葉者根細宜採大葉大根者供藥用近檢近江州伊吹川所產者根甚肥大氣味極厚可用黃芩擇用深色堅實者按堅實而小者為條芩一名子芩輕腐為片者為腐芩一名片芩各有所用本草詳辨之前胡有數種今和產無數種按和名溪芹者諸州山野多產之河內州產一種細葉者葉類芹葉及當歸是乃本草當歸葉者防風今稱山人參者真但有兩種藝州人呼山人參者乃真京洛山中又多產之有一種相似而有毛者相模州鎌倉山中多產之根比山人參強硬味薄為劣予往來經過河內州諸山乃二物並生土人俱稱山人參又近江州伊吹山產一種防風葉似山人參極纖細氣味極厚土人稱細葉防風延胡索今漢舶將來者京北鷹峰藥圃栽之貝母今漢渡者有大小二種大者味厚為佳藥肆稱大貝母顧元交本草匯箋名象山貝母是也本書引頤生微論云云其說極好補骨脂近世傳種子栽之與漢物一般澤瀉和名那那都北國稱呼匙於茂多嘉幾內稱呼細辛條細葉細辛此稱柳葉細辛者乃徐長卿也木香和產根無香氣非真按此說恐非也香之有無因地產之異三稜條䓮艹溲根和名蛟帳張草甎子苗和名久具俱出救荒本草香附條夫須按雅爾云薹夫須乃賤夫所須此草可為蓑笠者乃今之須化非香附之本書襲李氏之誤藿香和稱藿香者乃月令廣義所截藿菜荊芥條河豚和名布具又名布久登黃顙魚和名岐岐宇佐岐牟滿旋覆花按一名野油花出小兒衛生總微論地黃服地黃人忌蘿蔔蔥蒜謂之三白今服地黃人知忌蘿蔔而不知忌蔥蒜可笑
